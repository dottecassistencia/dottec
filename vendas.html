<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vendas — Dottec Assistência</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{--cyan:#29B8C2;--cyan-dark:#1E9099;--cyan-bg:#E3F4F5;--coral:#E8604A;--coral-dark:#C94835;--coral-bg:#FBE9E5;--dark:#1C1C1A;--text:#2C2C2A;--sub:#8A887F;--border:#EAE7DF;--bg:#EDEAE3;--white:#FFFFFF;--amber:#9A6000;--amber-bg:#FBEEDB;--green:#3B6D11;--green-bg:#EAF3DE}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Figtree',sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at 12% -8%,rgba(41,184,194,.10),transparent 42%),var(--bg)}
  .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:1.1rem 2rem}
  .crumb{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .back-btn{width:36px;height:36px;border-radius:10px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px;cursor:pointer;text-decoration:none;flex-shrink:0;transition:background .15s}
  .back-btn:hover{background:#E2DFD6}
  .crumb-title{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--dark)}
  .crumb-sub{font-size:12px;color:var(--sub);margin-top:1px}
  .content{max-width:1200px;margin:0 auto;padding:2rem}

  .totais{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
  .total-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem}
  .total-label{font-size:10.5px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
  .total-value{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--dark)}
  .total-value.green{color:var(--green)}.total-value.cyan{color:var(--cyan-dark)}

  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
  .btn{height:40px;padding:0 16px;border-radius:10px;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px;transition:background .15s;text-decoration:none}
  .btn-cyan{background:var(--cyan);color:#fff}.btn-cyan:hover{background:var(--cyan-dark)}
  .filters{display:flex;gap:6px}
  .filter-btn{height:34px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--sub);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Figtree',sans-serif;display:flex;align-items:center;gap:5px}
  .filter-btn.active{background:var(--cyan-bg);color:var(--cyan-dark);border-color:rgba(41,184,194,.4)}
  .filter-btn:hover{border-color:var(--cyan);color:var(--cyan-dark)}

  /* datas */
  .date-range{display:flex;align-items:center;gap:6px}
  .date-range input{height:34px;padding:0 10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12.5px;font-family:inherit;outline:none;transition:border-color .15s}
  .date-range input:focus{border-color:var(--cyan)}
  .date-range span{font-size:12px;color:var(--sub)}

  .search-wrap{position:relative;margin-left:auto}
  .search-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:16px}
  .search-wrap input{width:220px;height:40px;padding:0 14px 0 38px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s;text-transform:uppercase}
  .search-wrap input::placeholder{text-transform:none}
  .search-wrap input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.13)}

  .table-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);padding:12px 16px;border-bottom:1px solid var(--border);background:#FAFAF7}
  thead th.right{text-align:right}
  tbody td{padding:12px 16px;font-size:13.5px;color:var(--text);border-bottom:1px solid #F2F0EA}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s;cursor:pointer}
  tbody tr:hover{background:#FAFAF7}

  .num-badge{font-size:11px;font-weight:800;color:var(--sub);background:var(--bg);padding:2px 8px;border-radius:6px}
  .tipo-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px}
  .tipo-pill.RAPIDA{background:var(--cyan-bg);color:var(--cyan-dark)}
  .tipo-pill.NORMAL{background:var(--amber-bg);color:var(--amber)}

  .status-pill{display:inline-flex;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
  .status-pill.CONCLUIDA{background:var(--green-bg);color:var(--green)}
  .status-pill.CANCELADA{background:#F0EFEA;color:var(--sub)}
  .status-pill.ABERTA{background:var(--cyan-bg);color:var(--cyan-dark)}

  .forma-icon{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--sub)}
  .td-total{text-align:right;font-family:'Lora',serif;font-size:15px;font-weight:700;color:var(--dark)}
  .td-data{font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums}

  .act-btn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s}
  .act-view{background:var(--cyan-bg);color:var(--cyan-dark)}.act-view:hover{background:var(--cyan);color:#fff}
  .act-cancel{background:var(--coral-bg);color:var(--coral)}.act-cancel:hover{background:var(--coral);color:#fff}

  .empty-row td{padding:3rem 1rem;text-align:center;color:var(--sub)}
  .empty-row i{font-size:32px;display:block;margin-bottom:10px;opacity:.35}
  .table-footer{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid var(--border);font-size:12.5px;color:var(--sub)}

  /* MODAL DETALHE */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,28,26,.45);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:20px;width:100%;max-width:560px;box-shadow:0 24px 64px rgba(0,0,0,.18);margin:auto}
  .modal-head{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--dark)}
  .modal-close{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--sub)}
  .modal-body{padding:1.5rem}
  .detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F2F0EA}
  .detail-row:last-child{border-bottom:none}
  .detail-label{font-size:12.5px;color:var(--sub)}
  .detail-value{font-size:13.5px;font-weight:600;color:var(--dark)}
  .detail-total{font-family:'Lora',serif;font-size:22px;font-weight:800;color:var(--green)}
  .itens-list{background:var(--bg);border-radius:12px;padding:1rem;margin:1rem 0}
  .item-det{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
  .item-det:not(:last-child){border-bottom:1px solid var(--border)}
  .item-det-nome{color:var(--dark);font-weight:600;flex:1}
  .item-det-info{color:var(--sub);font-size:11.5px;margin-top:2px}
  .item-det-val{font-weight:700;color:var(--dark)}

  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @media(max-width:900px){.totais{grid-template-columns:1fr 1fr}.content{padding:1.25rem}}
</style>
</head>
<body>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modal-det" onclick="if(event.target===this)fecharDet()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="det-num">Venda —</div>
      <button class="modal-close" onclick="fecharDet()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="det-body">Carregando...</div>
  </div>
</div>

<header class="topbar">
  <div class="crumb">
    <a class="back-btn" href="venda.html"><i class="ti ti-arrow-left"></i></a>
    <div><div class="crumb-title">Histórico de Vendas</div><div class="crumb-sub">Todas as vendas realizadas</div></div>
  </div>
</header>

<main class="content">
  <div class="totais">
    <div class="total-card"><div class="total-label">Vendas hoje</div><div class="total-value cyan" id="t-hoje">—</div></div>
    <div class="total-card"><div class="total-label">Total hoje</div><div class="total-value green" id="t-total-hoje">R$ —</div></div>
    <div class="total-card"><div class="total-label">Vendas este mês</div><div class="total-value" id="t-mes">—</div></div>
    <div class="total-card"><div class="total-label">Total este mês</div><div class="total-value green" id="t-total-mes">R$ —</div></div>
  </div>

  <div class="toolbar">
    <a class="btn btn-cyan" href="venda-rapida.html"><i class="ti ti-bolt"></i> Nova venda rápida</a>

    <div class="filters">
      <button class="filter-btn active" id="ft-todos" onclick="setFiltro('TODOS')">Todas</button>
      <button class="filter-btn" id="ft-rapida" onclick="setFiltro('RAPIDA')"><i class="ti ti-bolt"></i> Rápida</button>
      <button class="filter-btn" id="ft-normal" onclick="setFiltro('NORMAL')"><i class="ti ti-receipt"></i> Normal</button>
    </div>

    <div class="date-range">
      <input type="date" id="data-de" oninput="load()"/>
      <span>até</span>
      <input type="date" id="data-ate" oninput="load()"/>
    </div>

    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="busca" placeholder="Buscar..." oninput="filtrar()"/>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:80px">#</th>
          <th style="width:90px">Tipo</th>
          <th>Cliente</th>
          <th style="width:120px">Forma</th>
          <th style="width:90px">Status</th>
          <th style="width:100px">Data</th>
          <th style="width:120px" class="right">Total</th>
          <th style="width:80px;text-align:right">Ações</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="empty-row"><td colspan="8"><i class="ti ti-loader-2" style="animation:spin .8s linear infinite"></i>Carregando...</td></tr>
      </tbody>
    </table>
    <div class="table-footer"><span id="count">—</span><span>Dottec Assistência</span></div>
  </div>
</main>

<script>
  const SUPA_URL='https://clctxzynpfjilxmyblpg.supabase.co';
  const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsY3R4enlucGZqaWx4bXlibHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NzEyNDMsImV4cCI6MjA5NTM0NzI0M30.YBGIwVFpE52KZKpOjMMMh1WCZbzDLM_adwGxxXhkIL0';
  const db=supabase.createClient(SUPA_URL,SUPA_KEY);
  const fmt=v=>'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
  const fmtDt=d=>new Date(d).toLocaleDateString('pt-BR');
  const fmtHr=d=>new Date(d).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const hoje=new Date().toISOString().slice(0,10);
  const mesInicio=hoje.slice(0,8)+'01';

  let TODOS=[], FILTRO_TIPO='TODOS';

  // datas padrão
  document.getElementById('data-de').value=mesInicio;
  document.getElementById('data-ate').value=hoje;

  function setFiltro(t){
    FILTRO_TIPO=t;
    ['todos','rapida','normal'].forEach(x=>document.getElementById('ft-'+x).classList.toggle('active',t===x.toUpperCase()||t==='TODOS'&&x==='todos'));
    filtrar();
  }

  function filtrar(){
    const q=document.getElementById('busca').value.trim().toUpperCase();
    let lista=TODOS;
    if(FILTRO_TIPO!=='TODOS') lista=lista.filter(v=>v.tipo===FILTRO_TIPO);
    if(q) lista=lista.filter(v=>String(v.numero).includes(q)||(v.nome_cliente||'').toUpperCase().includes(q)||(v.forma_pagamento||'').toUpperCase().includes(q));
    renderTable(lista);
  }

  function renderTable(lista){
    const tb=document.getElementById('tbody');
    if(!lista.length){
      tb.innerHTML=`<tr class="empty-row"><td colspan="8"><i class="ti ti-receipt-off"></i>Nenhuma venda encontrada.</td></tr>`;
      document.getElementById('count').textContent='0 vendas';
      return;
    }
    const formaIcon={'DINHEIRO':'ti-cash','PIX':'ti-qrcode','DEBITO':'ti-credit-card','CREDITO':'ti-credit-card','BOLETO':'ti-file-text'};
    tb.innerHTML=lista.map(v=>`
      <tr onclick="verDetalhe('${v.id}')">
        <td><span class="num-badge">#${String(v.numero).padStart(4,'0')}</span></td>
        <td><span class="tipo-pill ${v.tipo}">${v.tipo==='RAPIDA'?'RÁPIDA':'NORMAL'}</span></td>
        <td style="color:var(--sub);font-size:12.5px">${v.nome_cliente||v.pessoas?.nome||'— BALCÃO'}</td>
        <td><span class="forma-icon"><i class="ti ${formaIcon[v.forma_pagamento]||'ti-credit-card'}"></i>${v.forma_pagamento||'—'}</span></td>
        <td><span class="status-pill ${v.status}">${v.status}</span></td>
        <td class="td-data">${fmtDt(v.criado_em)}<br>${fmtHr(v.criado_em)}</td>
        <td class="td-total">${fmt(v.total)}</td>
        <td>
          <div style="display:flex;gap:5px;justify-content:flex-end">
            <button class="act-btn act-view" onclick="event.stopPropagation();verDetalhe('${v.id}')" title="Detalhes"><i class="ti ti-eye"></i></button>
            ${v.status==='CONCLUIDA'?`<button class="act-btn act-cancel" onclick="event.stopPropagation();cancelarVenda('${v.id}','${String(v.numero).padStart(4,'0')}')" title="Cancelar"><i class="ti ti-x"></i></button>`:''}
          </div>
        </td>
      </tr>`).join('');
    document.getElementById('count').textContent=lista.length+' venda(s)';
  }

  async function load(){
    const de=document.getElementById('data-de').value;
    const ate=document.getElementById('data-ate').value;
    let q=db.from('vendas').select('*,pessoas(nome)').order('criado_em',{ascending:false});
    if(de) q=q.gte('criado_em',de+'T00:00:00');
    if(ate) q=q.lte('criado_em',ate+'T23:59:59');
    const{data}=await q;
    TODOS=data||[];

    // totalizadores
    const vendHoje=TODOS.filter(v=>v.criado_em.slice(0,10)===hoje&&v.status==='CONCLUIDA');
    const vendMes=TODOS.filter(v=>v.status==='CONCLUIDA');
    document.getElementById('t-hoje').textContent=vendHoje.length;
    document.getElementById('t-total-hoje').textContent=fmt(vendHoje.reduce((s,v)=>s+Number(v.total),0));
    document.getElementById('t-mes').textContent=vendMes.length;
    document.getElementById('t-total-mes').textContent=fmt(vendMes.reduce((s,v)=>s+Number(v.total),0));
    filtrar();
  }

  async function verDetalhe(id){
    const venda=TODOS.find(v=>v.id===id);
    if(!venda) return;
    document.getElementById('det-num').textContent='Venda #'+String(venda.numero).padStart(4,'0');
    document.getElementById('det-body').innerHTML='<div style="text-align:center;padding:2rem;color:var(--sub)"><i class="ti ti-loader-2" style="font-size:28px;animation:spin .8s linear infinite"></i></div>';
    document.getElementById('modal-det').classList.add('open');

    const{data:itens}=await db.from('venda_itens').select('*').eq('venda_id',id);

    const li=(itens||[]).map(it=>`
      <div class="item-det">
        <div>
          <div class="item-det-nome">${it.nome}</div>
          <div class="item-det-info">${it.quantidade}x ${fmt(it.valor_unit)}</div>
        </div>
        <div class="item-det-val">${fmt(it.total)}</div>
      </div>`).join('');

    document.getElementById('det-body').innerHTML=`
      <div class="detail-row"><span class="detail-label">Tipo</span><span class="detail-value">${venda.tipo==='RAPIDA'?'VENDA RÁPIDA (BALCÃO)':'VENDA NORMAL'}</span></div>
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${venda.status}</span></div>
      <div class="detail-row"><span class="detail-label">Data / Hora</span><span class="detail-value">${fmtDt(venda.criado_em)} às ${fmtHr(venda.criado_em)}</span></div>
      <div class="detail-row"><span class="detail-label">Cliente</span><span class="detail-value">${venda.nome_cliente||venda.pessoas?.nome||'— BALCÃO'}</span></div>
      <div class="detail-row"><span class="detail-label">Forma de pagamento</span><span class="detail-value">${venda.forma_pagamento||'—'}</span></div>
      ${venda.troco>0?`<div class="detail-row"><span class="detail-label">Troco</span><span class="detail-value">${fmt(venda.troco)}</span></div>`:''}
      <div class="itens-list">${li||'<div style="color:var(--sub);text-align:center;font-size:13px">Sem itens registrados</div>'}</div>
      <div class="detail-row"><span class="detail-label">Subtotal</span><span class="detail-value">${fmt(venda.subtotal)}</span></div>
      ${venda.desconto>0?`<div class="detail-row"><span class="detail-label">Desconto</span><span class="detail-value">- ${fmt(venda.desconto)}</span></div>`:''}
      <div class="detail-row" style="margin-top:8px"><span class="detail-label" style="font-size:15px;font-weight:700;color:var(--dark)">Total</span><span class="detail-total">${fmt(venda.total)}</span></div>`;
  }

  function fecharDet(){document.getElementById('modal-det').classList.remove('open')}

  async function cancelarVenda(id,num){
    if(!confirm('Cancelar a venda #'+num+'? Essa ação não pode ser desfeita.')) return;
    const{error}=await db.from('vendas').update({status:'CANCELADA'}).eq('id',id);
    if(error){alert('Erro: '+error.message);return;}
    load();
  }

  load();
</script>
</body>
</html>
