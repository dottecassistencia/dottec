<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OS — Dottec</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--cyan:#29B8C2;--cd:#1E9099;--cbg:#E3F4F5;--coral:#E8604A;--cbg2:#FBE9E5;--dark:#1C1C1A;--text:#2C2C2A;--sub:#8A887F;--border:#EAE7DF;--bg:#EDEAE3;--white:#fff;--amber:#9A6000;--abg:#FBEEDB;--green:#3B6D11;--gbg:#EAF3DE;--red:#DC2626;--rbg:#FEF2F2;--purple:#5B3FA6;--pbg:#EEEAF8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Figtree',sans-serif;color:var(--text);background:var(--bg);display:flex;flex-direction:column}
/* Maiúsculo por padrão em todo o sistema */
input:not([type=date]):not([type=datetime-local]):not([type=number]):not([type=password]):not([type=email]),
textarea,select{text-transform:uppercase}
input::placeholder,textarea::placeholder{text-transform:none}

/* ══ TOPBAR COMPACTA: logo + bolinhas em uma linha ══ */
.topbar{
  height:58px;background:var(--white);border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.06);
}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.tb-circle{width:32px;height:32px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#29B8C2,#1E9099);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(41,184,194,.3);flex-shrink:0}
.tb-circle img{width:100%;height:100%;object-fit:cover;display:block}
.tb-circle i{font-size:16px;color:#fff}
.tb-nome{font-family:'Lora',serif;font-size:13px;font-weight:700;color:var(--dark)}
.tb-sub{font-size:8.5px;color:var(--sub)}
.tb-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
/* página atual */
.tb-page{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-page-ico{width:24px;height:24px;border-radius:7px;background:var(--cbg2);color:var(--coral);display:flex;align-items:center;justify-content:center;font-size:12px}
.tb-page-name{font-family:'Lora',serif;font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap}
.tb-page-num{font-size:11px;color:var(--sub);margin-left:2px}
/* bolinhas inline — compactas */
.tb-sep2{width:1px;height:20px;background:var(--border);flex-shrink:0}
.tb-mods{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(40px,1fr));gap:2px;justify-items:center;align-items:center;min-width:0}
.tb-ball{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:inherit;cursor:pointer;max-width:52px;width:100%}
.tb-ball-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;transition:transform .2s cubic-bezier(.34,1.5,.64,1),box-shadow .2s}
.tb-ball:hover .tb-ball-icon{transform:translateY(-2px) scale(1.08);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.tb-ball.active .tb-ball-icon{box-shadow:0 0 0 2px var(--cyan)}
.tb-ball-lbl{font-size:7.5px;font-weight:700;color:var(--sub);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-transform:uppercase}
.tb-ball.active .tb-ball-lbl{color:var(--cyan)}
.tb-ball-bdg{position:absolute;top:-1px;right:-1px;width:12px;height:12px;border-radius:50%;background:var(--red);border:1.5px solid var(--white);font-size:7px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center}
.tb-more-wrap{position:relative;flex-shrink:0}
.tb-more{width:34px;height:34px;border-radius:50%;background:var(--bg);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--sub);cursor:pointer;transition:all .15s}
.tb-more:hover{background:#E2DFD6}
.tb-more-drop{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 36px rgba(0,0,0,.12);padding:6px;z-index:300;min-width:170px}
.tb-more-drop.open{display:block}
.tb-more-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text);text-decoration:none;transition:background .12s}
.tb-more-item:hover{background:var(--bg)}
.tb-more-item i{font-size:14px;width:18px;text-align:center}
/* ações do header */
.tb-actions{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tb-back{height:30px;padding:0 10px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;text-decoration:none;transition:all .15s}
.tb-back:hover{background:var(--bg)}
.tb-save{height:30px;padding:0 12px;border-radius:8px;border:none;background:var(--cyan);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .15s}
.tb-save:hover{background:var(--cd)}
.tb-save:disabled{opacity:.5;cursor:not-allowed}

/* ══ BODY ══ */
.body{flex:1;overflow-y:auto;padding:14px 16px 20px}
.content{max-width:1000px;margin:0 auto}

/* ══ SEÇÕES ══ */
.sec{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.sec-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.si-cyan{background:var(--cbg);color:var(--cd)}.si-amber{background:var(--abg);color:var(--amber)}
.si-coral{background:var(--cbg2);color:var(--coral)}.si-green{background:var(--gbg);color:var(--green)}
.si-purple{background:var(--pbg);color:var(--purple)}
.sec-title{font-family:'Lora',serif;font-size:13.5px;font-weight:700;color:var(--dark)}
.sec-body{padding:12px 14px}

/* ══ FIELDS ══ */
.field{margin-bottom:10px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:9.5px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.opt{font-weight:400;text-transform:none;font-size:9px;opacity:.8}
.field input,.field select,.field textarea{width:100%;height:38px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:#FAFAF7;color:var(--dark);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;text-transform:uppercase}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.1);background:var(--white)}
.field input::placeholder,.field textarea::placeholder{text-transform:none;color:#B5B2A8}
.field textarea{height:80px;resize:vertical;padding:8px 10px}
.field textarea.sm{height:60px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.g4-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ══ CLIENTE COMPACT ══ */
.cl-display{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.cl-display:hover{border-color:var(--cyan);background:var(--cbg)}
.cl-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--cd));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.cl-info{flex:1;min-width:0}
.cl-name{font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-sub{font-size:10.5px;color:var(--sub)}
.cl-change{font-size:11px;color:var(--sub);flex-shrink:0}

/* ══ AUTOCOMPLETE ══ */
.ac-wrap{position:relative}
.ac-drop{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.12);max-height:220px;overflow-y:auto;z-index:200}
.ac-drop.open{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:12.5px;border-bottom:1px solid #F5F4F0;transition:background .1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.foc{background:var(--bg)}
.ac-name{font-weight:600;color:var(--dark)}
.ac-info{font-size:10.5px;color:var(--sub);margin-top:1px;display:flex;gap:7px}
.ac-novo{padding:8px 12px;font-size:12px;color:var(--cd);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;border-top:1px solid var(--border)}
.ac-novo:hover{background:var(--cbg)}

/* ══ APARELHOS ══ */
.ap-card{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;position:relative}
.ap-card.chamado{border-color:rgba(41,184,194,.4);background:#F5FDFE}
.ap-card:last-child{margin-bottom:0}
.ap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ap-tipo-lbl{font-size:10px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px}
.ap-tipo-lbl.chamado-lbl{color:var(--cd)}
.ap-actions{display:flex;gap:4px}
.btn-rem{width:24px;height:24px;border-radius:6px;border:none;background:var(--cbg2);color:var(--coral);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-rem:hover{background:var(--coral);color:#fff}
/* linha 4 campos tipo/marca/modelo/cor */
.ap-row4{display:grid;grid-template-columns:1fr 1fr 1.4fr 1fr;gap:8px}
/* linha série/senha */
.ap-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.btn-add-ap{display:flex;align-items:center;gap:7px;height:34px;padding:0 12px;border-radius:8px;border:1.5px dashed var(--border);background:transparent;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--sub);transition:all .15s;margin-top:4px}
.btn-add-ap:hover{border-color:var(--cyan);color:var(--cd);background:var(--cbg)}
/* botão chamado técnico */
.btn-chamado{display:flex;align-items:center;gap:7px;height:34px;padding:0 12px;border-radius:8px;border:1.5px solid rgba(41,184,194,.3);background:var(--cbg);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--cd);transition:all .15s;margin-top:4px}
.btn-chamado:hover{background:var(--cyan);color:#fff;border-color:var(--cyan)}
/* anydesk copy */
.anydesk-row{display:flex;gap:8px;align-items:flex-end}
.anydesk-row .field{flex:1;margin-bottom:0}
.btn-copy-ad{height:38px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.btn-copy-ad:hover{background:var(--cbg);color:var(--cd);border-color:var(--cyan)}

/* autocomplete modelo */
.mod-ac-wrap{position:relative}
.mod-ac-drop{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.12);max-height:180px;overflow-y:auto;z-index:200}
.mod-ac-drop.open{display:block}
.mod-ac-item{padding:8px 12px;cursor:pointer;font-size:12.5px;border-bottom:1px solid #F5F4F0;display:flex;align-items:center;gap:7px;transition:background .1s}
.mod-ac-item:last-child{border-bottom:none}
.mod-ac-item:hover,.mod-ac-item.foc{background:var(--bg)}
.mac-tag{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;flex-shrink:0}
.mac-iphone{background:var(--cbg2);color:var(--coral)}.mac-other{background:var(--bg);color:var(--sub)}

/* ══ PRODUTOS E SERVIÇOS ══ */
.item-search-wrap{position:relative;margin-bottom:10px}
.item-search-wrap input{width:100%;height:38px;padding:0 10px 0 36px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:#FAFAF7;outline:none;transition:border-color .15s;text-transform:uppercase}
.item-search-wrap input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.1);background:var(--white)}
.item-search-wrap input::placeholder{text-transform:none;color:#B5B2A8}
.item-search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);pointer-events:none}
.item-add-drop{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.12);max-height:180px;overflow-y:auto;z-index:200}
.item-add-drop.open{display:block}
.item-add-opt{padding:8px 12px;cursor:pointer;font-size:12.5px;border-bottom:1px solid #F5F4F0;display:flex;align-items:center;gap:8px;transition:background .1s}
.item-add-opt:hover,.item-add-opt.foc{background:var(--bg)}
.item-add-opt:last-child{border-bottom:none}
.aio-tag{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;flex-shrink:0}
.aio-srv{background:var(--cbg);color:var(--cd)}.aio-prd{background:var(--abg);color:var(--amber)}
.itens-list{display:flex;flex-direction:column;gap:5px}
.item-row{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:8px;padding:7px 10px;border:1px solid var(--border)}
.item-desc{flex:1;min-width:0}
.item-nome{font-size:12.5px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:10.5px;color:var(--sub)}
.item-qty{width:52px;height:30px;border:1px solid var(--border);border-radius:6px;text-align:center;font-family:inherit;font-size:13px;background:var(--white);color:var(--dark);outline:none;padding:0}
.item-price{font-size:12.5px;font-weight:700;color:var(--dark);white-space:nowrap;min-width:72px;text-align:right}
.item-del{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--sub);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.item-del:hover{background:var(--cbg2);color:var(--red)}
.total-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0 0;border-top:1px solid var(--border);margin-top:6px}
.total-lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.total-val{font-family:'Lora',serif;font-size:16px;font-weight:700;color:var(--dark)}

/* ══ STATUS SELECT ══ */
.status-select-wrap{position:relative}
.status-select-wrap select{width:100%;height:38px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;background:#FAFAF7;color:var(--dark);font-size:13px;font-family:inherit;font-weight:600;outline:none;cursor:pointer;transition:border-color .15s;text-transform:uppercase;appearance:none}
.status-select-wrap select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.1)}
.status-select-wrap::after{content:'\e5c5';font-family:'Material Icons';position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--sub)}

/* ══ MODAL CONFIRMA TROCA CLIENTE ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,28,26,.5);z-index:800;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-head{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.mh-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.modal-title{font-family:'Lora',serif;font-size:14px;font-weight:700;color:var(--dark);flex:1}
.modal-x{width:24px;height:24px;border-radius:6px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--sub)}
.modal-body{padding:.9rem 1.1rem;font-size:13px;color:var(--text);line-height:1.5}
.modal-foot{padding:.75rem 1.1rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px}
.btn-sec{height:34px;padding:0 12px;border-radius:7px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-pri{height:34px;padding:0 14px;border-radius:7px;border:none;background:var(--cyan);color:#fff;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .15s}
.btn-pri:hover{background:var(--cd)}
.btn-warn{height:34px;padding:0 14px;border-radius:7px;border:none;background:var(--amber);color:#fff;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
.toast{position:fixed;bottom:1rem;right:1rem;z-index:999;padding:9px 14px;border-radius:9px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#E6FAF8;color:#0F6E56;border:1px solid rgba(15,110,86,.2)}
.toast.err{background:var(--cbg2);color:#C94835;border:1px solid rgba(200,72,53,.2)}
</style>
</head>
<body>
<div class="toast" id="toast"><i id="ti" class="ti ti-check"></i><span id="tm"></span></div>

<!-- MODAL NOVO CLIENTE -->
<div class="overlay" id="ov-cl">
  <div class="modal">
    <div class="modal-head"><div class="mh-ico" style="background:var(--cbg);color:var(--cd)"><i class="ti ti-user-plus"></i></div><div class="modal-title">Novo cliente</div><button class="modal-x" onclick="fechaModal('cl')"><i class="ti ti-x"></i></button></div>
    <div style="padding:.9rem 1.1rem;display:flex;flex-direction:column;gap:9px">
      <div class="field"><label>Nome completo</label><input type="text" id="ncl-nome" placeholder="Nome do cliente"/></div>
      <div class="g2">
        <div class="field"><label>Telefone / WhatsApp</label><input type="text" id="ncl-tel" placeholder="(47) 99999-9999"/></div>
        <div class="field"><label>CPF/CNPJ <span class="opt">(opcional)</span></label><input type="text" id="ncl-doc" placeholder="000.000.000-00"/></div>
      </div>
      <div class="field"><label>E-mail <span class="opt">(opcional)</span></label><input type="text" id="ncl-email" placeholder="cliente@email.com"/></div>
    </div>
    <div class="modal-foot"><button class="btn-sec" onclick="fechaModal('cl')">Cancelar</button><button class="btn-pri" onclick="salvarNovoCliente()"><i class="ti ti-check"></i> Salvar</button></div>
  </div>
</div>

<!-- MODAL CONFIRMAR TROCA CLIENTE -->
<div class="overlay" id="ov-troca">
  <div class="modal">
    <div class="modal-head"><div class="mh-ico" style="background:var(--abg);color:var(--amber)"><i class="ti ti-alert-triangle"></i></div><div class="modal-title">Alterar cliente?</div></div>
    <div class="modal-body">Tem certeza que deseja alterar o cliente desta OS?<br><strong id="troca-de"></strong> → <strong id="troca-para"></strong></div>
    <div class="modal-foot"><button class="btn-sec" onclick="fechaModal('troca')">Cancelar</button><button class="btn-warn" onclick="confirmarTroca()"><i class="ti ti-check"></i> Confirmar</button></div>
  </div>
</div>

<!-- ══ TOPBAR COMPACTA ══ -->
<div class="topbar">
  <a class="tb-logo" href="dashboard.html">
    <div class="tb-circle">
      <img src="logo.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>

// ── CLIENTE ──────────────────────────────────────────────
let CL_CACHE=null, CL_LISTA=[], CL_IDX=-1, CL_TIMER, CL_PENDENTE=null;

function mostrarCliente(p){
  document.getElementById('cl-id').value=p.id||'';
  document.getElementById('cl-nome-h').value=p.nome||'';
  document.getElementById('cl-tel-h').value=p.celular||'';
  document.getElementById('cl-doc-h').value=p.documento||'';
  document.getElementById('cl-email-h').value=p.email||'';
  document.getElementById('cl-av').textContent=(p.nome||'?')[0].toUpperCase();
  document.getElementById('cl-display-nome').textContent=(p.nome||'').toUpperCase();
  document.getElementById('cl-display-sub').textContent=[p.celular,p.documento?p.tipo_doc+': '+p.documento:''].filter(Boolean).join(' · ')||'Clique para alterar';
  document.getElementById('cl-display-wrap').style.display='block';
  document.getElementById('cl-busca-wrap').style.display='none';
  document.getElementById('cl-drop').classList.remove('open');
}

function iniciarTrocaCliente(){
  // volta para o campo de busca
  document.getElementById('cl-display-wrap').style.display='none';
  document.getElementById('cl-busca-wrap').style.display='block';
  const inp=document.getElementById('cl-busca');
  inp.value='';
  setTimeout(()=>inp.focus(),50);
}

async function onBuscaCl(){
  const q=document.getElementById('cl-busca').value.trim();
  clearTimeout(CL_TIMER); CL_IDX=-1;
  const drop=document.getElementById('cl-drop');
  if(!q){drop.classList.remove('open');return;}
  if(q.length<2){drop.classList.remove('open');return;}
  CL_TIMER=setTimeout(async()=>{
    if(!CL_CACHE){try{const{data}=await db.from('pessoas').select('id,nome,celular,documento,tipo_doc,email').eq('ativo',true).eq('is_cliente',true).order('nome').limit(300);CL_CACHE=data||[];}catch{CL_CACHE=[];}}
    const t=q.toUpperCase();
    CL_LISTA=CL_CACHE.filter(p=>p.nome.toUpperCase().includes(t)||(p.celular||'').replace(/\D/g,'').includes(q.replace(/\D/g,''))).slice(0,8);
    drop.innerHTML=CL_LISTA.map((p,i)=>`
      <div class="ac-item${i===CL_IDX?' foc':''}" data-i="${i}" onmousedown="selecionaCl(${i})">
        <div class="ac-name">${p.nome.toUpperCase()}</div>
        <div class="ac-info"><span>${p.celular||''}</span>${p.documento?`<span>${p.tipo_doc}: ${p.documento}</span>`:''}</div>
      </div>`).join('')+
      `<div class="ac-novo" onmousedown="abrirNovoCliente()"><i class="ti ti-user-plus"></i> Cadastrar novo cliente</div>`;
    drop.classList.add('open');
  },200);
}

function onKeyCl(e){
  const drop=document.getElementById('cl-drop');
  const items=drop.querySelectorAll('.ac-item');
  if(e.key==='Escape'){
    document.getElementById('cl-busca').value='';
    drop.classList.remove('open');
    CL_IDX=-1;
    // se tinha cliente antes, volta a mostrar
    if(document.getElementById('cl-id').value){
      document.getElementById('cl-display-wrap').style.display='block';
      document.getElementById('cl-busca-wrap').style.display='none';
    }
    return;
  }
  if(!items.length) return;
  if(e.key==='ArrowDown'){e.preventDefault();CL_IDX=Math.min(CL_IDX+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();CL_IDX=Math.max(CL_IDX-1,0);}
  else if(e.key==='Enter'){e.preventDefault();if(CL_IDX>=0&&CL_LISTA[CL_IDX]){selecionaCl(CL_IDX);}return;}
  items.forEach((it,i)=>it.classList.toggle('foc',i===CL_IDX));
  if(CL_IDX>=0&&CL_LISTA[CL_IDX])document.getElementById('cl-busca').value=CL_LISTA[CL_IDX].nome.toUpperCase();
  if(CL_IDX>=0)items[CL_IDX].scrollIntoView({block:'nearest'});
}

function selecionaCl(i){
  const p=CL_LISTA[i];
  const clAtual=document.getElementById('cl-id').value;
  if(clAtual && clAtual!==p.id){
    // pede confirmação
    CL_PENDENTE=p;
    document.getElementById('troca-de').textContent=document.getElementById('cl-nome-h').value||'cliente atual';
    document.getElementById('troca-para').textContent=p.nome.toUpperCase();
    document.getElementById('ov-troca').classList.add('open');
  } else {
    mostrarCliente(p);
  }
}

function confirmarTroca(){
  fechaModal('troca');
  if(CL_PENDENTE){mostrarCliente(CL_PENDENTE);CL_PENDENTE=null;}
}

function abrirNovoCliente(){
  const q=document.getElementById('cl-busca').value.trim();
  document.getElementById('ncl-nome').value=q.toUpperCase();
  document.getElementById('ncl-tel').value='';
  document.getElementById('ncl-doc').value='';
  document.getElementById('ncl-email').value='';
  document.getElementById('cl-drop').classList.remove('open');
  document.getElementById('ov-cl').classList.add('open');
  setTimeout(()=>document.getElementById('ncl-tel').focus(),60);
}
async function salvarNovoCliente(){
  const nome=document.getElementById('ncl-nome').value.trim();
  if(!nome){toast('Informe o nome.','err');return;}
  try{
    const{data:np,error}=await db.from('pessoas').insert({nome:nome.toUpperCase(),celular:document.getElementById('ncl-tel').value||null,documento:document.getElementById('ncl-doc').value.replace(/\D/g,'')||null,email:document.getElementById('ncl-email').value||null,is_cliente:true,ativo:true}).select('id,nome,celular,documento,tipo_doc,email').single();
    if(error)throw error;
    CL_CACHE=null;
    fechaModal('cl');
    mostrarCliente(np);
    toast('Cliente cadastrado!');
  }catch(err){toast('Erro: '+err.message,'err');}
}

// ── APARELHOS ────────────────────────────────────────────
let APS=[], TIPOS=[], MARCAS=[], MODELOS_DB=[], CORES=[];
const MOD_IDX={}, MOD_LISTA={};

async function loadOpcoesAp(){
  const safe=async p=>{try{return await p;}catch{return{data:[]};}};
  const[{data:t},{data:m},{data:md},{data:c}]=await Promise.all([
    safe(db.from('os_tipos_aparelho').select('nome').eq('ativo',true).order('nome')),
    safe(db.from('os_marcas').select('id,nome').eq('ativo',true).order('nome')),
    safe(db.from('os_modelos').select('id,nome,marca_id,prioritario').eq('ativo',true).order('prioritario',{ascending:false}).order('nome')),
    safe(db.from('os_cores').select('nome').eq('ativo',true).order('nome')),
  ]);
  TIPOS=(t||[]).length?t.map(x=>x.nome):[['Celular','Notebook','Tablet','Desktop/PC','TV','Smartwatch','Outro']].flat().map(n=>({nome:n})).map(x=>x.nome);
  if(!Array.isArray(TIPOS[0])) TIPOS=(t||[]).map(x=>x.nome);
  if(!TIPOS.length) TIPOS=['Celular','Notebook','Tablet','Desktop/PC','TV','Smartwatch','Outro'];
  MARCAS=(m||[]).length?m:[{id:'apple',nome:'Apple'},{id:'samsung',nome:'Samsung'},{id:'xiaomi',nome:'Xiaomi'},{id:'motorola',nome:'Motorola'},{id:'lenovo',nome:'Lenovo'},{id:'dell',nome:'Dell'},{id:'hp',nome:'HP'},{id:'outro',nome:'Outro'}];
  MODELOS_DB=md||[];
  CORES=(c||[]).map(x=>x.nome);
  if(!CORES.length) CORES=['Preto','Branco','Grafite','Dourado','Prata','Azul','Verde','Vermelho','Rosa','Titânio','Amarelo','Roxo','Laranja','Outra'];
}

      <!-- linha 2: série / senha -->
      <div class="ap-row2">
        <div class="field"><label>IMEI / Nº série <span class="opt">(opcional)</span></label><input type="text" id="ap-imei-${i}" value="${ap.imei}" placeholder="000000000000000" oninput="apV('imei',${i},this.value)"/></div>
        <div class="field"><label>Senha / Padrão <span class="opt">(opcional)</span></label><input type="text" id="ap-senha-${i}" value="${ap.senha}" placeholder="0000" oninput="apV('senha',${i},this.value)"/></div>
      </div>
      <!-- linha 3: defeito (largura total) -->
      <div class="field" style="margin-top:8px"><label>Defeito relatado</label><textarea id="ap-defeito-${i}" placeholder="O que o cliente descreveu..." oninput="apV('defeito',${i},this.value)">${ap.defeito}</textarea></div>
      <!-- linha 4: laudo + solução lado a lado -->
      <div class="g2" style="margin-top:8px">
        <div class="field"><label>Laudo técnico <span class="opt">(após diagnóstico)</span></label><textarea id="ap-laudo-${i}" placeholder="O que foi encontrado..." oninput="apV('laudo',${i},this.value)">${ap.laudo}</textarea></div>
        <div class="field"><label>Solução aplicada <span class="opt">(após reparo)</span></label><textarea id="ap-solucao-${i}" placeholder="O que foi feito..." oninput="apV('solucao',${i},this.value)">${ap.solucao}</textarea></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('btn-add-ap').style.display=APS.length>=4?'none':'flex';
}

function apV(c,i,v){APS[i][c]=v;}
function copiarAnydesk(i){
  const val=document.getElementById('ap-anydesk-'+i)?.value?.replace(/\D/g,'');
  if(!val){toast('ID AnyDesk vazio.','err');return;}
  navigator.clipboard.writeText(val).then(()=>toast('ID copiado: '+val)).catch(()=>toast('Não foi possível copiar.','err'));
}

function filtMod(i){
  MOD_IDX[i]=-1;
  const q=(document.getElementById('ap-modelo-'+i)?.value||'').trim().toUpperCase();
  const drop=document.getElementById('mod-drop-'+i);
  if(!q){drop?.classList.remove('open');return;}
  const iphones=MODELOS_DB.filter(m=>m.nome.toUpperCase().includes('IPHONE')&&m.nome.toUpperCase().includes(q));
  const outros=MODELOS_DB.filter(m=>!m.nome.toUpperCase().includes('IPHONE')&&m.nome.toUpperCase().includes(q));
  MOD_LISTA[i]=[...iphones,...outros].slice(0,10);
  if(!MOD_LISTA[i].length){drop?.classList.remove('open');return;}
  drop.innerHTML=MOD_LISTA[i].map((m,idx)=>`
    <div class="mod-ac-item${idx===MOD_IDX[i]?' foc':''}" onmousedown="selMod(${i},${idx})">
      <span class="mac-tag ${m.nome.toUpperCase().includes('IPHONE')?'mac-iphone':'mac-other'}">${m.nome.toUpperCase().includes('IPHONE')?'iPhone':'◦'}</span>
      ${m.nome.toUpperCase()}
    </div>`).join('');
  drop.classList.add('open');
}
function onMod(i){apV('modelo',i,document.getElementById('ap-modelo-'+i).value);filtMod(i);}
function onKeyMod(i,e){
  const drop=document.getElementById('mod-drop-'+i);
  const items=drop?.querySelectorAll('.mod-ac-item')||[];
  if(e.key==='Escape'){drop?.classList.remove('open');return;}
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();MOD_IDX[i]=Math.min((MOD_IDX[i]||0)+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();MOD_IDX[i]=Math.max((MOD_IDX[i]||-1)-1,-1);}
  else if(e.key==='Enter'&&(MOD_IDX[i]||0)>=0){e.preventDefault();selMod(i,MOD_IDX[i]);return;}
  items.forEach((it,idx)=>it.classList.toggle('foc',idx===(MOD_IDX[i]||0)));
  if((MOD_IDX[i]||0)>=0)items[MOD_IDX[i]].scrollIntoView({block:'nearest'});
}
function selMod(i,idx){const m=MOD_LISTA[i][idx];document.getElementById('ap-modelo-'+i).value=m.nome.toUpperCase();apV('modelo',i,m.nome);document.getElementById('mod-drop-'+i).classList.remove('open');}

// ── PRODUTOS E SERVIÇOS ─────────────────────────────────
let ITENS=[], PRODS_CACHE=null, SRVS_CACHE=null, ITEM_LISTA=[], ITEM_IDX=-1, ITEM_TIMER;

function calcTotal(){
  const total=ITENS.reduce((s,it)=>s+(it.preco*it.qty),0);
  document.getElementById('total-val').textContent=fmt(total);
}
function renderItens(){
  const list=document.getElementById('itens-list');
  if(!ITENS.length){list.innerHTML='';return;}
  list.innerHTML=ITENS.map((it,i)=>`
    <div class="item-row">
      <div class="item-desc">
        <div class="item-nome">${it.nome.toUpperCase()}</div>
        <div class="item-sub">${it.tipo==='srv'?'Serviço':'Produto'} · ${fmt(it.preco)} un.</div>
      </div>
      <input type="number" class="item-qty" value="${it.qty}" min="1" onchange="ITENS[${i}].qty=+this.value||1;calcTotal()" title="Qtd"/>
      <div class="item-price">${fmt(it.preco*it.qty)}</div>
      <button class="item-del" onclick="ITENS.splice(${i},1);renderItens();calcTotal()"><i class="ti ti-x"></i></button>
    </div>`).join('');
}

async function onBuscaItem(){
  const q=document.getElementById('item-busca').value.trim().toUpperCase();
  const drop=document.getElementById('item-drop');
  clearTimeout(ITEM_TIMER);ITEM_IDX=-1;
  if(q.length<2){drop.classList.remove('open');return;}
  ITEM_TIMER=setTimeout(async()=>{
    if(!SRVS_CACHE){try{const{data}=await db.from('servicos').select('id,nome,valor').eq('ativo',true).order('nome');SRVS_CACHE=data||[];}catch{SRVS_CACHE=[];}}
    if(!PRODS_CACHE){try{const{data}=await db.from('produtos').select('id,nome,valor_venda,estoque_atual').eq('ativo',true).order('nome').limit(200);PRODS_CACHE=data||[];}catch{PRODS_CACHE=[];}}
    const srvs=(SRVS_CACHE||[]).filter(s=>(s.nome||'').toUpperCase().includes(q)).map(s=>({id:s.id,nome:s.nome,tipo:'srv',preco:s.valor||0}));
    const prods=(PRODS_CACHE||[]).filter(p=>(p.nome||'').toUpperCase().includes(q)).map(p=>({id:p.id,nome:p.nome,tipo:'prd',preco:p.valor_venda||0}));
    ITEM_LISTA=[...srvs,...prods].slice(0,12);
    if(!ITEM_LISTA.length){drop.innerHTML='<div style="padding:.75rem 1rem;font-size:12.5px;color:var(--sub)">Sem resultados</div>';drop.classList.add('open');return;}
    drop.innerHTML=ITEM_LISTA.map((it,idx)=>`
      <div class="item-add-opt${idx===ITEM_IDX?' foc':''}" data-idx="${idx}" onmousedown="addItem(${idx})">
        <span class="aio-tag ${it.tipo==='srv'?'aio-srv':'aio-prd'}">${it.tipo==='srv'?'Serv':'Prod'}</span>
        <span style="flex:1;text-transform:uppercase">${it.nome}</span>
        <span style="font-size:11.5px;color:var(--sub);font-weight:700">${fmt(it.preco)}</span>
      </div>`).join('');
    drop.classList.add('open');
  },200);
}

function onKeyItem(e){
  const drop=document.getElementById('item-drop');
  const items=drop.querySelectorAll('.item-add-opt');
  if(e.key==='Escape'){drop.classList.remove('open');return;}
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();ITEM_IDX=Math.min(ITEM_IDX+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();ITEM_IDX=Math.max(ITEM_IDX-1,0);}
  else if(e.key==='Enter'){e.preventDefault();if(ITEM_IDX>=0)addItem(ITEM_IDX);return;}
  items.forEach((it,idx)=>it.classList.toggle('foc',idx===ITEM_IDX));
  if(ITEM_IDX>=0)items[ITEM_IDX].scrollIntoView({block:'nearest'});
}
function addItem(idx){
  const it=ITEM_LISTA[idx];
  ITENS.push({id:it.id,nome:it.nome,tipo:it.tipo,preco:it.preco,qty:1});
  renderItens();calcTotal();
  document.getElementById('item-busca').value='';
  document.getElementById('item-drop').classList.remove('open');
  ITEM_IDX=-1;
}

// ── LOAD OS EXISTENTE ────────────────────────────────────
async function loadOS(){
  if(!OS_ID){addAp('dispositivo');return;}
  document.getElementById('tb-title').textContent='Editar OS';
  document.getElementById('btn-txt').textContent='Salvar';
  try{
    const{data,error}=await db.from('ordens_servico').select('*').eq('id',OS_ID).single();
    if(error||!data){toast('OS não encontrada.','err');return;}
    document.getElementById('tb-num').textContent='· '+String(data.numero).padStart(4,'0');
    // cliente
    if(data.pessoa_id||data.cliente_nome){
      mostrarCliente({id:data.pessoa_id||'',nome:data.cliente_nome||'',celular:data.cliente_celular||'',documento:data.cliente_doc||'',tipo_doc:'CPF',email:data.cliente_email||''});
    }
    // status
    document.getElementById('os-status').value=data.status||'ABERTA';
    // obs
    document.getElementById('os-acessorios').value=data.acessorios||'';
    document.getElementById('os-obs').value=data.observacoes||'';
    // aparelhos
    let aps=null;
    try{const{data:_aps}=await db.from('os_aparelhos').select('*').eq('os_id',OS_ID).order('ordem');aps=_aps;}catch{}
    if(aps&&aps.length){
      APS=aps.map(a=>({tipo_registro:a.tipo_registro||'dispositivo',tipo:a.tipo||'',marca:a.marca||'',modelo:a.modelo||'',cor:a.cor||'',imei:a.imei||'',senha:a.senha||'',defeito:a.defeito||'',laudo:a.laudo||'',solucao:a.solucao||'',anydesk_id:a.anydesk_id||''}));
    } else {
      APS=[{tipo_registro:'dispositivo',tipo:'',marca:'',modelo:data.aparelho||'',cor:'',imei:data.numero_serie||'',senha:data.senha||'',defeito:data.defeito||'',laudo:data.laudo||'',solucao:data.solucao||'',anydesk_id:''}];
    }
    renderAps();
    // itens
    let its=null;
    try{const{data:_its}=await db.from('os_servicos').select('*').eq('os_id',OS_ID);its=_its;}catch{}
    if(its&&its.length){ITENS=its.map(it=>({id:it.servico_id||it.produto_id,nome:it.nome||'',tipo:it.tipo||'srv',preco:it.valor||0,qty:it.quantidade||1}));renderItens();calcTotal();}
    // atualiza status no select após loadStatus
    const setStDelay=()=>{const sel=document.getElementById('os-status');if(sel.options.length>1){sel.value=data.status||'ABERTA';}else setTimeout(setStDelay,100);};
    setStDelay();
  }catch(err){toast('Erro ao carregar: '+err.message,'err');}
}

// ── SALVAR ───────────────────────────────────────────────
async function salvar(){
  if(_SALVANDO)return;
  const nome=document.getElementById('cl-nome-h').value.trim();
  if(!nome){toast('Informe o cliente.','err');document.getElementById('cl-busca').focus();return;}
  // lê campos dos aparelhos
  APS.forEach((ap,i)=>{
    if(ap.tipo_registro==='dispositivo'){
      ap.tipo=document.getElementById('ap-tipo-'+i)?.value||ap.tipo;
      ap.marca=document.getElementById('ap-marca-'+i)?.value||ap.marca;
      ap.modelo=document.getElementById('ap-modelo-'+i)?.value||ap.modelo;
      ap.cor=document.getElementById('ap-cor-'+i)?.value||ap.cor;
      ap.imei=document.getElementById('ap-imei-'+i)?.value||ap.imei;
      ap.senha=document.getElementById('ap-senha-'+i)?.value||ap.senha;
    }
    ap.defeito=document.getElementById('ap-defeito-'+i)?.value||ap.defeito;
    ap.laudo=document.getElementById('ap-laudo-'+i)?.value||ap.laudo;
    ap.solucao=document.getElementById('ap-solucao-'+i)?.value||ap.solucao;
    if(ap.tipo_registro==='chamado_tecnico') ap.anydesk_id=document.getElementById('ap-anydesk-'+i)?.value||ap.anydesk_id;
  });
  _SALVANDO=true;
  const btn=document.getElementById('btn-save');
  btn.disabled=true;
  document.getElementById('btn-txt').textContent='Salvando...';
  try{
    let pessoaId=document.getElementById('cl-id').value||null;
    if(!pessoaId){
      const{data:np,error:ne}=await db.from('pessoas').insert({nome:nome.toUpperCase(),celular:document.getElementById('cl-tel-h').value||null,documento:document.getElementById('cl-doc-h').value.replace(/\D/g,'')||null,email:document.getElementById('cl-email-h').value||null,is_cliente:true,ativo:true}).select('id').single();
      if(ne)throw new Error(ne.message);
      pessoaId=np.id;CL_CACHE=null;
    }
    const ap0=APS.find(a=>a.tipo_registro==='dispositivo')||APS[0]||{};
    const status=document.getElementById('os-status').value||'ABERTA';
    const payload={
      pessoa_id:pessoaId,
      cliente_nome:nome.toUpperCase(),
      cliente_celular:document.getElementById('cl-tel-h').value||null,
      cliente_doc:document.getElementById('cl-doc-h').value.replace(/\D/g,'')||null,
      cliente_email:document.getElementById('cl-email-h').value||null,
      aparelho:[ap0.marca,ap0.modelo].filter(Boolean).join(' ').toUpperCase()||null,
      defeito:(ap0.defeito||'').toUpperCase()||null,
      laudo:(ap0.laudo||'').toUpperCase()||null,
      solucao:(ap0.solucao||'').toUpperCase()||null,
      numero_serie:ap0.imei||null,
      senha:ap0.senha||null,
      status,
      acessorios:(document.getElementById('os-acessorios').value||'').toUpperCase()||null,
      observacoes:(document.getElementById('os-obs').value||'').toUpperCase()||null,
      atualizado_em:new Date().toISOString(),
    };
    let osId=OS_ID;
    if(OS_ID){const{error}=await db.from('ordens_servico').update(payload).eq('id',OS_ID);if(error)throw new Error(error.message);}
    else{const{data:nova,error}=await db.from('ordens_servico').insert(payload).select('id').single();if(error)throw new Error(error.message);osId=nova.id;}
    // aparelhos
    try{
      await db.from('os_aparelhos').delete().eq('os_id',osId);
      if(APS.length)await db.from('os_aparelhos').insert(APS.map((a,idx)=>({
        os_id:osId,ordem:idx+1,
        tipo_registro:a.tipo_registro||'dispositivo',
        tipo:(a.tipo||'').toUpperCase()||null,
        marca:(a.marca||'').toUpperCase()||null,
        modelo:(a.modelo||'').toUpperCase()||null,
        cor:(a.cor||'').toUpperCase()||null,
        imei:a.imei||null,senha:a.senha||null,
        defeito:(a.defeito||'').toUpperCase()||null,
        laudo:(a.laudo||'').toUpperCase()||null,
        solucao:(a.solucao||'').toUpperCase()||null,
        anydesk_id:a.anydesk_id||null,
      })));
    }catch{}
    // itens
    try{
      await db.from('os_servicos').delete().eq('os_id',osId);
      if(ITENS.length)await db.from('os_servicos').insert(ITENS.map(it=>({os_id:osId,nome:it.nome.toUpperCase(),tipo:it.tipo,servico_id:it.tipo==='srv'?it.id:null,produto_id:it.tipo==='prd'?it.id:null,valor:it.preco,quantidade:it.qty})));
    }catch{}
    // histórico
    if(!OS_ID){try{await db.from('os_historico').insert({os_id:osId,status,observacao:'OS CRIADA',usuario_id:USR.id||null,usuario_nome:USR.nome});}catch{}}
    toast(OS_ID?'OS atualizada!':'OS criada!');
    setTimeout(()=>location.href='os.html',900);
  }catch(err){
    toast('Erro: '+err.message,'err');
    btn.disabled=false;_SALVANDO=false;
    document.getElementById('btn-txt').textContent='Salvar';
  }
}

// ── INIT ─────────────────────────────────────────────────
Promise.all([loadMods(),loadStatus(),loadOpcoesAp()]).then(()=>loadOS());
</script>
