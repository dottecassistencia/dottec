<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NF-e — Dottec Assistência</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{--cyan:#29B8C2;--cyan-dark:#1E9099;--cyan-bg:#E3F4F5;--coral:#E8604A;--coral-dark:#C94835;--coral-bg:#FBE9E5;--dark:#1C1C1A;--text:#2C2C2A;--sub:#8A887F;--border:#EAE7DF;--bg:#EDEAE3;--white:#FFFFFF;--amber:#9A6000;--amber-bg:#FBEEDB;--green:#3B6D11;--green-bg:#EAF3DE;--slate:#3A4A6B;--slate-bg:#EEF0F5}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Figtree',sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at 12% -8%,rgba(41,184,194,.10),transparent 42%),var(--bg)}
  .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:1.1rem 2rem}
  .crumb{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .back-btn{width:36px;height:36px;border-radius:10px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px;cursor:pointer;text-decoration:none;flex-shrink:0;transition:background .15s}
  .back-btn:hover{background:#E2DFD6}
  .crumb-title{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--dark)}
  .crumb-sub{font-size:12px;color:var(--sub);margin-top:1px}
  .content{max-width:1200px;margin:0 auto;padding:2rem}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
  .metric{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem}
  .metric-label{font-size:10.5px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
  .metric-value{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--dark)}
  .metric-value.green{color:var(--green)}.metric-value.cyan{color:var(--cyan-dark)}.metric-value.amber{color:var(--amber)}.metric-value.coral{color:var(--coral)}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
  .btn{height:40px;padding:0 16px;border-radius:10px;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px;transition:background .15s,transform .1s;text-decoration:none}
  .btn:active{transform:scale(.97)}
  .btn-cyan{background:var(--cyan);color:#fff}.btn-cyan:hover{background:var(--cyan-dark)}
  .filters{display:flex;gap:6px}
  .filter-btn{height:34px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--sub);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Figtree',sans-serif}
  .filter-btn.active{background:var(--cyan-bg);color:var(--cyan-dark);border-color:rgba(41,184,194,.4)}
  .search-wrap{position:relative;margin-left:auto}
  .search-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:16px}
  .search-wrap input{width:240px;height:40px;padding:0 14px 0 38px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s;text-transform:uppercase}
  .search-wrap input::placeholder{text-transform:none}
  .search-wrap input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.13)}
  .table-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);padding:12px 16px;border-bottom:1px solid var(--border);background:#FAFAF7}
  thead th.right{text-align:right}
  tbody td{padding:12px 16px;font-size:13.5px;color:var(--text);border-bottom:1px solid #F2F0EA}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s;cursor:pointer}
  tbody tr:hover{background:#FAFAF7}
  .status-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px}
  .status-pill.RASCUNHO{background:#F0EFEA;color:var(--sub)}
  .status-pill.PENDENTE{background:var(--amber-bg);color:var(--amber)}
  .status-pill.AUTORIZADA{background:var(--green-bg);color:var(--green)}
  .status-pill.REJEITADA{background:var(--coral-bg);color:var(--coral)}
  .status-pill.CANCELADA{background:#F0EFEA;color:var(--sub)}
  .td-total{text-align:right;font-family:'Lora',serif;font-size:15px;font-weight:700;color:var(--dark)}
  .act-btn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s}
  .act-view{background:var(--cyan-bg);color:var(--cyan-dark)}.act-view:hover{background:var(--cyan);color:#fff}
  .act-xml{background:var(--slate-bg);color:var(--slate)}.act-xml:hover{background:var(--slate);color:#fff}
  .act-cancel{background:var(--coral-bg);color:var(--coral)}.act-cancel:hover{background:var(--coral);color:#fff}
  .empty-row td{padding:3rem 1rem;text-align:center;color:var(--sub)}
  .empty-row i{font-size:32px;display:block;margin-bottom:10px;opacity:.35}
  .table-footer{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid var(--border);font-size:12.5px;color:var(--sub)}
  /* MODAL DETALHE */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,28,26,.45);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:20px;width:100%;max-width:640px;box-shadow:0 24px 64px rgba(0,0,0,.18);margin:auto}
  .modal-head{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--dark)}
  .modal-close{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--sub)}
  .modal-body{padding:1.5rem}
  .det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
  .det-item{background:var(--bg);border-radius:10px;padding:10px 12px}
  .det-label{font-size:10.5px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .det-value{font-size:13.5px;font-weight:600;color:var(--dark);word-break:break-all}
  .section-mini{font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .6rem;display:flex;align-items:center;gap:7px}
  .section-mini::after{content:'';flex:1;height:1px;background:var(--border)}
  .itens-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .itens-table th{text-align:left;font-size:10.5px;font-weight:700;color:var(--sub);text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--border);background:#FAFAF7}
  .itens-table td{padding:8px 10px;border-bottom:1px solid #F2F0EA}
  .modal-foot{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .btn-transmitir{height:40px;padding:0 18px;border-radius:10px;border:none;background:var(--cyan);color:#fff;font-family:'Figtree',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s}
  .btn-transmitir:hover{background:var(--cyan-dark)}
  .btn-download{height:40px;padding:0 16px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);font-family:'Figtree',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s}
  .btn-download:hover{background:var(--bg)}
  .transmit-aviso{background:var(--amber-bg);border:1px solid rgba(154,96,0,.2);border-radius:10px;padding:10px 14px;font-size:12.5px;color:var(--amber);display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
  .toast{position:fixed;top:1.5rem;right:1.5rem;z-index:999;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateX(140%);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
  .toast.show{transform:translateX(0)}
  .toast.success{background:#E6FAF8;color:#0F6E56;border:1px solid rgba(15,110,86,.2)}
  .toast.error{background:var(--coral-bg);color:var(--coral-dark);border:1px solid rgba(232,96,74,.2)}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="toast" id="toast"><i id="ti" class="ti ti-check"></i><span id="tm"></span></div>
<div class="modal-overlay" id="modal-det" onclick="if(event.target===this)fecharDet()">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="det-title">NF-e</div><button class="modal-close" onclick="fecharDet()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body" id="det-body"></div>
    <div class="modal-foot" id="det-foot"></div>
  </div>
</div>
<header class="topbar">
  <div class="crumb">
    <a class="back-btn" href="fiscal.html"><i class="ti ti-arrow-left"></i></a>
    <div><div class="crumb-title">NF-e — Nota Fiscal Eletrônica</div><div class="crumb-sub">Modelo 55 · Simples Nacional</div></div>
  </div>
</header>
<main class="content">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Autorizadas este mês</div><div class="metric-value green" id="m-auth">—</div></div>
    <div class="metric"><div class="metric-label">Pendentes</div><div class="metric-value amber" id="m-pend">—</div></div>
    <div class="metric"><div class="metric-label">Rejeitadas</div><div class="metric-value coral" id="m-rej">—</div></div>
    <div class="metric"><div class="metric-label">Total faturado</div><div class="metric-value cyan" id="m-total">R$ —</div></div>
  </div>
  <div class="toolbar">
    <a class="btn btn-cyan" href="nfe-nova.html"><i class="ti ti-plus"></i> Nova NF-e</a>
    <div class="filters">
      <button class="filter-btn active" id="fs-todos" onclick="setFiltro('TODOS')">Todas</button>
      <button class="filter-btn" id="fs-rascunho" onclick="setFiltro('RASCUNHO')">Rascunho</button>
      <button class="filter-btn" id="fs-pendente" onclick="setFiltro('PENDENTE')">Pendentes</button>
      <button class="filter-btn" id="fs-autorizada" onclick="setFiltro('AUTORIZADA')">Autorizadas</button>
      <button class="filter-btn" id="fs-rejeitada" onclick="setFiltro('REJEITADA')">Rejeitadas</button>
    </div>
    <div class="search-wrap"><i class="ti ti-search"></i><input type="text" id="busca" placeholder="Buscar por dest. ou número..." oninput="filtrar()"/></div>
  </div>
  <div class="table-card">
    <table>
      <thead><tr>
        <th style="width:80px">Número</th>
        <th>Destinatário</th>
        <th style="width:90px">Natureza</th>
        <th style="width:100px">Data</th>
        <th style="width:100px">Status</th>
        <th style="width:120px" class="right">Total</th>
        <th style="width:100px;text-align:right">Ações</th>
      </tr></thead>
      <tbody id="tbody"><tr class="empty-row"><td colspan="7"><i class="ti ti-loader-2" style="animation:spin .8s linear infinite"></i>Carregando...</td></tr></tbody>
    </table>
    <div class="table-footer"><span id="count">—</span><span>Dottec · CNPJ 12.227.221/0001-86</span></div>
  </div>
</main>
<script>
const SUPA_URL='https://clctxzynpfjilxmyblpg.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsY3R4enlucGZqaWx4bXlibHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NzEyNDMsImV4cCI6MjA5NTM0NzI0M30.YBGIwVFpE52KZKpOjMMMh1WCZbzDLM_adwGxxXhkIL0';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);
const fmt=v=>'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const fmtDate=d=>d?new Date(d).toLocaleDateString('pt-BR'):'—';
const mes=new Date().toISOString().slice(0,8)+'01';

let TODOS=[], FILTRO='TODOS';

function toast(msg,type='success'){
  const t=document.getElementById('toast');
  document.getElementById('ti').className='ti '+(type==='success'?'ti-check':'ti-alert-circle');
  document.getElementById('tm').textContent=msg;
  t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),4000);
}

function setFiltro(f){
  FILTRO=f;
  ['todos','rascunho','pendente','autorizada','rejeitada'].forEach(x=>{
    document.getElementById('fs-'+x).classList.toggle('active',f===x.toUpperCase()||f==='TODOS'&&x==='todos');
  });
  filtrar();
}

function filtrar(){
  const q=document.getElementById('busca').value.trim().toUpperCase();
  let lista=TODOS;
  if(FILTRO!=='TODOS') lista=lista.filter(n=>n.status===FILTRO);
  if(q) lista=lista.filter(n=>(n.dest_nome||'').toUpperCase().includes(q)||(n.numero?String(n.numero):'').includes(q));
  renderTable(lista);
}

function renderTable(lista){
  const tb=document.getElementById('tbody');
  if(!lista.length){tb.innerHTML=`<tr class="empty-row"><td colspan="7"><i class="ti ti-file-off"></i>Nenhuma NF-e encontrada.</td></tr>`;document.getElementById('count').textContent='0 notas';return;}
  tb.innerHTML=lista.map(n=>`<tr onclick="verDetalhe('${n.id}')">
    <td style="font-weight:700;color:var(--sub)">${n.numero?String(n.numero).padStart(6,'0'):'—'}</td>
    <td><div style="font-weight:600;color:var(--dark)">${n.dest_nome}</div><div style="font-size:11.5px;color:var(--sub)">${n.dest_doc||''}</div></td>
    <td style="font-size:12px;color:var(--sub)">${(n.natureza_op||'').slice(0,18)}</td>
    <td style="font-size:12.5px;color:var(--sub)">${fmtDate(n.criado_em)}</td>
    <td><span class="status-pill ${n.status}">${n.status}</span></td>
    <td class="td-total">${fmt(n.valor_total)}</td>
    <td><div style="display:flex;gap:5px;justify-content:flex-end">
      <button class="act-btn act-view" onclick="event.stopPropagation();verDetalhe('${n.id}')" title="Ver"><i class="ti ti-eye"></i></button>
      ${n.xml_gerado?`<button class="act-btn act-xml" onclick="event.stopPropagation();baixarXml('${n.id}')" title="Baixar XML"><i class="ti ti-file-download"></i></button>`:''}
      ${n.status!=='CANCELADA'&&n.status!=='AUTORIZADA'?`<button class="act-btn act-cancel" onclick="event.stopPropagation();cancelar('${n.id}')" title="Cancelar"><i class="ti ti-x"></i></button>`:''}
    </div></td>
  </tr>`).join('');
  document.getElementById('count').textContent=lista.length+' nota(s)';
}

async function load(){
  const{data}=await db.from('notas_fiscais').select('*').eq('modelo','55').order('criado_em',{ascending:false});
  TODOS=data||[];
  const auth=TODOS.filter(n=>n.status==='AUTORIZADA'&&n.criado_em>=mes+'T00:00:00');
  const pend=TODOS.filter(n=>n.status==='PENDENTE');
  const rej=TODOS.filter(n=>n.status==='REJEITADA');
  document.getElementById('m-auth').textContent=auth.length;
  document.getElementById('m-pend').textContent=pend.length;
  document.getElementById('m-rej').textContent=rej.length;
  document.getElementById('m-total').textContent=fmt(auth.reduce((s,n)=>s+Number(n.valor_total),0));
  filtrar();
}

async function verDetalhe(id){
  const n=TODOS.find(x=>x.id===id);if(!n) return;
  document.getElementById('det-title').textContent='NF-e '+(n.numero?'#'+String(n.numero).padStart(6,'0'):'Rascunho');
  document.getElementById('det-body').innerHTML='<div style="text-align:center;padding:2rem;color:var(--sub)"><i class="ti ti-loader-2" style="font-size:28px;animation:spin .8s linear infinite"></i></div>';
  document.getElementById('modal-det').classList.add('open');

  const{data:itens}=await db.from('nota_itens').select('*').eq('nota_id',id);

  const grid=[
    ['Destinatário',n.dest_nome],
    ['Documento',n.dest_doc||'—'],
    ['Status',n.status],
    ['Natureza op.',n.natureza_op],
    ['Série',n.serie],
    ['Total',fmt(n.valor_total)],
  ].map(([l,v])=>`<div class="det-item"><div class="det-label">${l}</div><div class="det-value">${v}</div></div>`).join('');

  const itensHtml=(itens||[]).map(it=>`<tr>
    <td>${it.descricao}</td>
    <td style="text-align:center">${it.quantidade}</td>
    <td style="text-align:right">${fmt(it.valor_unitario)}</td>
    <td style="text-align:right">${fmt(it.valor_total)}</td>
    <td style="text-align:center;font-size:11px">${it.cfop}</td>
    <td style="text-align:center;font-size:11px">${it.csosn||'—'}</td>
  </tr>`).join('');

  const chaveEl=n.chave?`<div style="font-size:11px;color:var(--sub);background:var(--bg);border-radius:8px;padding:8px 12px;margin-bottom:1rem;word-break:break-all"><b>Chave:</b> ${n.chave}</div>`:'';
  const rejEl=n.motivo_rejeicao?`<div style="background:var(--coral-bg);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--coral);margin-bottom:1rem"><b>Rejeição:</b> ${n.motivo_rejeicao}</div>`:'';

  document.getElementById('det-body').innerHTML=`
    <div class="det-grid">${grid}</div>
    ${chaveEl}${rejEl}
    <div class="section-mini">Itens (${(itens||[]).length})</div>
    <table class="itens-table">
      <thead><tr><th>Produto</th><th style="text-align:center">Qtd</th><th style="text-align:right">Unit.</th><th style="text-align:right">Total</th><th style="text-align:center">CFOP</th><th style="text-align:center">CSOSN</th></tr></thead>
      <tbody>${itensHtml||'<tr><td colspan="6" style="text-align:center;color:var(--sub);padding:1rem">Sem itens</td></tr>'}</tbody>
    </table>`;

  const foot=document.getElementById('det-foot');
  foot.innerHTML='';
  if(n.xml_gerado){
    const btn=document.createElement('button');
    btn.className='btn-download';btn.innerHTML='<i class="ti ti-file-download"></i> Baixar XML';
    btn.onclick=()=>baixarXml(id);
    foot.appendChild(btn);
  }
  if(n.status==='RASCUNHO'||n.status==='PENDENTE'||n.status==='REJEITADA'){
    foot.innerHTML+=`<div class="transmit-aviso"><i class="ti ti-plug-connected-x"></i><span>Transmissão à SEFAZ requer integração com API. Configure em <b>Fiscal → Configurações</b>.</span></div>`;
    const btn=document.createElement('button');
    btn.className='btn-transmitir';btn.innerHTML='<i class="ti ti-send"></i> Transmitir à SEFAZ';
    btn.onclick=()=>transmitirSimulado(id);
    foot.insertBefore(btn,foot.firstChild);
  }
}

function fecharDet(){document.getElementById('modal-det').classList.remove('open')}

function baixarXml(id){
  const n=TODOS.find(x=>x.id===id);
  if(!n||!n.xml_gerado){toast('XML não disponível.','error');return;}
  const blob=new Blob([n.xml_gerado],{type:'application/xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='NFe_'+(n.numero||id)+'_'+n.serie+'.xml';
  a.click();
}

async function transmitirSimulado(id){
  // placeholder até integração com API
  await db.from('notas_fiscais').update({status:'PENDENTE'}).eq('id',id);
  toast('Nota marcada como Pendente. Configure a API para transmissão real.','success');
  fecharDet();load();
}

async function cancelar(id){
  if(!confirm('Cancelar esta NF-e?')) return;
  await db.from('notas_fiscais').update({status:'CANCELADA'}).eq('id',id);
  toast('NF-e cancelada.','success');fecharDet();load();
}

load();
</script>
</body>
</html>
