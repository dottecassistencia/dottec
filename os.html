<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OS — Dottec</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ── VARS ── */
:root{--cyan:#29B8C2;--cd:#1E9099;--cbg:#E3F4F5;--coral:#E8604A;--cbg2:#FBE9E5;--dark:#1C1C1A;--text:#2C2C2A;--sub:#8A887F;--border:#EAE7DF;--bg:#EDEAE3;--white:#fff;--amber:#9A6000;--abg:#FBEEDB;--green:#3B6D11;--gbg:#EAF3DE;--red:#DC2626;--rbg:#FEF2F2}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Figtree',sans-serif;color:var(--text);background:var(--bg);display:flex;flex-direction:column}

/* ══════════════════════════════════════════════════════
   HEADER — COPIADO LITERALMENTE DO DASHBOARD
══════════════════════════════════════════════════════ */
.header{
  height:62px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:14px;
  flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.05);
}
.h-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.h-logo-circle{
  width:40px;height:40px;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#29B8C2,#1E9099);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(41,184,194,.3);flex-shrink:0;
}
.h-logo-circle img{width:100%;height:100%;object-fit:cover;display:block}
.h-logo-circle i{font-size:20px;color:#fff}
.h-logo-text{}
.h-logo-nome{font-family:'Lora',serif;font-size:15px;font-weight:700;color:var(--dark);line-height:1.1}
.h-logo-sub{font-size:10px;color:var(--sub)}
.h-saud{flex:1;padding-left:4px}
.h-saud-top{font-size:12px;color:var(--sub)}
.h-saud-nome{font-family:'Lora',serif;font-size:16px;font-weight:700;color:var(--dark);line-height:1.1}
.h-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.h-dt{text-align:right}
.h-hora{font-family:'Lora',serif;font-size:18px;font-weight:700;color:var(--dark);line-height:1}
.h-data{font-size:11px;color:var(--sub);margin-top:1px}
.h-perfil{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--sub);cursor:pointer;transition:all .15s;text-decoration:none;flex-shrink:0}
.h-perfil:hover{background:var(--dark);color:#fff;border-color:var(--dark)}

/* ══════════════════════════════════════════════════════
   BOLINHAS — COPIADO LITERALMENTE DO DASHBOARD
══════════════════════════════════════════════════════ */
.mod-bar{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.mods-grid{
  flex:1;display:grid;
  grid-template-columns:repeat(auto-fit,minmax(64px,1fr));
  gap:6px 4px;justify-items:center;align-items:start;
}
.mod-ball{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:inherit;cursor:pointer;width:100%;max-width:76px}
.mod-ball-icon{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;transition:transform .22s cubic-bezier(.34,1.5,.64,1),box-shadow .22s}
.mod-ball:hover .mod-ball-icon{transform:translateY(-4px) scale(1.08);box-shadow:0 8px 20px rgba(0,0,0,.13)}
.mod-ball.active .mod-ball-icon{box-shadow:0 0 0 2.5px var(--cyan),0 4px 12px rgba(41,184,194,.25)}
.mod-ball-lbl{font-size:9.5px;font-weight:700;color:var(--sub);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.mod-ball.active .mod-ball-lbl{color:var(--cyan)}
.mod-ball-bdg{position:absolute;top:-2px;right:-2px;width:15px;height:15px;border-radius:50%;background:var(--red);border:2px solid var(--white);font-size:8px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center}
.mod-more-wrap{position:relative;flex-shrink:0}
.mod-more-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:64px}
.mod-more{width:50px;height:50px;border-radius:50%;background:var(--bg);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--sub);transition:all .15s}
.mod-more:hover{background:#E2DFD6;border-color:var(--sub)}
.mod-more-lbl{font-size:9.5px;font-weight:700;color:var(--sub);text-align:center}
.mod-more-drop{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 36px rgba(0,0,0,.12);padding:6px;z-index:300;min-width:180px}
.mod-more-drop.open{display:block}
.mod-more-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text);text-decoration:none;transition:background .12s}
.mod-more-item:hover{background:var(--bg)}
.mod-more-item i{font-size:16px;width:20px;text-align:center}

/* ══ FILTROS ══ */
.filter-bar{background:var(--white);border-bottom:2px solid var(--border);flex-shrink:0}
.search-row{padding:7px 20px;border-bottom:1px solid var(--border)}
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:0 14px;height:40px;transition:border-color .2s,box-shadow .2s}
.search-box:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.1);background:var(--white)}
.search-box i{font-size:16px;color:var(--sub);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;font-size:13.5px;font-family:inherit;color:var(--dark);background:transparent;text-transform:uppercase;caret-color:var(--cyan)}
.search-box input::placeholder{text-transform:none;color:#B5B2A8}
.search-cnt{font-size:11px;color:var(--sub);flex-shrink:0}
.status-row{display:flex;align-items:center;overflow-x:auto;padding:0 12px}
.status-row::-webkit-scrollbar{display:none}
.sf{height:40px;padding:0 12px;border:none;background:transparent;font-family:'Figtree',sans-serif;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:color .15s,border-color .15s;flex-shrink:0;margin-bottom:-2px}
.sf:hover{color:var(--dark)}.sf.active{color:var(--dark);border-bottom-color:var(--cyan)}
.sf-cnt{font-size:9px;font-weight:800;padding:2px 5px;border-radius:8px;background:var(--bg);color:var(--sub);border:1px solid var(--border)}
.sf.active .sf-cnt{background:var(--dark);color:#fff;border-color:var(--dark)}
.sf-cnt.crit{background:var(--rbg);color:var(--red);border-color:rgba(220,38,38,.2)}
.sf-cnt.alta{background:var(--abg);color:var(--amber);border-color:rgba(154,96,0,.2)}
.sf-cnt.ok{background:var(--gbg);color:var(--green);border-color:rgba(59,109,17,.2)}

/* ══ TABELA ══ */
.body{flex:1;overflow-y:auto;padding:14px 20px 24px}
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--sub);padding:10px 14px;border-bottom:1px solid var(--border);background:#FAFAF7;white-space:nowrap}
tbody td{padding:10px 14px;font-size:13px;color:var(--text);border-bottom:1px solid #F2F0EA;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s;cursor:pointer}
tbody tr:hover{background:#FAFAF7}
.td-num{font-family:'Lora',serif;font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap}
.td-cl{font-weight:600;color:var(--dark)}
.td-device{font-size:12px;color:var(--dark);font-weight:600}
.td-cor{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--sub);margin-top:2px}
.cor-dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.td-val{font-size:12.5px;font-weight:700;color:var(--dark);white-space:nowrap}
.td-tempo{font-size:11.5px;color:var(--sub);white-space:nowrap}
.td-acts{display:flex;gap:4px;justify-content:flex-end}
.act{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0}
.act-ed{background:var(--bg);color:var(--sub)}.act-ed:hover{background:var(--cbg);color:var(--cd)}
.act-del{background:var(--bg);color:var(--sub)}.act-del:hover{background:var(--rbg);color:var(--red)}
.act-can{background:var(--bg);color:var(--sub)}.act-can:hover{background:var(--abg);color:var(--amber)}
.tf{padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--sub);display:flex;align-items:center;justify-content:space-between}
.empty{padding:3rem;text-align:center;color:var(--sub)}.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.2}
.sb{font-size:10px;font-weight:700;padding:3px 9px;border-radius:16px;white-space:nowrap;display:inline-block;cursor:pointer;transition:opacity .15s;user-select:none}
.sb:hover{opacity:.75}
.sb-aberta{background:var(--cbg);color:var(--cd)}.sb-execucao{background:var(--abg);color:var(--amber)}
.sb-orcamento{background:var(--rbg);color:var(--red);animation:pulse 1.4s ease infinite}
.sb-aguardando{background:#FEF3C7;color:#92400E}.sb-peca{background:#F3E8FF;color:#6D28D9}
.sb-pronta{background:var(--gbg);color:var(--green);animation:pulse 1.4s ease infinite}
.sb-entregue{background:#F1F5F9;color:#64748B}.sb-cancelada{background:#F8F8F7;color:var(--sub)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}

/* ══ MODAIS ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,28,26,.5);z-index:800;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-sm{max-width:400px}.modal-md{max-width:500px}
.modal-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.mh-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.modal-title{font-family:'Lora',serif;font-size:15px;font-weight:700;color:var(--dark);flex:1}
.modal-x{width:26px;height:26px;border-radius:7px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--sub)}
.modal-body{padding:1rem 1.25rem}
.modal-foot{padding:.85rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-sec{height:36px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-red{height:36px;padding:0 16px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.btn-amb{height:36px;padding:0 16px;border-radius:8px;border:none;background:var(--amber);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.btn-cyan{height:36px;padding:0 16px;border-radius:8px;border:none;background:var(--cyan);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-cyan:hover{background:var(--cd)}
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:9px;background:#FAFAF7;color:var(--dark);font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s;padding:0 11px;height:40px}
.field select:focus,.field textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.1);background:var(--white)}
.field textarea{height:72px;resize:none;padding:9px 11px}
.hist-list{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:4px;max-height:200px;overflow-y:auto}
.hist-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-bottom:1px solid #F2F0EA;font-size:12px}
.hist-item:last-child{border-bottom:none}
.hist-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;background:var(--cyan)}
.hist-info{flex:1}.hist-st{font-weight:700;color:var(--dark)}.hist-obs{color:var(--sub);margin-top:1px}
.hist-meta{font-size:10.5px;color:var(--sub);flex-shrink:0;text-align:right;white-space:nowrap}
.toast{position:fixed;bottom:1.25rem;right:1.25rem;z-index:999;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#E6FAF8;color:#0F6E56;border:1px solid rgba(15,110,86,.2)}
.toast.err{background:var(--cbg2);color:#C94835;border:1px solid rgba(200,72,53,.2)}
.cl-nome-link{font-weight:700;color:var(--dark);cursor:pointer;text-decoration:none;font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.cl-nome-link:hover{color:var(--cd);text-decoration:underline}
.cl-wa{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:#25D366;text-decoration:none;margin-top:2px;font-weight:600}
.cl-wa:hover{opacity:.8}
.cl-wa i{font-size:12px}
.field label{display:block;font-size:9.5px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.field input{width:100%;height:38px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:#FAFAF7;color:var(--dark);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.1);background:var(--white)}
.h-btn{height:34px;padding:0 14px;border-radius:9px;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .15s;text-decoration:none;white-space:nowrap;background:var(--cyan);color:#fff;margin-left:auto}
.h-btn:hover{background:var(--cd)}
</style>
</head>
<body>
<div class="toast" id="toast"><i id="ti" class="ti ti-check"></i><span id="tm"></span></div>

<!-- MODAL EXCLUIR -->
<div class="overlay" id="ov-del">
  <div class="modal modal-sm">
    <div class="modal-head"><div class="mh-ico" style="background:var(--rbg);color:var(--red)"><i class="ti ti-trash"></i></div><div class="modal-title">Excluir OS</div></div>
    <div class="modal-body" style="font-size:13.5px;color:var(--text);line-height:1.5">Tem certeza que deseja excluir a <strong id="del-num" style="color:var(--dark)"></strong>?</div>
    <div class="modal-foot"><button class="btn-sec" onclick="fecha('del')">Cancelar</button><button class="btn-red" onclick="confirmarDel()"><i class="ti ti-trash"></i> Excluir</button></div>
  </div>
</div>

<!-- MODAL CANCELAR -->
<div class="overlay" id="ov-can">
  <div class="modal modal-sm">
    <div class="modal-head"><div class="mh-ico" style="background:var(--abg);color:var(--amber)"><i class="ti ti-ban"></i></div><div class="modal-title">Cancelar OS</div></div>
    <div class="modal-body" style="font-size:13.5px;color:var(--text);line-height:1.5">Deseja cancelar a <strong id="can-num" style="color:var(--dark)"></strong>?</div>
    <div class="modal-foot"><button class="btn-sec" onclick="fecha('can')">Voltar</button><button class="btn-amb" onclick="confirmarCan()"><i class="ti ti-ban"></i> Cancelar OS</button></div>
  </div>
</div>

<!-- MODAL STATUS -->
<div class="overlay" id="ov-status">
  <div class="modal modal-md">
    <div class="modal-head">
      <div class="mh-ico" style="background:var(--cbg);color:var(--cd)"><i class="ti ti-flag"></i></div>
      <div class="modal-title">Status — <span id="st-num"></span></div>
      <button class="modal-x" onclick="fecha('status')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Novo status</label><select id="st-sel"></select></div>
      <div class="field">
        <label>Observação <span style="font-weight:400;text-transform:none;font-size:9px">(opcional)</span></label>
        <textarea id="st-obs" placeholder="Ex: cliente aprovou orçamento..."></textarea>
      </div>
      <div id="st-hist-wrap" style="display:none">
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 6px">Histórico</div>
        <div class="hist-list" id="st-hist"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="fecha('status')">Cancelar</button>
      <button class="btn-cyan" onclick="confirmarStatus()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- ══ HEADER — IDÊNTICO AO DASHBOARD ══ -->
<header class="header">
  <a class="h-logo" href="dashboard.html">
    <div class="h-logo-circle">
      <img src="logo.png" alt="Dottec" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <span style="display:none;width:100%;height:100%;align-items:center;justify-content:center"><i class="ti ti-device-laptop"></i></span>
    </div>
    <div class="h-logo-text">
      <div class="h-logo-nome">Dottec</div>
      <div class="h-logo-sub">Assistência Inteligente</div>
    </div>
  </a>
  <div class="h-saud">
    <div class="h-saud-top" id="h-saud-top">—</div>
    <div class="h-saud-nome" id="h-saud-nome">—</div>
  </div>
  <div class="h-right">
    <div class="h-dt">
      <div class="h-hora" id="h-hora">—</div>
      <div class="h-data" id="h-data">—</div>
    </div>
    <a class="h-perfil" href="#" title="Meu perfil"><i class="ti ti-id-badge-2"></i></a>
    <a class="h-btn" href="os-nova.html"><i class="ti ti-plus"></i> Nova OS</a>
  </div>
</header>

<!-- ══ BOLINHAS — IDÊNTICAS AO DASHBOARD ══ -->
<div class="mod-bar">
  <div class="mods-grid" id="mods-grid">
    <div style="color:var(--sub)"><i class="ti ti-loader-2 spin"></i></div>
  </div>
  <div class="mod-more-wrap" id="more-wrap" style="display:none">
    <div class="mod-more-btn" onclick="toggleMore(event)">
      <div class="mod-more"><i class="ti ti-dots"></i></div>
      <span class="mod-more-lbl">mais</span>
    </div>
    <div class="mod-more-drop" id="more-drop"></div>
  </div>
</div>

<!-- ══ FILTROS ══ -->
<div class="filter-bar">
  <div class="search-row">
    <div class="search-box">
      <i class="ti ti-search"></i>
      <input type="text" id="busca" placeholder="Buscar por Nº, cliente, dispositivo ou cor..." autocomplete="off" oninput="filtrar()"/>
      <span class="search-cnt" id="s-cnt"></span>
    </div>
  </div>
  <div class="status-row" id="status-row"></div>
</div>

<!-- ══ TABELA ══ -->
<div class="body">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:64px">Nº</th>
          <th style="width:80px">Data</th>
          <th>Cliente</th>
          <th>Dispositivo / Cor</th>
          <th style="width:130px;text-align:center">Status</th>
          <th style="width:90px">Valor</th>
          <th style="width:60px">Tempo</th>
          <th style="width:70px"></th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="8"><div class="empty"><i class="ti ti-loader-2 spin"></i></div></td></tr></tbody>
    </table>
    <div class="tf"><span id="tf-cnt">—</span><span>Dottec · OS</span></div>
  </div>
</div>

<script>
const SB_URL='https://clctxzynpfjilxmyblpg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsY3R4enlucGZqaWx4bXlibHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NzEyNDMsImV4cCI6MjA5NTM0NzI0M30.YBGIwVFpE52KZKpOjMMMh1WCZbzDLM_adwGxxXhkIL0';
if(!window._dottecDb) window._dottecDb=supabase.createClient(SB_URL,SB_KEY);
const db=window._dottecDb;
let USR={nome:'Gaza',perfil:'ADMIN',id:null};
try{const s=sessionStorage.getItem('dottec_sessao');if(s)USR=JSON.parse(s);}catch{}

/* ── RELÓGIO — COPIADO DO DASHBOARD ── */
function tick(){
  const n=new Date(),h=n.getHours();
  document.getElementById('h-saud-top').textContent=h<12?'Bom dia,':h<18?'Boa tarde,':'Boa noite,';
  document.getElementById('h-saud-nome').textContent=USR.nome;
  document.getElementById('h-hora').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('h-data').textContent=n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}
tick();setInterval(tick,10000);

const fmtDt=d=>new Date(d).toLocaleDateString('pt-BR');
const fmtDtHr=d=>new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const tempo=d=>{const m=Math.floor((new Date()-new Date(d))/60000);if(m<60)return m+'min';const hh=Math.floor(m/60);if(hh<24)return hh+'h';return Math.floor(hh/24)+'d';};

// mapa cor→hex para o ponto colorido
const COR_HEX={'PRETO':'#1C1C1A','BRANCO':'#F5F5F5','GRAFITE':'#4A4A4A','DOURADO':'#C9A84C','PRATA':'#C0C0C0','AZUL':'#1D4ED8','VERDE':'#16A34A','VERMELHO':'#DC2626','ROSA':'#EC4899','AMARELO':'#EAB308','ROXO':'#7C3AED','LARANJA':'#EA580C','TITÂNIO':'#8B8589'};

const SB_CLS={'ABERTA':'sb-aberta','EM EXECUÇÃO':'sb-execucao','PASSAR ORÇAMENTO':'sb-orcamento','AGUARDANDO APROVAÇÃO':'sb-aguardando','AGUARDANDO PEÇA':'sb-peca','PRONTA':'sb-pronta','ENTREGUE':'sb-entregue','CANCELADA':'sb-cancelada'};
const SB_PRI={'PASSAR ORÇAMENTO':'crit','PRONTA':'crit','AGUARDANDO APROVAÇÃO':'alta','EM EXECUÇÃO':'alta','ENTREGUE':'ok'};
let TODOS=[], STATUS_CFG=[], FILTRO='', OS_ACT=null, ST_OS_ID=null, TOTAIS={};

/* ── MÓDULOS — COPIADO DO DASHBOARD ── */
const MODS=[
  {id:'os',lbl:'OS',ico:'ti-tool',href:'os.html',bg:'linear-gradient(135deg,#FBE9E5,#FFD5CC)',c:'#C94835'},
  {id:'venda',lbl:'Venda',ico:'ti-shopping-cart',href:'venda.html',bg:'linear-gradient(135deg,#FCE7F3,#FBC8E4)',c:'#BE185D'},
  {id:'caixa',lbl:'Caixa',ico:'ti-wallet',href:'caixa.html',bg:'linear-gradient(135deg,#EAF3DE,#C8E89E)',c:'#3B6D11'},
  {id:'financeiro',lbl:'Financeiro',ico:'ti-currency-dollar',href:'financeiro.html',bg:'linear-gradient(135deg,#EAF3DE,#C8E89E)',c:'#3B6D11'},
  {id:'orcamentos',lbl:'Orçamentos',ico:'ti-calculator',href:'orcamentos.html',bg:'linear-gradient(135deg,#CFFAFE,#A5F0F9)',c:'#0E7490'},
  {id:'cadastro',lbl:'Cadastro',ico:'ti-users',href:'pessoas.html',bg:'linear-gradient(135deg,#E3F4F5,#B8EDF0)',c:'#1E9099'},
  {id:'produtos',lbl:'Produtos',ico:'ti-package',href:'produtos.html',bg:'linear-gradient(135deg,#FBE9E5,#FFD5CC)',c:'#C94835'},
  {id:'compras',lbl:'Compras',ico:'ti-truck-delivery',href:'compras.html',bg:'linear-gradient(135deg,#EEF0F5,#D4D9E8)',c:'#3A4A6B'},
  {id:'fiscal',lbl:'Fiscal',ico:'ti-file-invoice',href:'fiscal.html',bg:'linear-gradient(135deg,#EEEAF8,#D8D0F4)',c:'#5B3FA6'},
  {id:'config',lbl:'Config.',ico:'ti-settings',href:'configuracoes.html',bg:'linear-gradient(135deg,#F0EDE7,#DDD9D0)',c:'#5A5855'},
];
let ATIVOS=['os','venda','caixa','financeiro','orcamentos','cadastro','produtos','compras'];

async function loadMods(){
  if(USR.id){
    try{
      const{data}=await db.from('configuracoes_sistema').select('valor').eq('chave','mods_u_'+USR.id).maybeSingle();
      if(data?.valor){try{ATIVOS=JSON.parse(data.valor);}catch{}}
    }catch{}
  }
  renderMods();
}
function renderMods(){
  const ativos=ATIVOS.slice(0,8).map(id=>MODS.find(m=>m.id===id)).filter(Boolean);
  const resto=MODS.filter(m=>!ATIVOS.slice(0,8).includes(m.id));
  document.getElementById('mods-grid').innerHTML=ativos.map(m=>`
    <a class="mod-ball${m.id==='os'?' active':''}" href="${m.href}" title="${m.lbl}">
      <div class="mod-ball-icon" style="background:${m.bg}">
        <i class="ti ${m.ico}" style="color:${m.c}"></i>
        ${m.id==='os'?'<span class="mod-ball-bdg" id="os-bdg" style="display:none">!</span>':''}
      </div>
      <span class="mod-ball-lbl">${m.lbl}</span>
    </a>`).join('');
  const mw=document.getElementById('more-wrap');
  if(resto.length){
    mw.style.display='block';
    document.getElementById('more-drop').innerHTML=resto.map(m=>`
      <a class="mod-more-item" href="${m.href}"><i class="ti ${m.ico}" style="color:${m.c}"></i>${m.lbl}</a>`).join('');
  } else mw.style.display='none';
}
function toggleMore(e){e.stopPropagation();document.getElementById('more-drop').classList.toggle('open');}
document.addEventListener('click',()=>document.getElementById('more-drop')?.classList.remove('open'));

/* ── LOAD ── */
async function load(){
  const safe=async p=>{try{return await p;}catch{return{data:[]};}};
  const[{data:os},{data:sc},{data:aps}]=await Promise.all([
    db.from('ordens_servico').select('id,numero,cliente_nome,cliente_celular,cliente_doc,cliente_email,pessoa_id,aparelho,defeito,status,criado_em').order('criado_em',{ascending:false}).limit(300),
    db.from('status_config').select('nome,alerta_prioridade').eq('modulo','OS').eq('ativo',true).order('ordem'),
    safe(db.from('os_aparelhos').select('os_id,modelo,cor,marca').eq('ordem',1)),
  ]);
  TODOS=os||[]; STATUS_CFG=sc||[];
  // mapa aparelho por os_id (primeiro aparelho)
  const AP_MAP={};
  (aps||[]).forEach(a=>{AP_MAP[a.os_id]=a;});
  // enriquece TODOS com dados do primeiro aparelho
  TODOS.forEach(o=>{
    const ap=AP_MAP[o.id];
    if(ap){o._modelo=ap.modelo||''; o._cor=ap.cor||''; o._marca=ap.marca||'';}
    else{o._modelo=''; o._cor=''; o._marca='';}
    o._tel=o.cliente_celular||'';
    o._doc=o.cliente_doc||'';
    o._email=o.cliente_email||'';
    o._pessoa_id=o.pessoa_id||'';
  });
  buildStatusRow();
  render();
}

function buildStatusRow(){
  const cnts={};
  TODOS.forEach(o=>cnts[o.status]=(cnts[o.status]||0)+1);
  let html=`<button class="sf${FILTRO===''?' active':''}" onclick="setFiltro('')">Todos <span class="sf-cnt">${TODOS.length}</span></button>`;
  const ordem=STATUS_CFG.map(s=>s.nome);
  const todos=[...new Set([...ordem,...Object.keys(cnts)])];
  todos.forEach(s=>{
    const cnt=cnts[s]||0; if(!cnt) return;
    const cfg=STATUS_CFG.find(x=>x.nome===s);
    const p=cfg?.alerta_prioridade?.toLowerCase()||'';
    const cls=p==='critica'?'crit':p==='alta'?'alta':SB_PRI[s]||'';
    html+=`<button class="sf${FILTRO===s?' active':''}" onclick="setFiltro('${s}')">${s} <span class="sf-cnt ${cls}">${cnt}</span></button>`;
  });
  document.getElementById('status-row').innerHTML=html;
}
function setFiltro(s){FILTRO=s;buildStatusRow();render();}
function filtrar(){render();}
function render(){
  const q=document.getElementById('busca').value.trim().toUpperCase();
  let lista=TODOS;
  if(FILTRO) lista=lista.filter(o=>o.status===FILTRO);
  if(q) lista=lista.filter(o=>
    String(o.numero).padStart(4,'0').includes(q)||
    (o.cliente_nome||'').toUpperCase().includes(q)||
    (o.aparelho||'').toUpperCase().includes(q)||
    (o._modelo||'').toUpperCase().includes(q)||
    (o._cor||'').toUpperCase().includes(q)||
    (o.defeito||'').toUpperCase().includes(q)
  );
  document.getElementById('s-cnt').textContent=q?lista.length+' resultado'+(lista.length!==1?'s':''):'';
  document.getElementById('tf-cnt').textContent=lista.length+' OS';
  if(!lista.length){
    document.getElementById('tbody').innerHTML=`<tr><td colspan="8"><div class="empty"><i class="ti ti-search-off"></i>Nenhuma OS</div></td></tr>`;
    return;
  }
  const isAdmin=USR.perfil==='ADMIN';
  document.getElementById('tbody').innerHTML=lista.map(o=>{
    // dispositivo: usa dado do os_aparelhos se existir, senão campo legado
    const device=o._modelo?[o._marca,o._modelo].filter(Boolean).join(' '):(o.aparelho||'—');
    const corUp=(o._cor||'').toUpperCase();
    const hex=COR_HEX[corUp]||null;
    const corHtml=o._cor?`<div class="td-cor">${hex?`<span class="cor-dot" style="background:${hex}"></span>`:''}<span>${o._cor}</span></div>`:'';
    return`<tr onclick="irOS('${o.id}',event)">
      <td><span class="td-num">${String(o.numero).padStart(4,'0')}</span></td>
      <td class="td-tempo">${fmtDt(o.criado_em)}</td>
      <td style="font-weight:600;color:var(--dark)">${o.cliente_nome||'—'}</td>
      <td><div class="td-device">${device}</div>${corHtml}</td>
      <td onclick="event.stopPropagation()" style="text-align:center">
        <span class="sb ${SB_CLS[o.status]||''}" onclick="abrirStatus('${o.id}','#${String(o.numero).padStart(4,'0')}','${o.status.replace(/'/g,"\\'")}')">
          ${o.status}
        </span>
      </td>
      <td class="td-val">${TOTAIS[o.id]>0?'R$ '+(TOTAIS[o.id]).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—'}</td>
      <td class="td-tempo">${tempo(o.criado_em)}</td>
      <td onclick="event.stopPropagation()"><div class="td-acts">
        <button class="act act-ed" onclick="irOS('${o.id}')" title="Editar"><i class="ti ti-pencil"></i></button>
        ${isAdmin
          ?`<button class="act act-del" onclick="abrirDel('${o.id}','#${String(o.numero).padStart(4,'0')}')" title="Excluir"><i class="ti ti-trash"></i></button>`
          :o.status!=='CANCELADA'
            ?`<button class="act act-can" onclick="abrirCan('${o.id}','#${String(o.numero).padStart(4,'0')}')" title="Cancelar"><i class="ti ti-ban"></i></button>`
            :''
        }
      </div></td>
    </tr>`;
  }).join('');
}
function irOS(id,e){if(e&&e.target.closest('.act,.sb'))return;location.href='os-nova.html?id='+id;}

/* ── TOAST / MODAIS ── */
function toast(msg,t='ok'){const el=document.getElementById('toast');document.getElementById('ti').className='ti '+(t==='ok'?'ti-check':'ti-alert-circle');document.getElementById('tm').textContent=msg;el.className='toast '+t+' show';setTimeout(()=>el.classList.remove('show'),3500);}
function fecha(id){document.getElementById('ov-'+id)?.classList.remove('open');}
['del','can','status','cl-edit'].forEach(id=>document.getElementById('ov-'+id)?.addEventListener('click',function(e){if(e.target===this)fecha(id);}));

function abrirDel(id,num){OS_ACT=id;document.getElementById('del-num').textContent=num;document.getElementById('ov-del').classList.add('open');}
async function confirmarDel(){const{error}=await db.from('ordens_servico').delete().eq('id',OS_ACT);fecha('del');if(error){toast('Erro ao excluir.','err');return;}toast('OS excluída.');TODOS=TODOS.filter(o=>o.id!==OS_ACT);buildStatusRow();render();}
function abrirCan(id,num){OS_ACT=id;document.getElementById('can-num').textContent=num;document.getElementById('ov-can').classList.add('open');}
async function confirmarCan(){const{error}=await db.from('ordens_servico').update({status:'CANCELADA'}).eq('id',OS_ACT);fecha('can');if(error){toast('Erro.','err');return;}toast('OS cancelada.');const o=TODOS.find(x=>x.id===OS_ACT);if(o)o.status='CANCELADA';buildStatusRow();render();}

/* ── MODAL STATUS ── */
async function abrirStatus(id,num,statusAtual){
  ST_OS_ID=id;
  document.getElementById('st-num').textContent=num;
  document.getElementById('st-obs').value='';
  const lista=STATUS_CFG.length?STATUS_CFG.map(s=>s.nome):['ABERTA','EM EXECUÇÃO','PASSAR ORÇAMENTO','AGUARDANDO APROVAÇÃO','AGUARDANDO PEÇA','PRONTA','ENTREGUE','CANCELADA'];
  document.getElementById('st-sel').innerHTML=lista.map(s=>`<option value="${s}"${s===statusAtual?' selected':''}>${s}</option>`).join('');
  let hist=[];
  try{const{data:hd}=await db.from('os_historico').select('status,observacao,usuario_nome,criado_em').eq('os_id',id).order('criado_em',{ascending:false}).limit(15);hist=hd||[];}catch{}
  const hw=document.getElementById('st-hist-wrap');
  if(hist.length){
    hw.style.display='block';
    document.getElementById('st-hist').innerHTML=hist.map(h=>`
      <div class="hist-item">
        <div class="hist-pip"></div>
        <div class="hist-info"><div class="hist-st">${h.status}</div>${h.observacao?`<div class="hist-obs">${h.observacao}</div>`:''}</div>
        <div class="hist-meta">${fmtDtHr(h.criado_em)}<br><span style="font-size:10px">${h.usuario_nome||''}</span></div>
      </div>`).join('');
  } else hw.style.display='none';
  document.getElementById('ov-status').classList.add('open');
}
async function confirmarStatus(){
  const novoStatus=document.getElementById('st-sel').value;
  if(!novoStatus){toast('Selecione um status.','err');return;}
  const obs=document.getElementById('st-obs').value.trim();
  const{error}=await db.from('ordens_servico').update({status:novoStatus,atualizado_em:new Date().toISOString()}).eq('id',ST_OS_ID);
  if(error){toast('Erro ao atualizar.','err');return;}
  try{await db.from('os_historico').insert({os_id:ST_OS_ID,status:novoStatus,observacao:obs.toUpperCase()||null,usuario_id:USR.id||null,usuario_nome:USR.nome});}catch{}
  fecha('status');
  toast('Status atualizado!');
  const o=TODOS.find(x=>x.id===ST_OS_ID);if(o)o.status=novoStatus;
  buildStatusRow();render();
}


// ── MODAL EDITAR CLIENTE ─────────────────────────────
let _clEditOsId=null, _clEditPessoaId=null;
function abrirClEdit(osId,nome,tel,doc,email,pessoaId){
  _clEditOsId=osId; _clEditPessoaId=pessoaId||null;
  document.getElementById('cle-nome').value=nome;
  document.getElementById('cle-tel').value=tel;
  document.getElementById('cle-doc').value=doc;
  document.getElementById('cle-email').value=email;
  document.getElementById('ov-cl-edit').classList.add('open');
  setTimeout(()=>document.getElementById('cle-nome').focus(),60);
}
async function salvarClienteEdit(){
  const nome=document.getElementById('cle-nome').value.trim().toUpperCase();
  const tel=document.getElementById('cle-tel').value.trim();
  const doc=document.getElementById('cle-doc').value.replace(/\D/g,'');
  const email=document.getElementById('cle-email').value.trim();
  if(!nome){toast('Informe o nome.','err');return;}
  // atualiza a OS
  const{error}=await db.from('ordens_servico').update({
    cliente_nome:nome,
    cliente_celular:tel||null,
    cliente_doc:doc||null,
    cliente_email:email||null,
    atualizado_em:new Date().toISOString()
  }).eq('id',_clEditOsId);
  if(error){toast('Erro: '+error.message,'err');return;}
  // atualiza a pessoa no cache local se existir
  if(_clEditPessoaId){
    await db.from('pessoas').update({
      nome,celular:tel||null,
      documento:doc||null,email:email||null
    }).eq('id',_clEditPessoaId).catch(()=>{});
  }
  fecha('cl-edit');
  toast('Cliente atualizado!');
  // atualiza localmente sem recarregar tudo
  const o=TODOS.find(x=>x.id===_clEditOsId);
  if(o){o.cliente_nome=nome;o._tel=tel;o._doc=doc;o._email=email;}
  render();
}

/* ── INIT ── */
loadMods();
load();
</script>
