<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ordens de Serviço — Dottec</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--cyan:#29B8C2;--cd:#1E9099;--cbg:#E3F4F5;--coral:#E8604A;--cbg2:#FBE9E5;--dark:#1C1C1A;--text:#2C2C2A;--sub:#8A887F;--border:#EAE7DF;--bg:#EDEAE3;--white:#fff;--amber:#9A6000;--abg:#FBEEDB;--green:#3B6D11;--gbg:#EAF3DE;--red:#DC2626;--rbg:#FEF2F2}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Figtree',sans-serif;color:var(--text);min-height:100vh;background:var(--bg)}
/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.back{width:34px;height:34px;border-radius:9px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text);text-decoration:none;flex-shrink:0;transition:background .15s}
.back:hover{background:#E2DFD6}
.page-title{font-family:'Lora',serif;font-size:18px;font-weight:700;color:var(--dark);flex:1}
.btn{height:38px;padding:0 16px;border-radius:9px;border:none;cursor:pointer;font-family:'Figtree',sans-serif;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px;transition:background .15s;text-decoration:none}
.btn-cyan{background:var(--cyan);color:#fff}.btn-cyan:hover{background:var(--cd)}
/* CONTENT */
.content{max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem}
/* FILTROS */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:9px;padding:0 12px;height:38px}
.search-box:focus-within{border-color:var(--cyan)}
.search-box i{font-size:16px;color:var(--sub)}
.search-box input{border:none;outline:none;font-size:13.5px;font-family:inherit;color:var(--dark);background:transparent;flex:1;text-transform:uppercase}
.search-box input::placeholder{text-transform:none;color:#B5B2A8}
.status-filter{display:flex;gap:5px;flex-wrap:wrap}
.sf{height:32px;padding:0 11px;border-radius:7px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.sf.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.sf.crit{border-color:var(--red)}.sf.alta{border-color:var(--amber)}
/* TABELA */
.table-card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);padding:11px 14px;border-bottom:1px solid var(--border);background:#FAFAF7;white-space:nowrap}
tbody td{padding:11px 14px;font-size:13.5px;color:var(--text);border-bottom:1px solid #F2F0EA}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s;cursor:pointer}
tbody tr:hover{background:#FAFAF7}
.num{font-family:'Lora',serif;font-size:14px;font-weight:700;color:var(--dark)}
.cliente-nome{font-weight:600;color:var(--dark)}
.aparelho-txt{font-size:12px;color:var(--sub);margin-top:1px}
/* BADGE STATUS */
.status-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;display:inline-block}
.sb-aberta{background:var(--cbg);color:var(--cd)}
.sb-execucao{background:var(--abg);color:var(--amber)}
.sb-orcamento{background:var(--rbg);color:var(--red);animation:pulse 1.4s ease infinite}
.sb-aguardando{background:#FEF3C7;color:#92400E}
.sb-peca{background:#F3E8FF;color:#6D28D9}
.sb-pronta{background:var(--gbg);color:var(--green);animation:pulse 1.4s ease infinite}
.sb-entregue{background:#F1F5F9;color:#64748B}
.sb-cancelada{background:#F8F8F7;color:#94938E}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.tempo{font-size:12px;color:var(--sub)}
.tf{padding:11px 14px;border-top:1px solid var(--border);font-size:12.5px;color:var(--sub);display:flex;align-items:center;justify-content:space-between}
.empty{padding:3rem;text-align:center;color:var(--sub)}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.25}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" href="dashboard.html"><i class="ti ti-arrow-left"></i></a>
  <div class="page-title">Ordens de Serviço</div>
  <a class="btn btn-cyan" href="os-nova.html"><i class="ti ti-plus"></i> Nova OS</a>
</header>
<main class="content">
  <div class="filter-bar">
    <div class="search-box">
      <i class="ti ti-search"></i>
      <input type="text" id="busca" placeholder="Buscar por cliente, aparelho, número..." oninput="filtrar()"/>
    </div>
    <div class="status-filter" id="status-filters"></div>
  </div>
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:70px">Nº</th>
          <th>Cliente / Aparelho</th>
          <th>Defeito</th>
          <th>Status</th>
          <th>Técnico</th>
          <th>Abertura</th>
          <th style="width:80px">Tempo</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7"><div class="empty"><i class="ti ti-loader-2 spin"></i></div></td></tr>
      </tbody>
    </table>
    <div class="tf"><span id="tf-count">—</span><span>Dottec · OS</span></div>
  </div>
</main>
<script>
const SB_URL='https://clctxzynpfjilxmyblpg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsY3R4enlucGZqaWx4bXlibHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NzEyNDMsImV4cCI6MjA5NTM0NzI0M30.YBGIwVFpE52KZKpOjMMMh1WCZbzDLM_adwGxxXhkIL0';
const db=supabase.createClient(SB_URL,SB_KEY);
const fmtDt=d=>new Date(d).toLocaleDateString('pt-BR');
const tempo=d=>{const m=Math.floor((new Date()-new Date(d))/60000);if(m<60)return m+'min';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';};

let TODOS=[], STATUS_CFG=[], FILTRO_STATUS='';

const STATUS_CLASS={
  'ABERTA':'sb-aberta','EM EXECUÇÃO':'sb-execucao',
  'PASSAR ORÇAMENTO':'sb-orcamento','AGUARDANDO APROVAÇÃO':'sb-aguardando',
  'AGUARDANDO PEÇA':'sb-peca','PRONTA':'sb-pronta',
  'ENTREGUE':'sb-entregue','CANCELADA':'sb-cancelada',
};

async function load(){
  const[{data:os},{data:sc}]=await Promise.all([
    db.from('ordens_servico').select('*,usuarios!ordens_servico_tecnico_id_fkey(nome)').order('numero',{ascending:false}).limit(200),
    db.from('status_config').select('nome,alerta_prioridade,gera_alerta').eq('modulo','OS').eq('ativo',true).order('ordem'),
  ]);
  TODOS=os||[];STATUS_CFG=sc||[];
  renderFilters();filtrar();
}

function renderFilters(){
  const div=document.getElementById('status-filters');
  const todos=[{nome:'TODOS'},...STATUS_CFG];
  div.innerHTML=todos.map(s=>{
    const al=s.gera_alerta&&s.alerta_prioridade;
    const cls=al==='CRITICA'?'crit':al==='ALTA'?'alta':'';
    return`<button class="sf ${cls}${FILTRO_STATUS===s.nome||(!FILTRO_STATUS&&s.nome==='TODOS')?' active':''}" onclick="setStatus('${s.nome==='TODOS'?'':s.nome}')">${s.nome}</button>`;
  }).join('');
}

function setStatus(s){FILTRO_STATUS=s;renderFilters();filtrar();}

function filtrar(){
  const q=document.getElementById('busca').value.trim().toUpperCase();
  let lista=TODOS;
  if(FILTRO_STATUS) lista=lista.filter(o=>o.status===FILTRO_STATUS);
  if(q) lista=lista.filter(o=>
    o.cliente_nome?.toUpperCase().includes(q)||
    o.aparelho?.toUpperCase().includes(q)||
    o.modelo?.toUpperCase().includes(q)||
    String(o.numero).includes(q)
  );
  renderTable(lista);
}

function renderTable(lista){
  const tb=document.getElementById('tbody');
  if(!lista.length){
    tb.innerHTML='<tr><td colspan="7"><div class="empty"><i class="ti ti-tool"></i>Nenhuma OS encontrada.</div></td></tr>';
    document.getElementById('tf-count').textContent='0 registros';return;
  }
  tb.innerHTML=lista.map(o=>{
    const cls=STATUS_CLASS[o.status]||'sb-aberta';
    return`<tr onclick="window.location.href='os-nova.html?id=${o.id}'">
      <td><span class="num">#${String(o.numero).padStart(4,'0')}</span></td>
      <td>
        <div class="cliente-nome">${o.cliente_nome}</div>
        <div class="aparelho-txt">${o.aparelho||''}${o.modelo?' · '+o.modelo:''}</div>
      </td>
      <td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px;color:var(--sub)">${o.defeito||'—'}</td>
      <td><span class="status-badge ${cls}">${o.status}</span></td>
      <td style="font-size:12.5px;color:var(--sub)">${o.usuarios?.nome||'—'}</td>
      <td class="tempo">${fmtDt(o.criado_em)}</td>
      <td class="tempo">${tempo(o.criado_em)}</td>
    </tr>`;
  }).join('');
  document.getElementById('tf-count').textContent=lista.length+' registro(s)';
}

load();
// redireciona ?novo=1
if(new URLSearchParams(location.search).get('novo')==='1') location.href='os-nova.html';
</script>
</body>
</html>
