<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dottec Assistência Inteligente</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Figtree,sans-serif;background:#F5F4F0;color:#1A1A18;display:flex;flex-direction:column}

/* ── HEADER ── */
.hd{background:#1A1A18;display:flex;align-items:center;height:50px;flex-shrink:0;overflow-x:auto;overflow-y:hidden}
.hd::-webkit-scrollbar{display:none}
.hd-brand{display:flex;align-items:center;gap:9px;padding:0 18px;border-right:1px solid #2D2D2A;height:100%;flex-shrink:0;text-decoration:none}
.hd-dot{width:8px;height:8px;border-radius:50%;background:#29B8C2;flex-shrink:0}
.hd-name{font-size:13.5px;font-weight:700;color:#fff;letter-spacing:-.01em;white-space:nowrap}
.hd-nav{display:flex;align-items:center;height:100%;flex:1}
.hd-item{height:100%;display:flex;align-items:center;padding:0 14px;font-size:12.5px;color:#7A7975;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;gap:6px;position:relative;text-decoration:none;flex-shrink:0}
.hd-item i{font-size:15px}
.hd-item:hover{color:#D4D2CB}
.hd-item.on{color:#fff;border-bottom-color:#29B8C2}
.hd-item .nbadge{background:#E8604A;color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;position:absolute;top:9px;right:4px;line-height:1.4}
.hd-right{display:flex;align-items:center;gap:12px;padding:0 16px;margin-left:auto;border-left:1px solid #2D2D2A;flex-shrink:0}
.hd-time{font-size:11px;color:#64635E;white-space:nowrap}
.hd-saud{font-size:11.5px;color:#94938E;white-space:nowrap}
.hd-av{width:27px;height:27px;border-radius:50%;background:#29B8C2;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0}

/* ── BODY ── */
.body{flex:1;;display:flex;flex-direction:column;padding:20px 24px;gap:16px}

/* BUSCA */
.search-wrap{position:relative}
.search-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #E0DDD6;border-radius:10px;padding:0 14px;height:42px;transition:border-color .2s,box-shadow .2s;cursor:text}
.search-row:focus-within{border-color:#29B8C2;box-shadow:0 0 0 3px rgba(41,184,194,.1)}
.search-row i.si{font-size:17px;color:#94938E;flex-shrink:0}
.search-row input{border:none;outline:none;font-size:14px;color:#1A1A18;background:transparent;flex:1;font-family:inherit;text-transform:uppercase}
.search-row input::placeholder{color:#B5B2A8;text-transform:none;font-size:13.5px}
.search-row .kbd{font-size:10px;color:#94938E;background:#F5F4F0;border:1px solid #E0DDD6;border-radius:4px;padding:1px 7px;flex-shrink:0}

/* RESULTADOS */
.search-results{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #E0DDD6;border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.12);max-height:460px;overflow-y:auto;z-index:999}
.search-results.open{display:block}
.sr-sec{padding:8px 14px 4px;font-size:10px;font-weight:700;color:#94938E;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.sr-sec::after{content:'';flex:1;height:1px;background:#F0EDE7}
.sr-row{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #F5F4F0;transition:background .1s}
.sr-row:hover,.sr-row.foc{background:#F5F4F0}
.sr-row:last-child{border-bottom:none}
.sr-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sri-p{background:#E3F4F5;color:#1E9099}
.sri-pr{background:#FBE9E5;color:#C94835}
.sri-os{background:#FBEEDB;color:#9A6000}
.sri-c{background:#EAF3DE;color:#3B6D11}
.sri-v{background:#EEF0F5;color:#3A4A6B}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:13px;font-weight:600;color:#1A1A18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:11.5px;color:#8A8880;margin-top:1px}
.sr-meta{font-size:11.5px;color:#94938E;flex-shrink:0;white-space:nowrap}
.sr-sub-group{border-left:2px solid #E8E5DF;margin:2px 14px 6px 56px;border-radius:0 6px 6px 0}
.sr-sub-row{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;color:#5A5855;cursor:pointer;transition:background .1s}
.sr-sub-row:hover{background:#F5F4F0;border-radius:0 6px 6px 0}
.sr-sub-row i{font-size:13px;color:#94938E}
.sr-empty{padding:2rem;text-align:center;color:#94938E}
.sr-empty i{font-size:28px;display:block;margin-bottom:8px;opacity:.3}
.sr-footer{padding:8px 14px;border-top:1px solid #F0EDE7;font-size:11px;color:#94938E;text-align:center}

/* ATALHOS */
.cards-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.mod-card{
  background:#fff;border:1px solid #E8E5DF;border-radius:14px;
  padding:20px 12px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;text-decoration:none;color:inherit;position:relative;overflow:hidden;
  transition:box-shadow .25s,transform .22s,border-color .25s;
}
.mod-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,var(--card-glow,rgba(41,184,194,.0)),transparent 70%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.mod-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.09);transform:translateY(-3px);border-color:var(--card-border,#29B8C2)}
.mod-card:hover::before{opacity:1}
.mc-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  transition:transform .3s cubic-bezier(.34,1.5,.64,1),box-shadow .3s;
  position:relative;z-index:1;
}
.mod-card:hover .mc-icon{transform:scale(1.12) rotate(-6deg);box-shadow:0 6px 18px rgba(0,0,0,.12)}
.mc-name{font-size:11.5px;font-weight:700;color:#1A1A18;text-align:center;line-height:1.3;position:relative;z-index:1}

/* DOIS PAINEIS */
.panels{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;min-height:0}
.panel{background:#fff;border:1px solid #E0DDD6;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ph{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #F0EDE7;flex-shrink:0}
.ph-t{font-size:12px;font-weight:700;color:#1A1A18;display:flex;align-items:center;gap:7px}
.ph-t i{font-size:15px;color:#8A8880}
.ph-badge{font-size:9px;font-weight:700;background:#E8604A;color:#fff;border-radius:10px;padding:1px 6px}
.ph-btn{background:none;border:none;cursor:pointer;font-size:12px;color:#29B8C2;font-family:inherit;font-weight:600;display:flex;align-items:center;gap:4px}
.ph-btn i{font-size:13px}
.ph-btn:hover{color:#1E9099}
.panel-body{flex:1;overflow-y:auto;min-height:0}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:#E0DDD6;border-radius:10px}

/* ALERTAS */
.al-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #F8F6F2;cursor:pointer;transition:background .12s;text-decoration:none}
.al-row:last-child{border-bottom:none}
.al-row:hover{background:#FAFAF7}
.al-pip{width:3px;height:34px;border-radius:2px;flex-shrink:0}
.al-pip.crit{background:#E8604A}
.al-pip.alta{background:#C8900A}
.al-pip.norm{background:#D4D2CB}
.al-info{flex:1;min-width:0}
.al-title{font-size:12.5px;font-weight:600;color:#1A1A18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-sub{font-size:11px;color:#8A8880;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.al-tag.crit{background:#FBE9E5;color:#C94835}
.al-tag.alta{background:#FEF3D0;color:#926800}
.al-tag.norm{background:#F0EDE7;color:#8A8880}
.al-time{font-size:10.5px;color:#B5B2A8;flex-shrink:0;margin-left:4px}
.al-empty{padding:2rem;text-align:center;color:#94938E;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px}
.al-empty i{font-size:28px;opacity:.25;color:#29B8C2}

/* AGENDA */
.ag-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid #F8F6F2;cursor:pointer;transition:background .12s}
.ag-row:last-child{border-bottom:none}
.ag-row:hover{background:#FAFAF7}
.ag-row.atras{background:#FEF9F8}
.ag-row.hj{background:#F5FDFE}
.ag-dt{flex-shrink:0;width:36px;text-align:center}
.ag-dia{font-size:17px;font-weight:700;color:#1A1A18;line-height:1}
.ag-dia.hj{color:#29B8C2}
.ag-dia.atras{color:#E8604A}
.ag-mes{font-size:9px;color:#94938E;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.ag-vline{width:1px;background:#E8E5DF;align-self:stretch;flex-shrink:0;margin:2px 0}
.ag-info{flex:1;min-width:0;padding-left:2px}
.ag-title{font-size:12.5px;font-weight:600;color:#1A1A18;line-height:1.3}
.ag-row.atras .ag-title{color:#E8604A}
.ag-resp{font-size:10.5px;color:#8A8880;margin-top:3px;display:flex;align-items:center;gap:4px}
.ag-resp i{font-size:11px}
.ag-hr{font-size:10px;font-weight:700;color:#94938E;flex-shrink:0;padding-top:3px;white-space:nowrap}
.ag-hr.hj{color:#29B8C2}
.ag-hr.atras{color:#E8604A}
.ag-empty{padding:2rem;text-align:center;color:#94938E;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px}
.ag-empty i{font-size:28px;opacity:.25}

/* MODAL AGENDA */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,26,24,.45);z-index:500;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-head{padding:1.1rem 1.4rem;border-bottom:1px solid #F0EDE7;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700;color:#1A1A18}
.modal-x{width:28px;height:28px;border-radius:7px;border:none;background:#F5F4F0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#8A8880}
.modal-body{padding:1.25rem 1.4rem;display:flex;flex-direction:column;gap:12px}
.field label{display:block;font-size:10px;font-weight:700;color:#8A8880;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;height:40px;padding:0 12px;border:1px solid #E0DDD6;border-radius:9px;background:#FAFAF7;color:#1A1A18;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#29B8C2;box-shadow:0 0 0 3px rgba(41,184,194,.1);background:#fff}
.field input::placeholder{color:#B5B2A8}
.field textarea{height:68px;resize:none;padding:10px 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:.9rem 1.4rem;border-top:1px solid #F0EDE7;display:flex;justify-content:flex-end;gap:8px}
.btn-sec{height:38px;padding:0 16px;border-radius:9px;border:1px solid #E0DDD6;background:#fff;color:#3A3A37;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-pri{height:38px;padding:0 18px;border-radius:9px;border:none;background:#29B8C2;color:#fff;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;transition:background .15s}
.btn-pri:hover{background:#1E9099}

/* MODAL RECIBO */
.info-note{background:#FBEEDB;border-radius:8px;padding:9px 12px;font-size:12px;color:#9A6000;display:flex;align-items:center;gap:7px}
.info-note i{flex-shrink:0;font-size:15px}

/* TOAST */
.toast{position:fixed;top:1.25rem;right:1.25rem;z-index:999;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateX(140%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:300px}
.toast.show{transform:translateX(0)}
.toast.ok{background:#E6FAF8;color:#0F6E56;border:1px solid rgba(15,110,86,.2)}
.toast.err{background:#FBE9E5;color:#C94835;border:1px solid rgba(200,72,53,.2)}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
@media(max-width:860px){.panels{grid-template-columns:1fr}.body{padding:14px 16px}}
</style>

<!-- NAV DOTTEC -->
<script>
const PAGE_ID = "dashboard";
const BREADCRUMB = [];
</script>
<script src="_nav.js"></script>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"><i id="ti" class="ti ti-check"></i><span id="tm"></span></div>

<!-- MODAL AGENDA -->
<div class="overlay" id="ov-agenda" onclick="if(event.target===this)fecha('agenda')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Novo compromisso</div>
      <button class="modal-x" onclick="fecha('agenda')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Título</label><input id="ag-titulo" type="text" placeholder="Ex: ligar para cliente, entregar OS..."/></div>
      <div class="grid2">
        <div class="field"><label>Data e hora</label><input id="ag-data" type="datetime-local"/></div>
        <div class="field"><label>Responsável</label><select id="ag-resp"><option value="">Todos</option></select></div>
      </div>
      <div class="field"><label>Descrição <span style="font-weight:400;text-transform:none">(opcional)</span></label><textarea id="ag-desc" placeholder="Detalhes..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="fecha('agenda')">Cancelar</button>
      <button class="btn-pri" onclick="salvarAgenda()"><i class="ti ti-calendar-plus"></i> Agendar</button>
    </div>
  </div>
</div>

<!-- MODAL RECIBO -->
<div class="overlay" id="ov-recibo" onclick="if(event.target===this)fecha('recibo')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Recibo rápido</div>
      <button class="modal-x" onclick="fecha('recibo')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="grid2">
        <div class="field"><label>Beneficiário</label><input id="r-benef" type="text" placeholder="Ex: motoboy João"/></div>
        <div class="field"><label>Valor (R$)</label><input id="r-valor" type="number" step="0.01" placeholder="0,00"/></div>
      </div>
      <div class="field"><label>Descrição</label><input id="r-desc" type="text" placeholder="Ex: entrega de mercadorias"/></div>
      <div class="grid2">
        <div class="field"><label>Forma de pagamento</label><select id="r-forma"><option>DINHEIRO</option><option>PIX</option><option>TRANSFERÊNCIA</option></select></div>
        <div class="field"><label>Categoria</label><input id="r-cat" type="text" placeholder="Ex: frete, entrega..."/></div>
      </div>
      <div class="info-note"><i class="ti ti-info-circle"></i> Lançado automaticamente em contas a pagar.</div>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="fecha('recibo')">Cancelar</button>
      <button class="btn-pri" style="background:#9A6000" onclick="salvarRecibo()"><i class="ti ti-receipt"></i> Emitir e imprimir</button>
    </div>
  </div>
</div>

<!-- HEADER -->


<!-- BODY -->
<div class="body">

  <!-- BUSCA -->
  <div class="search-wrap">
    <div class="search-row">
      <i class="ti ti-search si"></i>
      <input id="busca" type="text" placeholder="Buscar clientes, produtos, OS, contas, orçamentos..." autocomplete="off" oninput="onBusca()" onkeydown="onKey(event)"/>
      <span class="kbd">ESC</span>
    </div>
    <div class="search-results" id="sr"></div>
  </div>

  <!-- MÓDULOS -->
  <div class="cards-grid">

    <a class="mod-card" href="os.html" style="--card-glow:rgba(232,96,74,.12);--card-border:#E8604A">
      <div class="mc-icon" style="background:linear-gradient(135deg,#FBE9E5,#FFD5CC);color:#C94835"><i class="ti ti-tool"></i></div>
      <div class="mc-name">OS</div>
    </a>

    <a class="mod-card" href="venda.html" style="--card-glow:rgba(190,24,93,.1);--card-border:#BE185D">
      <div class="mc-icon" style="background:linear-gradient(135deg,#FCE7F3,#FBC8E4);color:#BE185D"><i class="ti ti-shopping-cart"></i></div>
      <div class="mc-name">Venda</div>
    </a>

    <a class="mod-card" href="caixa.html" style="--card-glow:rgba(59,109,17,.1);--card-border:#3B6D11">
      <div class="mc-icon" style="background:linear-gradient(135deg,#EAF3DE,#C8E89E);color:#3B6D11"><i class="ti ti-wallet"></i></div>
      <div class="mc-name">Caixa</div>
    </a>

    <a class="mod-card" href="financeiro.html" style="--card-glow:rgba(59,109,17,.1);--card-border:#3B6D11">
      <div class="mc-icon" style="background:linear-gradient(135deg,#EAF3DE,#C8E89E);color:#3B6D11"><i class="ti ti-currency-dollar"></i></div>
      <div class="mc-name">Financeiro</div>
    </a>

    <a class="mod-card" href="orcamentos.html" style="--card-glow:rgba(14,116,144,.1);--card-border:#0E7490">
      <div class="mc-icon" style="background:linear-gradient(135deg,#CFFAFE,#A5F0F9);color:#0E7490"><i class="ti ti-calculator"></i></div>
      <div class="mc-name">Orçamentos</div>
    </a>

    <a class="mod-card" href="pessoas.html" style="--card-glow:rgba(41,184,194,.12);--card-border:#29B8C2">
      <div class="mc-icon" style="background:linear-gradient(135deg,#E3F4F5,#B8EDF0);color:#1E9099"><i class="ti ti-users"></i></div>
      <div class="mc-name">Cadastro</div>
    </a>

    <a class="mod-card" href="produtos.html" style="--card-glow:rgba(232,96,74,.1);--card-border:#E8604A">
      <div class="mc-icon" style="background:linear-gradient(135deg,#FBE9E5,#FFD5CC);color:#C94835"><i class="ti ti-package"></i></div>
      <div class="mc-name">Produtos</div>
    </a>

    <a class="mod-card" href="compras.html" style="--card-glow:rgba(58,74,107,.1);--card-border:#3A4A6B">
      <div class="mc-icon" style="background:linear-gradient(135deg,#EEF0F5,#D4D9E8);color:#3A4A6B"><i class="ti ti-truck-delivery"></i></div>
      <div class="mc-name">Compras</div>
    </a>

    <a class="mod-card" href="fiscal.html" style="--card-glow:rgba(91,63,166,.1);--card-border:#5B3FA6">
      <div class="mc-icon" style="background:linear-gradient(135deg,#EEEAF8,#D8D0F4);color:#5B3FA6"><i class="ti ti-file-invoice"></i></div>
      <div class="mc-name">Fiscal</div>
    </a>

    <a class="mod-card" href="configuracoes.html" style="--card-glow:rgba(90,88,85,.08);--card-border:#8A887F">
      <div class="mc-icon" style="background:linear-gradient(135deg,#F0EDE7,#DDD9D0);color:#5A5855"><i class="ti ti-settings"></i></div>
      <div class="mc-name">Configurações</div>
    </a>

  </div>

  <!-- PAINEIS: ALERTAS + AGENDA -->
  <div class="panels">

    <!-- ALERTAS -->
    <div class="panel">
      <div class="ph">
        <div class="ph-t"><i class="ti ti-bell"></i> Alertas <span class="ph-badge" id="al-badge" style="display:none">0</span></div>
      </div>
      <div class="panel-body" id="al-body">
        <div class="al-empty"><i class="ti ti-loader-2 spin"></i> Carregando...</div>
      </div>
    </div>

    <!-- AGENDA -->
    <div class="panel">
      <div class="ph">
        <div class="ph-t"><i class="ti ti-calendar-event"></i> Agenda</div>
        <button class="ph-btn" onclick="abre('agenda')"><i class="ti ti-plus"></i> Novo</button>

let STATUS_ALERTA=[];
async function loadAlertas(){
  // busca status que geram alerta
  const{data:sc}=await db.from('status_config')
    .select('nome,alerta_prioridade')
    .eq('modulo','OS').eq('gera_alerta',true).eq('ativo',true);
  STATUS_ALERTA=sc||[];
  if(!STATUS_ALERTA.length){renderAlertasVazio();return;}

  const nomes=STATUS_ALERTA.map(s=>s.nome);
  const{data:os}=await db.from('ordens_servico')
    .select('id,numero,cliente_nome,aparelho,modelo,status,atualizado_em')
    .in('status',nomes)
    .order('atualizado_em',{ascending:true})
    .limit(10);

  const alBody=document.getElementById('al-body');
  const badge=document.getElementById('al-badge');
  const lista=os||[];

  if(!lista.length){renderAlertasVazio();badge.style.display='none';return;}

  badge.style.display='inline';
  badge.textContent=lista.length;
  // badge nav OS (via _nav.js)
  const osBadge=document.getElementById('dnt-os-badge');
  if(osBadge){osBadge.style.display='inline';osBadge.textContent=lista.length;}

  const tempoStr=dt=>{
    const m=Math.floor((new Date()-new Date(dt))/60000);
    if(m<1)return'agora';if(m<60)return m+'min';
    const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';
  };

  alBody.innerHTML=lista.map(o=>{
    const sc=STATUS_ALERTA.find(s=>s.nome===o.status)||{alerta_prioridade:'NORMAL'};
    const p=sc.alerta_prioridade.toLowerCase();
    const cls=p==='critica'?'crit':p==='alta'?'alta':'norm';
    const tag=p==='critica'?'CRÍTICO':p==='alta'?'ALTA':'NORMAL';
    return`<a class="al-row" href="os.html?id=${o.id}">
      <div class="al-pip ${cls}"></div>
      <div class="al-info">
        <div class="al-title">OS #${String(o.numero).padStart(4,'0')} — ${o.status}</div>
        <div class="al-sub">${o.cliente_nome}${o.aparelho?' · '+o.aparelho:''}${o.modelo?' '+o.modelo:''}</div>
      </div>
      <span class="al-tag ${cls}">${tag}</span>
      <span class="al-time">${tempoStr(o.atualizado_em)}</span>
    </a>`;
  }).join('');
}

function renderAgenda(){

    const cls=isAtras?'atras':isHoje?'hj':'';
    const diaNum=dt.getDate();
    const mesNome=dt.toLocaleDateString('pt-BR',{month:'short'}).replace('.','').toUpperCase();
    const hrStr=dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

    const podeExcluir=USR.perfil==='ADMIN'||(a.criado_por_id&&a.criado_por_id===USR.id);

    return`<div class="ag-row ${cls}">
      <div class="ag-dt">
        <div class="ag-dia ${cls}">${diaNum}</div>
        <div class="ag-mes">${mesNome}</div>
      </div>

      </div>

}

// ── BUSCA GLOBAL ─────────────────────────────────────────────
let busTimer,RESULTADOS=[],FOCI=-1;

function onBusca(){
  const q=document.getElementById('busca').value.trim();
  clearTimeout(busTimer);FOCI=-1;
  if(q.length<2){fechaBusca();return;}
  const sr=document.getElementById('sr');
  sr.innerHTML='<div class="sr-empty"><i class="ti ti-loader-2 spin" style="font-size:22px"></i></div>';
  sr.classList.add('open');
  busTimer=setTimeout(()=>executaBusca(q),300);
}

async function executaBusca(q){
  const t=q.toUpperCase();
  const doc=q.replace(/\D/g,'');
  const safe=async p=>{try{return await p;}catch{return{data:[]};}}
  const[rP,rPr,rOS,rC,rV]=await Promise.all([
    db.from('pessoas').select('id,nome,documento,tipo_doc,celular,is_cliente,is_fornecedor').or(`nome.ilike.%${t}%${doc?`,documento.ilike.%${doc}%`:''}`).eq('ativo',true).limit(4),
    db.from('produtos').select('id,codigo,nome,valor_venda,estoque_atual').ilike('nome','%'+t+'%').eq('ativo',true).limit(4),
    safe(db.from('ordens_servico').select('id,numero,cliente_nome,aparelho,status').or(`cliente_nome.ilike.%${t}%,aparelho.ilike.%${t}%`).limit(4)),
    safe(db.from('contas').select('id,tipo,descricao,valor,status').ilike('descricao','%'+t+'%').limit(3)),
    safe(db.from('vendas').select('id,numero,total,nome_cliente,criado_em').ilike('nome_cliente','%'+t+'%').order('criado_em',{ascending:false}).limit(3)),
  ]);
  RESULTADOS=[];let html='';
  const pessoas=rP.data||[];
  if(pessoas.length){
    html+='<div class="sr-sec">Pessoas</div>';
    for(const p of pessoas){
      const url=`pessoa-novo.html?id=${p.id}`;
      RESULTADOS.push({url});
      html+=`<div class="sr-row" data-i="${RESULTADOS.length-1}" onclick="irPara('${url}')">
        <div class="sr-ico sri-p"><i class="ti ti-user"></i></div>
        <div class="sr-info">
          <div class="sr-title">${p.nome}</div>
          <div class="sr-sub">${p.tipo_doc}: ${p.documento||''} · ${p.celular||''}</div>
        </div>
        <div class="sr-meta">${[p.is_cliente?'CLI':'',p.is_fornecedor?'FOR':''].filter(Boolean).join(' · ')}</div>
      </div>`;
      // sub: OS e contas da pessoa
      const[rOp,rCp]=await Promise.all([
        safe(db.from('ordens_servico').select('id,numero,status,aparelho').eq('pessoa_id',p.id).limit(2)),
        safe(db.from('contas').select('id,tipo,descricao,valor,status').eq('pessoa_id',p.id).in('status',['ABERTA','PARCIAL','VENCIDA']).limit(2)),
      ]);
      const subs=[...(rOp.data||[]).map(o=>({i:'ti-tool',txt:`OS #${String(o.numero).padStart(4,'0')} — ${o.status} · ${o.aparelho||''}`,url:`os.html?id=${o.id}`})),
                  ...(rCp.data||[]).map(c=>({i:'ti-currency-dollar',txt:`${c.tipo==='PAGAR'?'Pagar':'Receber'}: ${c.descricao} — ${fmt(c.valor)}`,url:`contas.html`}))];
      if(subs.length){
        html+='<div class="sr-sub-group">';
        subs.forEach(s=>{RESULTADOS.push({url:s.url});html+=`<div class="sr-sub-row" data-i="${RESULTADOS.length-1}" onclick="irPara('${s.url}')"><i class="ti ${s.i}"></i>${s.txt}</div>`;});
        html+='</div>';
      }
    }
  }
  const prods=rPr.data||[];
  if(prods.length){
    html+='<div class="sr-sec">Produtos</div>';
    prods.forEach(p=>{const url=`produto-novo.html?id=${p.id}`;RESULTADOS.push({url});
      html+=`<div class="sr-row" data-i="${RESULTADOS.length-1}" onclick="irPara('${url}')">
        <div class="sr-ico sri-pr"><i class="ti ti-package"></i></div>
        <div class="sr-info"><div class="sr-title">${p.nome}</div><div class="sr-sub">COD: ${String(p.codigo).padStart(3,'0')} · Est: ${p.estoque_atual||0}</div></div>
        <div class="sr-meta">${fmt(p.valor_venda)}</div>
      </div>`;
    });
  }
  const oss=rOS.data||[];
  if(oss.length){
    html+='<div class="sr-sec">Ordens de Serviço</div>';
    oss.forEach(o=>{const url=`os.html?id=${o.id}`;RESULTADOS.push({url});
      html+=`<div class="sr-row" data-i="${RESULTADOS.length-1}" onclick="irPara('${url}')">
        <div class="sr-ico sri-os"><i class="ti ti-tool"></i></div>
        <div class="sr-info"><div class="sr-title">OS #${String(o.numero).padStart(4,'0')} — ${o.cliente_nome}</div><div class="sr-sub">${o.aparelho||''} · ${o.status}</div></div>
        <div class="sr-meta"><i class="ti ti-chevron-right"></i></div>
      </div>`;
    });
  }
  const contas=rC.data||[];
  if(contas.length){
    html+='<div class="sr-sec">Contas</div>';
    contas.forEach(c=>{const url='contas.html';RESULTADOS.push({url});
      html+=`<div class="sr-row" data-i="${RESULTADOS.length-1}" onclick="irPara('${url}')">
        <div class="sr-ico sri-c"><i class="ti ti-currency-dollar"></i></div>
        <div class="sr-info"><div class="sr-title">${c.descricao}</div><div class="sr-sub">${c.tipo==='PAGAR'?'A Pagar':'A Receber'} · ${c.status}</div></div>
        <div class="sr-meta">${fmt(c.valor)}</div>
      </div>`;
    });
  }
  const vendas=rV.data||[];
  if(vendas.length){
    html+='<div class="sr-sec">Vendas</div>';
    vendas.forEach(v=>{const url='vendas.html';RESULTADOS.push({url});
      html+=`<div class="sr-row" data-i="${RESULTADOS.length-1}" onclick="irPara('${url}')">
        <div class="sr-ico sri-v"><i class="ti ti-shopping-cart"></i></div>
        <div class="sr-info"><div class="sr-title">Venda #${String(v.numero).padStart(4,'0')} — ${v.nome_cliente||'Balcão'}</div><div class="sr-sub">${new Date(v.criado_em).toLocaleDateString('pt-BR')}</div></div>
        <div class="sr-meta">${fmt(v.total)}</div>
      </div>`;
    });
  }
  if(!RESULTADOS.length) html='<div class="sr-empty"><i class="ti ti-search-off"></i>Sem resultados para "'+q.toUpperCase()+'"</div>';
  else html+='<div class="sr-footer">↑ ↓ navegar · Enter abrir · ESC fechar</div>';
  document.getElementById('sr').innerHTML=html;
}

function irPara(url){window.location.href=url;}
function fechaBusca(){document.getElementById('sr').classList.remove('open');FOCI=-1;}

function onKey(e){
  const rows=document.querySelectorAll('.sr-row,.sr-sub-row');
  if(!rows.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();FOCI=Math.min(FOCI+1,rows.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();FOCI=Math.max(FOCI-1,0);}
  else if(e.key==='Enter'){e.preventDefault();const r=rows[FOCI];if(r){const i=+r.dataset.i;if(RESULTADOS[i])irPara(RESULTADOS[i].url);}}
  else if(e.key==='Escape'){fechaBusca();document.getElementById('busca').blur();return;}
  rows.forEach((r,i)=>r.classList.toggle('foc',i===FOCI));
  if(FOCI>=0)rows[FOCI].scrollIntoView({block:'nearest'});
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))fechaBusca();});
document.addEventListener('keydown',e=>{
  const inp=document.getElementById('busca');
  if(document.activeElement===inp)return;
  if(e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey)inp.focus();
});

// preset datetime agenda
const ag=new Date();ag.setHours(ag.getHours()+1,0,0,0);
document.getElementById('ag-data').value=ag.toISOString().slice(0,16);

// inicializar
Promise.all([loadAlertas(),loadAgenda(),loadUsuarios()]).catch(()=>{});
setInterval(loadAlertas,60000);
</script>
