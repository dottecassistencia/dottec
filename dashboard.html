<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dottec Assistência</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --cyan:      #29B8C2;
      --cyan-dark: #1E9099;
      --coral:     #E8604A;
      --coral-dark:#C94835;
      --dark:      #1C1C1A;
      --text:      #2C2C2A;
      --sub:       #8A887F;
      --border:    #EAE7DF;
      --bg:        #EDEAE3;
      --white:     #FFFFFF;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Figtree',sans-serif;color:var(--text);min-height:100vh;
      background:
        radial-gradient(circle at 12% -8%, rgba(41,184,194,.16), transparent 42%),
        radial-gradient(circle at 92% 6%, rgba(232,96,74,.14), transparent 38%),
        var(--bg);
    }

    .topbar{
      background:var(--white);
      border-bottom:1px solid var(--border);
      padding:1.1rem 2rem;
    }
    .page-head{display:flex;align-items:center;gap:14px;max-width:1040px;margin:0 auto}
    .ph-logo{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0;
      box-shadow:0 4px 14px rgba(0,0,0,.1)}
    .ph-title{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--dark);letter-spacing:-.01em}
    .ph-sub{font-size:12px;color:var(--sub);margin-top:1px}

    .content{max-width:1040px;margin:0 auto;padding:2.5rem 2rem 3rem}

    .section-label{
      font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:var(--sub);margin-bottom:1.1rem;display:flex;align-items:center;gap:8px;
    }
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

    .cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}

    /* CARD */
    .mod-card{
      position:relative;
      background:var(--white);
      border-radius:20px;
      border:1px solid var(--border);
      padding:1.85rem;
      display:flex;flex-direction:column;gap:1.3rem;
      cursor:pointer;text-decoration:none;color:inherit;
      overflow:hidden;
      transition:box-shadow .28s ease, transform .28s ease, border-color .28s ease;
      animation:cardIn .45s cubic-bezier(.2,.8,.2,1) both;
    }
    .mod-card:nth-child(1){animation-delay:.02s}
    .mod-card:nth-child(2){animation-delay:.08s}
    .mod-card:nth-child(3){animation-delay:.14s}
    .mod-card:nth-child(4){animation-delay:.20s}
    @keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* glow de fundo que aparece no hover, nas cores do card */
    .mod-card::before{
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(circle at 85% -10%, var(--glow-color, rgba(41,184,194,.18)), transparent 60%);
      opacity:0; transition:opacity .35s ease;
      pointer-events:none;
    }
    .mod-card:hover::before{opacity:1}

    .mod-card.cyan  { --glow-color: rgba(41,184,194,.22); }
    .mod-card.coral { --glow-color: rgba(232,96,74,.20); }
    .mod-card.sage  { --glow-color: rgba(120,150,70,.18); }
    .mod-card.amber { --glow-color: rgba(190,130,20,.18); }

    .mod-card:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 40px rgba(0,0,0,.10);
    }
    .mod-card.cyan:hover  { border-color: rgba(41,184,194,.45); }
    .mod-card.coral:hover { border-color: rgba(232,96,74,.45); }
    .mod-card.sage:hover  { border-color: rgba(120,150,70,.4); }
    .mod-card.amber:hover { border-color: rgba(190,130,20,.4); }

    .card-icon-box{
      position:relative; z-index:1;
      width:54px;height:54px;border-radius:15px;
      display:flex;align-items:center;justify-content:center;font-size:25px;
      transition:transform .3s cubic-bezier(.34,1.5,.64,1), background .3s, color .3s;
    }
    .mod-card.cyan  .card-icon-box{background:#E3F4F5; color:var(--cyan-dark)}
    .mod-card.coral .card-icon-box{background:#FBE9E5; color:var(--coral)}
    .mod-card.sage  .card-icon-box{background:#EAEFE1; color:#4A6B1F}
    .mod-card.amber .card-icon-box{background:#FBEEDB; color:#9A6000}

    .mod-card:hover .card-icon-box{ transform:scale(1.08) rotate(-4deg); }
    .mod-card.cyan:hover  .card-icon-box{ background:var(--cyan);  color:#fff; }
    .mod-card.coral:hover .card-icon-box{ background:var(--coral); color:#fff; }
    .mod-card.sage:hover  .card-icon-box{ background:#5C7F2A;     color:#fff; }
    .mod-card.amber:hover .card-icon-box{ background:#B5790C;    color:#fff; }

    .card-bottom{position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem}
    .card-text{flex:1}
    .card-name{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--dark);letter-spacing:-.01em;margin-bottom:5px}
    .card-desc{font-size:12.5px;color:var(--sub);line-height:1.55}

    .card-arrow{
      width:36px;height:36px;border-radius:50%;background:var(--bg);
      display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text);
      flex-shrink:0;transition:background .25s, color .25s, transform .25s;
    }
    .mod-card.cyan:hover  .card-arrow{background:var(--cyan-dark);  color:#fff; transform:translateX(3px) rotate(-45deg);}
    .mod-card.coral:hover .card-arrow{background:var(--coral-dark); color:#fff; transform:translateX(3px) rotate(-45deg);}
    .mod-card.sage:hover  .card-arrow{background:#4A6B1F;          color:#fff; transform:translateX(3px) rotate(-45deg);}
    .mod-card.amber:hover .card-arrow{background:#9A6000;         color:#fff; transform:translateX(3px) rotate(-45deg);}

    /* badge "em breve" pros próximos cards fantasma */
    .mod-card.ghost{
      align-items:center; justify-content:center;
      border-style:dashed; gap:.6rem; min-height:172px;
      color:var(--sub); cursor:default;
    }
    .mod-card.ghost:hover{ transform:none; box-shadow:none; border-color:var(--border); }
    .mod-card.ghost i{font-size:22px; opacity:.5}
    .mod-card.ghost span{font-size:12.5px; font-weight:600}

    @media (max-width:680px){
      .cards-grid{grid-template-columns:1fr}
      .content{padding:2.25rem 1.1rem}
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="page-head">
      <img src="logo-dottec.png" alt="Dottec Assistência" class="ph-logo" />
      <div>
        <div class="ph-title">Dottec Assistência</div>
        <div class="ph-sub" id="ph-sub">Carregando...</div>
      </div>
    </div>
  </header>

  <main class="content">

    <!-- futuro: barra de busca centralizada entra aqui, logo abaixo da topbar -->

    <div class="section-label">Módulos do sistema</div>

    <div class="cards-grid">

      <a class="mod-card cyan" href="cadastro.html">
        <div class="card-icon-box"><i class="ti ti-forms"></i></div>
        <div class="card-bottom">
          <div class="card-text">
            <div class="card-name">Cadastro</div>
            <div class="card-desc">Clientes, fornecedores, transportadoras e serviços.</div>
          </div>
          <div class="card-arrow"><i class="ti ti-arrow-right"></i></div>
        </div>
      </a>

      <a class="mod-card coral" href="produtos.html">
        <div class="card-icon-box"><i class="ti ti-package"></i></div>
        <div class="card-bottom">
          <div class="card-text">
            <div class="card-name">Produtos</div>
            <div class="card-desc">Catálogo, custo, venda, estoque e etiquetas.</div>
          </div>
          <div class="card-arrow"><i class="ti ti-arrow-right"></i></div>
        </div>
      </a>

    </div>
  </main>

  <script>
    const sessao = JSON.parse(sessionStorage.getItem('dottec_sessao') || 'null');
    const nome = sessao ? sessao.nome.split(' ')[0] : 'Gaza';
    const h = new Date().getHours();
    const saud = h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
    document.getElementById('ph-sub').textContent = saud + ', ' + nome + '.';
  </script>
</body>
</html>
