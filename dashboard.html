<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dottec Assistência Inteligente</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const PAGE_ID = "dashboard";
const BREADCRUMB = [];
</script>
<script src="_nav.js"></script>
<style>
:root{
  --cyan:#29B8C2;--cd:#1E9099;--cbg:#E3F4F5;
  --coral:#E8604A;--cbg2:#FBE9E5;
  --dark:#1C1C1A;--text:#2C2C2A;--sub:#8A887F;
  --border:#EAE7DF;--bg:#EDEAE3;--white:#fff;
  --amber:#9A6000;--abg:#FBEEDB;
  --green:#3B6D11;--gbg:#EAF3DE;
  --red:#DC2626;--rbg:#FEF2F2;
  --purple:#5B3FA6;--pbg:#EEEAF8;
  --slate:#3A4A6B;--sbg:#EEF0F5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Figtree',sans-serif;color:var(--text);background:var(--bg);min-height:100vh}

/* ── HEADER CUSTOMIZADO ─────────────────────────── */
.dash-header{
  position:fixed;top:0;left:0;right:0;z-index:950;
  background:var(--white);border-bottom:1px solid var(--border);
  height:60px;display:flex;align-items:center;padding:0 1.5rem;gap:16px;
  box-shadow:0 1px 6px rgba(0,0,0,.06);
}
.dh-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.dh-logo-img{
  width:38px;height:38px;border-radius:50%;overflow:hidden;
  background:linear-gradient(135deg,#29B8C2,#1E9099);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(41,184,194,.35);
  flex-shrink:0;
}
.dh-logo-img img{width:100%;height:100%;object-fit:cover}
.dh-logo-img i{font-size:20px;color:#fff}
.dh-saud{flex:1}
.dh-saud-greeting{font-size:13px;color:var(--sub)}
.dh-saud-name{font-family:'Lora',serif;font-size:16px;font-weight:700;color:var(--dark);margin-top:0px;line-height:1.1}
.dh-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.dh-datetime{text-align:right}
.dh-hora{font-family:'Lora',serif;font-size:17px;font-weight:700;color:var(--dark);line-height:1}
.dh-data{font-size:11px;color:var(--sub);margin-top:2px}
.dh-perfil{
  width:36px;height:36px;border-radius:50%;
  background:var(--bg);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--sub);cursor:pointer;
  transition:all .15s;flex-shrink:0;text-decoration:none;
}
.dh-perfil:hover{background:var(--dark);color:#fff;border-color:var(--dark)}

/* ── NAV BAR fica em baixo do header ── */
/* O _nav.js injeta com position:fixed;top:0 — ajustamos via padding */
/* Sobrepomos o topbar do _nav com nosso header */
#dottec-nav-shell #dnt-bar{top:60px!important;position:fixed!important}
body{padding-top:102px!important} /* 60 header + 42 nav */

/* ── LAYOUT ── */
.main{max-width:1500px;margin:0 auto;padding:1.25rem 1.5rem 3rem}

/* ── BOLINHAS ── */
.modulos-bar{
  background:var(--white);border:1px solid var(--border);border-radius:16px;
  padding:14px 18px;margin-bottom:1rem;
  display:flex;align-items:center;gap:0;
}
.mods-inner{
  flex:1;display:grid;gap:8px;
  /* responsivo: preenche o espaço todo */
  grid-template-columns:repeat(auto-fill,minmax(64px,1fr));
}
.mod-ball{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;text-decoration:none;color:inherit;
  padding:4px 0;
}
.mod-ball-icon{
  width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:23px;position:relative;
  transition:transform .22s cubic-bezier(.34,1.5,.64,1),box-shadow .22s;
}
.mod-ball:hover .mod-ball-icon{transform:translateY(-4px) scale(1.1);box-shadow:0 10px 24px rgba(0,0,0,.13)}
.mod-ball-label{font-size:10px;font-weight:700;color:var(--sub);text-align:center;white-space:nowrap;line-height:1.2}
.mod-ball:hover .mod-ball-label{color:var(--dark)}
.mod-ball-badge{position:absolute;top:-1px;right:-1px;width:16px;height:16px;border-radius:50%;background:var(--red);border:2px solid var(--white);font-size:8px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center}

/* botão mais */
.mod-more-wrap{position:relative;flex-shrink:0;margin-left:8px}
.mod-more{width:54px;height:54px;border-radius:50%;background:var(--bg);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--sub);cursor:pointer;transition:all .15s}
.mod-more:hover{background:#E2DFD6;border-color:var(--sub)}
.mod-more-drop{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:1px solid var(--border);border-radius:14px;box-shadow:0 12px 36px rgba(0,0,0,.12);padding:8px;z-index:300;min-width:190px}
.mod-more-drop.open{display:block}
.mod-more-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);text-decoration:none;transition:background .12s}
.mod-more-item:hover{background:var(--bg)}
.mod-more-item i{font-size:17px;width:22px;text-align:center}
.mod-config-btn{width:34px;height:34px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--sub);cursor:pointer;transition:all .15s;flex-shrink:0;margin-left:10px}
.mod-config-btn:hover{background:var(--dark);color:#fff;border-color:var(--dark)}

/* ── MÉTRICAS ── */
.metrics-bar{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;
  gap:12px;margin-bottom:1.1rem;
}
.mc{
  background:var(--white);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;cursor:default;
  transition:box-shadow .2s,transform .18s,border-color .2s;
  text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
}
.mc::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none}
.mc:hover{box-shadow:0 6px 22px rgba(0,0,0,.08);transform:translateY(-2px)}
.mc-os{cursor:pointer}.mc-os::before{background:radial-gradient(circle at 80% -10%,rgba(232,96,74,.12),transparent 60%)}
.mc-os:hover{border-color:rgba(232,96,74,.35)}.mc-os::before,.mc-os:hover::before{opacity:1}
.mc-venda::before{background:radial-gradient(circle at 80% -10%,rgba(190,24,93,.10),transparent 60%)}
.mc-venda{cursor:pointer}.mc-venda:hover{border-color:rgba(190,24,93,.3)}.mc-venda:hover::before{opacity:1}
.mc-meta::before{background:radial-gradient(circle at 80% -10%,rgba(41,184,194,.10),transparent 60%)}
.mc-meta:hover::before{opacity:1}

.mc-header{display:flex;align-items:center;gap:8px}
.mc-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--cbg2);color:var(--coral)}
.mc-os .mc-icon{background:var(--cbg2);color:var(--coral)}
.mc-venda .mc-icon{background:var(--rbg);color:var(--red)}
.mc-icon-meta{background:var(--cbg);color:var(--cd)}
.mc-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;flex:1}
.mc-edit{width:22px;height:22px;border-radius:6px;border:none;background:var(--bg);color:var(--sub);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.mc-edit:hover{background:var(--cyan);color:#fff}

.mc-numbers{display:flex;align-items:center;gap:0}
.mc-num-group{flex:1;text-align:center}
.mc-divider{width:1px;height:36px;background:var(--border);flex-shrink:0;margin:0 4px}
.mc-big{font-family:'Lora',serif;font-size:28px;font-weight:700;color:var(--dark);line-height:1}
.mc-big.mc-warn{color:var(--amber)}
.mc-small{font-size:10.5px;color:var(--sub);margin-top:3px}

.mc-meta-wrap{display:flex;flex-direction:column;gap:8px}
.mc-meta-nums{display:flex;align-items:baseline;gap:3px}
.mc-meta-atual{font-family:'Lora',serif;font-size:24px;font-weight:700;color:var(--dark)}
.mc-meta-sep{font-size:16px;color:var(--sub)}
.mc-meta-total{font-size:15px;font-weight:600;color:var(--sub)}
.mc-meta-unit{font-size:11px;color:var(--sub);margin-left:4px}
.mc-bar-wrap{display:flex;align-items:center;gap:8px}
.mc-bar{flex:1;height:6px;background:var(--border);border-radius:10px;overflow:hidden}
.mc-bar-fill{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.34,1.2,.64,1)}
.mc-bar-cyan{background:linear-gradient(90deg,var(--cyan),var(--cd))}
.mc-bar-green{background:linear-gradient(90deg,#5BB832,var(--green))}
.mc-pct{font-size:11px;font-weight:800;color:var(--sub);flex-shrink:0;min-width:30px;text-align:right}
@media(max-width:900px){.metrics-bar{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.metrics-bar{grid-template-columns:1fr}}

/* ── GRID 3 COLUNAS ── */
.panels{display:grid;grid-template-columns:1fr 1.1fr 0.9fr;gap:14px;align-items:start}

/* ── PAINEL ── */
.panel{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.ph-left{display:flex;align-items:center;gap:8px}
.ph-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.phi-red{background:var(--rbg);color:var(--red)}.phi-cyan{background:var(--cbg);color:var(--cd)}.phi-amber{background:var(--abg);color:var(--amber)}.phi-green{background:var(--gbg);color:var(--green)}
.ph-title{font-size:13px;font-weight:700;color:var(--dark)}
.ph-count{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:10px;background:var(--bg);color:var(--sub);border:1px solid var(--border)}
.ph-count.red{background:var(--rbg);color:var(--red);border-color:rgba(220,38,38,.2)}
.ph-add{width:28px;height:28px;border-radius:8px;border:none;background:var(--cyan);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0}
.ph-add:hover{background:var(--cd)}
.panel-body{overflow-y:auto}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* Painel alertas: altura grande (ocupa 2 paineis) */
.panel-tall .panel-body{height:calc(100vh - 280px);min-height:400px}
/* Painel normal */
.panel-normal .panel-body{height:calc(50vh - 140px);min-height:220px}
/* Painel compras: mesma altura que o combined */
.panel-compras .panel-body{height:calc(100vh - 280px);min-height:400px}

/* ── LINHAS ALERTAS ── */
.al-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #F5F4F0;cursor:pointer;transition:background .1s;text-decoration:none}
.al-row:last-child{border-bottom:none}
.al-row:hover{background:var(--bg)}
.al-pip{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.al-pip.crit{background:var(--red)}.al-pip.alta{background:var(--amber)}.al-pip.norm{background:var(--border)}
.al-info{flex:1;min-width:0}
.al-t{font-size:13px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-s{font-size:11.5px;color:var(--sub);margin-top:2px}
.al-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.al-tag.crit{background:var(--rbg);color:var(--red)}.al-tag.alta{background:var(--abg);color:var(--amber)}.al-tag.norm{background:var(--bg);color:var(--sub)}
.al-time{font-size:10.5px;color:#B5B2A8;flex-shrink:0;margin-left:4px}

/* ── SEÇÃO CONTAS (dentro do painel combinado) ── */
.sec-contas{border-bottom:2px solid var(--border);padding-bottom:4px;margin-bottom:0}
.sec-contas-head{display:flex;align-items:center;gap:7px;padding:10px 16px 8px;background:linear-gradient(to bottom,#FDFCFA,transparent)}
.sec-contas-icon{font-size:13px;color:var(--amber)}
.sec-contas-label{font-size:10.5px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;flex:1}
.sec-contas-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;background:var(--abg);color:var(--amber)}
.ct-row{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid #F5F4F0}
.ct-row:last-child{border-bottom:none}
.ct-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ct-dot.vencida{background:var(--red)}.ct-dot.hoje{background:var(--amber)}.ct-dot.prox{background:var(--border)}
.ct-info{flex:1;min-width:0}
.ct-desc{font-size:12.5px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-venc{font-size:10.5px;color:var(--sub);margin-top:1px}
.ct-val{font-size:12.5px;font-weight:700;color:var(--dark);flex-shrink:0}
.ct-tag{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;margin-left:4px}
.ct-tag.vencida{background:var(--rbg);color:var(--red)}.ct-tag.hoje{background:var(--abg);color:var(--amber)}

/* ── SEÇÃO AGENDA (dentro do painel combinado) ── */
.sec-agenda-head{display:flex;align-items:center;gap:7px;padding:10px 16px 6px}
.sec-agenda-icon{font-size:13px;color:var(--cd)}
.sec-agenda-label{font-size:10.5px;font-weight:800;color:var(--cd);text-transform:uppercase;letter-spacing:.07em;flex:1}
.sec-agenda-add{width:24px;height:24px;border-radius:7px;border:none;background:var(--cyan);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.sec-agenda-add:hover{background:var(--cd)}

.ag-row{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid #F5F4F0;cursor:pointer;transition:background .1s}
.ag-row:last-child{border-bottom:none}
.ag-row:hover{background:var(--bg)}
.ag-row.atras{background:#FEF9F8}
.ag-row.hj{background:#F5FDFE}
.ag-dt{flex-shrink:0;width:34px;text-align:center}
.ag-dia{font-size:17px;font-weight:800;color:var(--dark);line-height:1}
.ag-dia.hj{color:var(--cyan)}.ag-dia.atras{color:var(--red)}
.ag-mes{font-size:8.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.ag-vl{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;margin:2px 0}
.ag-info{flex:1;min-width:0;padding-left:2px}
.ag-titulo{font-size:12.5px;font-weight:600;color:var(--dark);line-height:1.3}
.ag-row.atras .ag-titulo{color:var(--red)}
.ag-resp{font-size:10.5px;color:var(--sub);margin-top:2px;display:flex;align-items:center;gap:3px}
.ag-resp i{font-size:11px}
.ag-hr{font-size:10px;font-weight:700;color:var(--sub);flex-shrink:0;padding-top:2px;white-space:nowrap}
.ag-hr.hj{color:var(--cyan)}.ag-hr.atras{color:var(--red)}

/* ── LISTA COMPRAS ── */
.lc-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #F5F4F0}
.lc-row:last-child{border-bottom:none}
.lc-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.lc-check:hover{border-color:var(--green);background:var(--gbg)}
.lc-info{flex:1;min-width:0}
.lc-prod{font-size:12.5px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-forn{font-size:10.5px;color:var(--sub);margin-top:1px}
.lc-urg{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;margin-left:4px}
.lc-urg.URGENTE{background:var(--rbg);color:var(--red)}.lc-urg.PODE_ESPERAR{background:var(--bg);color:var(--sub)}
.lc-qty{font-size:10.5px;font-weight:700;color:var(--sub);background:var(--bg);padding:2px 8px;border-radius:5px;flex-shrink:0}
.lc-del{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--sub);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.lc-del:hover{background:var(--cbg2);color:var(--red)}

/* vazio */
.p-empty{padding:2.5rem 1rem;text-align:center;color:var(--sub);font-size:12.5px}
.p-empty i{font-size:30px;display:block;margin-bottom:8px;opacity:.2}

/* ── MODAIS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,28,26,.5);z-index:700;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:18px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-head{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Lora',serif;font-size:16px;font-weight:700;color:var(--dark)}
.modal-x{width:28px;height:28px;border-radius:7px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--sub)}
.modal-body{padding:1.25rem 1.4rem;display:flex;flex-direction:column;gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:9px;background:#FAFAF7;color:var(--dark);font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(41,184,194,.1);background:var(--white)}
.field input::placeholder,.field textarea::placeholder{color:#B5B2A8}
.field textarea{height:72px;resize:none;padding:10px 12px}
.modal-foot{padding:.9rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-cancel{height:38px;padding:0 14px;border-radius:9px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary{height:38px;padding:0 18px;border-radius:9px;border:none;background:var(--cyan);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-primary:hover{background:var(--cd)}

/* modal lg */
.modal-lg{max-width:540px}
.config-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto}
.config-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:9px}
.config-item-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.config-item-name{flex:1;font-size:13px;font-weight:600;color:var(--dark)}
.config-toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.config-toggle.on{background:var(--cyan)}.config-toggle.off{background:#D4D2CB}
.config-toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.config-toggle.on::after{left:19px}.config-toggle.off::after{left:3px}

/* toast */
.toast{position:fixed;top:1.25rem;right:1.25rem;z-index:999;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateX(140%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:300px}
.toast.show{transform:translateX(0)}
.toast.ok{background:#E6FAF8;color:#0F6E56;border:1px solid rgba(15,110,86,.2)}
.toast.err{background:var(--cbg2);color:#C94835;border:1px solid rgba(200,72,53,.2)}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}

@media(max-width:1100px){.panels{grid-template-columns:1fr 1fr}}
@media(max-width:680px){.panels{grid-template-columns:1fr}.mods-inner{grid-template-columns:repeat(4,1fr)}}
</style>

<div class="overlay" id="ov-compra">

// ── RELÓGIO / HEADER ─────────────────────────────────────────
function tick(){
  const n=new Date(),h=n.getHours();
  document.getElementById('dh-greeting').textContent=h<12?'Bom dia,':h<18?'Boa tarde,':'Boa noite,';
  document.getElementById('dh-name').textContent=USR.nome;
  document.getElementById('dh-hora').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dh-data').textContent=n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}
tick();setInterval(tick,10000);

// ── MÓDULOS ──────────────────────────────────────────────────
const TODOS_MODS=[
  {id:'os',         label:'OS',         icon:'ti-tool',            href:'os.html',           bg:'linear-gradient(135deg,#FBE9E5,#FFD5CC)',color:'#C94835'},
  {id:'venda',      label:'Venda',      icon:'ti-shopping-cart',   href:'venda.html',         bg:'linear-gradient(135deg,#FCE7F3,#FBC8E4)',color:'#BE185D'},
  {id:'caixa',      label:'Caixa',      icon:'ti-wallet',          href:'caixa.html',         bg:'linear-gradient(135deg,#EAF3DE,#C8E89E)',color:'#3B6D11'},
  {id:'financeiro', label:'Financeiro', icon:'ti-currency-dollar', href:'financeiro.html',    bg:'linear-gradient(135deg,#EAF3DE,#C8E89E)',color:'#3B6D11'},
  {id:'orcamentos', label:'Orçamentos', icon:'ti-calculator',      href:'orcamentos.html',    bg:'linear-gradient(135deg,#CFFAFE,#A5F0F9)',color:'#0E7490'},
  {id:'cadastro',   label:'Cadastro',   icon:'ti-users',           href:'pessoas.html',       bg:'linear-gradient(135deg,#E3F4F5,#B8EDF0)',color:'#1E9099'},
  {id:'produtos',   label:'Produtos',   icon:'ti-package',         href:'produtos.html',      bg:'linear-gradient(135deg,#FBE9E5,#FFD5CC)',color:'#C94835'},
  {id:'compras',    label:'Compras',    icon:'ti-truck-delivery',  href:'compras.html',       bg:'linear-gradient(135deg,#EEF0F5,#D4D9E8)',color:'#3A4A6B'},
  {id:'fiscal',     label:'Fiscal',     icon:'ti-file-invoice',    href:'fiscal.html',        bg:'linear-gradient(135deg,#EEEAF8,#D8D0F4)',color:'#5B3FA6'},
  {id:'config',     label:'Config.',    icon:'ti-settings',        href:'configuracoes.html', bg:'linear-gradient(135deg,#F0EDE7,#DDD9D0)',color:'#5A5855'},
];

let MODS_ATIVOS=['os','venda','caixa','financeiro','orcamentos','cadastro','produtos','compras'];
let MODS_TMP=[];

async function loadMods(){
  if(USR.id){
    const{data}=await db.from('configuracoes_sistema').select('valor').eq('chave','mods_usuario_'+USR.id).maybeSingle();
    if(data?.valor){try{MODS_ATIVOS=JSON.parse(data.valor);}catch{}}
  }
  renderMods();
}

function renderMods(){
  const ativos=MODS_ATIVOS.slice(0,8).map(id=>TODOS_MODS.find(m=>m.id===id)).filter(Boolean);
  const resto=TODOS_MODS.filter(m=>!MODS_ATIVOS.slice(0,8).includes(m.id));
  const inner=document.getElementById('mods-inner');
  const moreWrap=document.getElementById('mod-more-wrap');

  inner.innerHTML=ativos.map(m=>`
    <a class="mod-ball" href="${m.href}" title="${m.label}">
      <div class="mod-ball-icon" style="background:${m.bg}">
        <i class="ti ${m.icon}" style="color:${m.color}"></i>
        ${m.id==='os'?'<span class="mod-ball-badge" id="os-badge" style="display:none">!</span>':''}
      </div>
      <span class="mod-ball-label">${m.label}</span>
    </a>`).join('');

  if(resto.length){
    moreWrap.style.display='block';
    document.getElementById('mod-more-drop').innerHTML=resto.map(m=>`
      <a class="mod-more-item" href="${m.href}">
        <i class="ti ${m.icon}" style="color:${m.color}"></i>${m.label}
      </a>`).join('');
  } else {
    moreWrap.style.display='none';
  }
  checkOsBadge();
}

function toggleMore(e){e.stopPropagation();document.getElementById('mod-more-drop').classList.toggle('open');}
document.addEventListener('click',()=>document.getElementById('mod-more-drop')?.classList.remove('open'));

async function checkOsBadge(){
  try{
    const{data:sc}=await db.from('status_config').select('nome').eq('modulo','OS').eq('gera_alerta',true).eq('ativo',true);
    if(!sc?.length) return;
    const{count}=await db.from('ordens_servico').select('id',{count:'exact',head:true}).in('status',sc.map(s=>s.nome));
    const b=document.getElementById('os-badge');
    if(b&&count>0){b.style.display='flex';b.textContent=count>9?'9+':count;}
  }catch{}
}

function abrirConfigMods(){
  MODS_TMP=[...MODS_ATIVOS];
  renderConfigList();
  abrirModal('config-mods');
}

function renderConfigList(){
  document.getElementById('config-list').innerHTML=TODOS_MODS.map(m=>{
    const on=MODS_TMP.slice(0,8).includes(m.id);
    return`<div class="config-item">
      <div class="config-item-icon" style="background:${m.bg}"><i class="ti ${m.icon}" style="color:${m.color}"></i></div>
      <span class="config-item-name">${m.label}</span>
      <button class="config-toggle ${on?'on':'off'}" onclick="toggleMod('${m.id}',this)"></button>
    </div>`;
  }).join('');
}

function toggleMod(id,btn){
  const i=MODS_TMP.indexOf(id);
  if(i>=0){MODS_TMP.splice(i,1);btn.className='config-toggle off';}
  else{MODS_TMP.push(id);btn.className='config-toggle on';}
  renderConfigList();
}

async function salvarConfigMods(){
  MODS_ATIVOS=MODS_TMP.slice(0,8);
  if(USR.id){
    await db.from('configuracoes_sistema').upsert(
      {chave:'mods_usuario_'+USR.id,valor:JSON.stringify(MODS_ATIVOS)},{onConflict:'chave'}
    );
  }
  fechar('config-mods');renderMods();toast('Módulos salvos!');
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,tipo='ok'){
  const t=document.getElementById('toast');
  document.getElementById('ti').className='ti '+(tipo==='ok'?'ti-check':'ti-alert-circle');
  document.getElementById('tm').textContent=msg;
  t.className='toast '+tipo+' show';
  setTimeout(()=>t.classList.remove('show'),3500);
}

// ── MODAIS ─────────────────────────────────────────────────────
function abrirModal(id){
  const ov=document.getElementById('ov-'+id);
  if(!ov) return;
  ov.classList.add('open');
  setTimeout(()=>{const f=ov.querySelector('input:not([type=hidden]),select,textarea');if(f)f.focus();},60);
}
function fechar(id){document.getElementById('ov-'+id)?.classList.remove('open');}

// fecha clicando fora — usa addEventListener em cada overlay explicitamente
document.getElementById('ov-agenda').addEventListener('click',function(e){if(e.target===this)fechar('agenda');});
document.getElementById('ov-compra').addEventListener('click',function(e){if(e.target===this)fechar('compra');});
document.getElementById('ov-config-mods').addEventListener('click',function(e){if(e.target===this)fechar('config-mods');});
document.getElementById('ov-meta').addEventListener('click',function(e){if(e.target===this)fechar('meta');});

// ── AGENDA ─────────────────────────────────────────────────────
let AGENDA=[], USUARIOS=[];

function abrirAgenda(){
  document.getElementById('ag-titulo').value='';
  document.getElementById('ag-desc').value='';
  const d=new Date();d.setHours(d.getHours()+1,0,0,0);
  document.getElementById('ag-data').value=d.toISOString().slice(0,16);
  document.getElementById('ag-resp').value='';
  abrirModal('agenda');
}

async function loadUsuarios(){
  const{data}=await db.from('usuarios').select('id,nome,perfil').eq('ativo',true);
  USUARIOS=data||[];
  const sel=document.getElementById('ag-resp');
  sel.innerHTML='<option value="">Todos</option>'+USUARIOS.map(u=>`<option value="${u.id}">${u.nome}</option>`).join('');
}

async function loadAgenda(){
  const{data}=await db.from('agenda')
    .select('*,usuarios!agenda_responsavel_id_fkey(nome)')
    .eq('concluido',false)
    .order('data_hora',{ascending:true}).limit(12);
  AGENDA=data||[];
  renderAgenda();
}

function renderAgenda(){
  const body=document.getElementById('ag-body');
  if(!AGENDA.length){body.innerHTML='<div class="p-empty"><i class="ti ti-calendar-off"></i>Sem tarefas</div>';return;}
  const agora=new Date();
  body.innerHTML=AGENDA.map(a=>{
    const dt=new Date(a.data_hora);
    const dh=a.data_hora.slice(0,10);
    const isHj=dh===hoje,isAtras=dt<agora;
    const cls=isAtras?'atras':isHj?'hj':'';
    const hrCls=isAtras?'atras':isHj?'hj':'';
    return`<div class="ag-row ${cls}">
      <div class="ag-dt">
        <div class="ag-dia ${cls}">${dt.getDate()}</div>
        <div class="ag-mes">${dt.toLocaleDateString('pt-BR',{month:'short'}).replace('.','').toUpperCase()}</div>
      </div>
      <div class="ag-vl"></div>
      <div class="ag-info">
        <div class="ag-titulo">${a.titulo}</div>
        ${a.usuarios?.nome?`<div class="ag-resp"><i class="ti ti-user"></i>${a.usuarios.nome}</div>`:''}
      </div>
      <div class="ag-hr ${hrCls}">${dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;
  }).join('');
}

async function salvarAgenda(){
  const titulo=document.getElementById('ag-titulo').value.trim();
  const data=document.getElementById('ag-data').value;
  if(!titulo){toast('Informe o título.','err');return;}
  if(!data){toast('Informe a data.','err');return;}
  const{error}=await db.from('agenda').insert({
    titulo:titulo.toUpperCase(),
    data_hora:new Date(data).toISOString(),
    responsavel_id:document.getElementById('ag-resp').value||null,
    descricao:document.getElementById('ag-desc').value.trim().toUpperCase()||null,
    criado_por_id:USR.id||null,criado_por_nome:USR.nome,
  });
  if(error){toast('Erro: '+error.message,'err');return;}
  toast('Tarefa agendada!');fechar('agenda');loadAgenda();
}

// ── ALERTAS OS ──────────────────────────────────────────────────
async function loadAlertas(){
  const{data:sc}=await db.from('status_config').select('nome,alerta_prioridade').eq('modulo','OS').eq('gera_alerta',true).eq('ativo',true);
  const alBody=document.getElementById('al-body');
  if(!sc?.length){alBody.innerHTML='<div class="p-empty"><i class="ti ti-circle-check"></i>Tudo em dia</div>';return;}
  const{data:os}=await db.from('ordens_servico')
    .select('id,numero,cliente_nome,aparelho,status,atualizado_em')
    .in('status',sc.map(s=>s.nome))
    .order('atualizado_em',{ascending:true}).limit(15);
  const lista=os||[];
  const badge=document.getElementById('al-count');
  if(!lista.length){alBody.innerHTML='<div class="p-empty"><i class="ti ti-circle-check"></i>Tudo em dia</div>';badge.style.display='none';return;}
  badge.style.display='inline';badge.textContent=lista.length;
  const tempo=dt=>{const m=Math.floor((new Date()-new Date(dt))/60000);if(m<60)return m+'min';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';};
  alBody.innerHTML=lista.map(o=>{
    const s=sc.find(x=>x.nome===o.status)||{alerta_prioridade:'NORMAL'};
    const p=s.alerta_prioridade.toLowerCase();
    const cls=p==='critica'?'crit':p==='alta'?'alta':'norm';
    const tag=p==='critica'?'CRÍTICO':p==='alta'?'ALTA':'NORMAL';
    return`<a class="al-row" href="os-nova.html?id=${o.id}">
      <div class="al-pip ${cls}"></div>
      <div class="al-info">
        <div class="al-t">OS #${String(o.numero).padStart(4,'0')} — ${o.status}</div>
        <div class="al-s">${o.cliente_nome}${o.aparelho?' · '+o.aparelho:''}</div>
      </div>
      <span class="al-tag ${cls}">${tag}</span>
      <span class="al-time">${tempo(o.atualizado_em)}</span>
    </a>`;
  }).join('');
}

// ── CONTAS A PAGAR ───────────────────────────────────────────────
async function loadContas(){
  if(USR.perfil==='TECNICO'){
    document.getElementById('ct-body').innerHTML='<div style="padding:.75rem 1rem;font-size:12px;color:var(--sub)">Restrito ao comercial</div>';
    return;
  }
  const proximos7=new Date();proximos7.setDate(proximos7.getDate()+7);
  const ate=proximos7.toISOString().slice(0,10);
  const{data}=await db.from('contas')
    .select('id,descricao,valor,vencimento,status')
    .eq('tipo','PAGAR').in('status',['ABERTA','VENCIDA','PARCIAL'])
    .lte('vencimento',ate).order('vencimento',{ascending:true}).limit(8);
  const lista=data||[];
  const badge=document.getElementById('ct-badge');
  const vencendoHoje=lista.filter(c=>c.vencimento<=hoje).length;
  if(vencendoHoje>0){badge.style.display='inline';badge.textContent=vencendoHoje+' hoje';}
  const body=document.getElementById('ct-body');
  if(!lista.length){body.innerHTML='<div style="padding:.75rem 1rem;font-size:12px;color:var(--sub)">Nenhuma nos próximos 7 dias</div>';return;}
  body.innerHTML=lista.map(c=>{
    const vencida=c.vencimento<hoje||c.status==='VENCIDA';
    const ehHoje=c.vencimento===hoje;
    const cls=vencida?'vencida':ehHoje?'hoje':'prox';
    const tag=vencida?'<span class="ct-tag vencida">VENCIDA</span>':ehHoje?'<span class="ct-tag hoje">HOJE</span>':'';
    return`<div class="ct-row">
      <div class="ct-dot ${cls}"></div>
      <div class="ct-info">
        <div class="ct-desc">${c.descricao}${tag}</div>
        <div class="ct-venc">Vence ${fmtDt(c.vencimento)}</div>
      </div>
      <div class="ct-val">${fmt(c.valor)}</div>
    </div>`;
  }).join('');
}

// ── LISTA COMPRAS ────────────────────────────────────────────────
async function loadCompras(){
  const{data}=await db.from('lista_compras').select('*').eq('concluido',false).order('criado_em',{ascending:false}).limit(20);
  const lista=data||[];
  document.getElementById('lc-count').textContent=lista.length;
  const body=document.getElementById('lc-body');
  if(!lista.length){body.innerHTML='<div class="p-empty"><i class="ti ti-shopping-bag"></i>Lista vazia</div>';return;}
  body.innerHTML=lista.map(c=>`
    <div class="lc-row">
      <div class="lc-check" onclick="concluirCompra('${c.id}')" title="Marcar como comprado">
        <i class="ti ti-check" style="font-size:11px;color:transparent"></i>
      </div>
      <div class="lc-info">
        <div class="lc-prod">${c.produto}${c.urgencia!=='NORMAL'?`<span class="lc-urg ${c.urgencia}">${c.urgencia==='URGENTE'?'URGENTE':'DEPOIS'}</span>`:''}</div>
        <div class="lc-forn">${c.fornecedor||'Fornecedor a definir'}${c.observacao?' · '+c.observacao:''}</div>
      </div>
      <span class="lc-qty">${c.quantidade}x</span>
      <button class="lc-del" onclick="excluirCompra('${c.id}')"><i class="ti ti-x"></i></button>
    </div>`).join('');
}

async function salvarCompra(){
  const produto=document.getElementById('lc-produto').value.trim();
  if(!produto){toast('Informe o produto.','err');return;}
  const{error}=await db.from('lista_compras').insert({
    produto:produto.toUpperCase(),
    quantidade:parseInt(document.getElementById('lc-qtd').value)||1,
    urgencia:document.getElementById('lc-urgencia').value,
    fornecedor:document.getElementById('lc-forn').value.trim().toUpperCase()||null,
    observacao:document.getElementById('lc-obs').value.trim().toUpperCase()||null,
    criado_por:USR.nome,concluido:false,
  });
  if(error){toast('Erro: '+error.message,'err');return;}
  toast('Adicionado!');fechar('compra');
  ['lc-produto','lc-forn','lc-obs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('lc-qtd').value=1;
  loadCompras();
}

async function concluirCompra(id){
  await db.from('lista_compras').update({concluido:true}).eq('id',id);toast('Comprado!');loadCompras();
}
async function excluirCompra(id){
  await db.from('lista_compras').delete().eq('id',id);loadCompras();
}

// ── MÉTRICAS ─────────────────────────────────────────────────────
let META_PERIODO=null;

async function loadMetricas(){
  const agora=new Date();
  const inicioSemana=new Date(agora);
  inicioSemana.setDate(agora.getDate()-agora.getDay());
  inicioSemana.setHours(0,0,0,0);
  const inicioMes=new Date(agora.getFullYear(),agora.getMonth(),1);

  const safe=async p=>{try{return await p;}catch{return{data:[],count:0};}};

  const[osHoje,osTotal,vdHoje,vdSemana]=await Promise.all([
    safe(db.from('ordens_servico').select('id',{count:'exact',head:true})
      .gte('criado_em',hoje+'T00:00:00').lte('criado_em',hoje+'T23:59:59')),
    safe(db.from('ordens_servico').select('id',{count:'exact',head:true})
      .not('status','in','("ENTREGUE","CANCELADA")')),
    safe(db.from('vendas').select('id',{count:'exact',head:true})
      .gte('criado_em',hoje+'T00:00:00').lte('criado_em',hoje+'T23:59:59')),
    safe(db.from('vendas').select('id',{count:'exact',head:true})
      .gte('criado_em',inicioSemana.toISOString())),
  ]);

  document.getElementById('m-os-hoje').textContent=osHoje.count??0;
  document.getElementById('m-os-total').textContent=osTotal.count??0;
  document.getElementById('m-vd-hoje').textContent=vdHoje.count??0;
  document.getElementById('m-vd-semana').textContent=vdSemana.count??0;

  // metas
  await loadMetas(vdSemana.count??0, vdHoje.count??0, inicioMes);
}

async function loadMetas(vdSemana, vdHoje, inicioMes){
  const safe=async p=>{try{return await p;}catch{return{data:null};}};

  // carrega metas salvas
  const[metaSem,metaMen]=await Promise.all([
    safe(db.from('configuracoes_sistema').select('valor').eq('chave','meta_semanal').maybeSingle()),
    safe(db.from('configuracoes_sistema').select('valor').eq('chave','meta_mensal').maybeSingle()),
  ]);

  const parseMeta=d=>{try{return JSON.parse(d?.data?.valor||'null');}catch{return null;}};
  const mSem=parseMeta(metaSem)||{tipo:'vendas',valor:30};
  const mMen=parseMeta(metaMen)||{tipo:'vendas',valor:120};

  // calcula atual para semana
  let atualSem=vdSemana;
  if(mSem.tipo==='os'){
    const{count}=await db.from('ordens_servico').select('id',{count:'exact',head:true})
      .eq('status','ENTREGUE')
      .gte('atualizado_em', (() => {const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d.toISOString();})())
      .catch(()=>({count:0}));
    atualSem=count||0;
  }

  // calcula atual para mês
  const{count:vdMes}=await db.from('vendas').select('id',{count:'exact',head:true})
    .gte('criado_em',inicioMes.toISOString()).catch(()=>({count:0}));
  let atualMen=vdMes||0;
  if(mMen.tipo==='os'){
    const{count}=await db.from('ordens_servico').select('id',{count:'exact',head:true})
      .eq('status','ENTREGUE').gte('atualizado_em',inicioMes.toISOString()).catch(()=>({count:0}));
    atualMen=count||0;
  }

  // renderiza semana
  const pctSem=Math.min(100,Math.round((atualSem/mSem.valor)*100));
  document.getElementById('m-meta-sw-atual').textContent=atualSem;
  document.getElementById('m-meta-sw-total').textContent=mSem.valor;
  document.getElementById('m-meta-sw-unit').textContent=mSem.tipo==='os'?'OS finalizadas':'vendas';
  document.getElementById('m-pct-sw').textContent=pctSem+'%';
  setTimeout(()=>document.getElementById('m-bar-sw').style.width=pctSem+'%',100);

  // renderiza mês
  const pctMen=Math.min(100,Math.round((atualMen/mMen.valor)*100));
  document.getElementById('m-meta-mn-atual').textContent=atualMen;
  document.getElementById('m-meta-mn-total').textContent=mMen.valor;
  document.getElementById('m-meta-mn-unit').textContent=mMen.tipo==='os'?'OS finalizadas':'vendas';
  document.getElementById('m-pct-mn').textContent=pctMen+'%';
  setTimeout(()=>document.getElementById('m-bar-mn').style.width=pctMen+'%',100);
}

// editar meta
function editarMeta(periodo){
  META_PERIODO=periodo;
  document.getElementById('meta-modal-title').textContent=
    'Meta '+(periodo==='semanal'?'semanal':'mensal');
  abrirModal('meta');
}

async function salvarMeta(){
  const tipo=document.getElementById('meta-tipo').value;
  const valor=parseInt(document.getElementById('meta-valor').value)||0;
  if(!valor){toast('Informe um valor.','err');return;}
  const chave='meta_'+(META_PERIODO==='semanal'?'semanal':'mensal');
  await db.from('configuracoes_sistema').upsert(
    {chave,valor:JSON.stringify({tipo,valor})},{onConflict:'chave'}
  );
  toast('Meta salva!');fechar('meta');loadMetricas();
}

Promise.all([loadMods(),loadUsuarios(),loadAlertas(),loadAgenda(),loadContas(),loadCompras(),loadMetricas()]).catch(console.error);
setInterval(loadAlertas,60000);
