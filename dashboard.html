<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dottec Assistência Inteligente</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- NAV DOTTEC -->
<script>
const PAGE_ID = "dashboard";
const BREADCRUMB = [];
</script>
<script src="_nav.js"></script>

<style>
:root{
  --cyan:#29B8C2;--cd:#1E9099;--cbg:#E3F4F5;
  --coral:#E8604A;--cbg2:#FBE9E5;
  --dark:#1C1C1A;--text:#2C2C2A;--sub:#8A887F;
  --border:#EAE7DF;--bg:#EDEAE3;--white:#fff;
  --amber:#9A6000;--abg:#FBEEDB;
  --green:#3B6D11;--gbg:#EAF3DE;
  --red:#DC2626;--rbg:#FEF2F2;
  --purple:#5B3FA6;--pbg:#EEEAF8;
  --slate:#3A4A6B;--sbg:#EEF0F5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Figtree',sans-serif;color:var(--text);
  background:var(--bg);min-height:100vh;
}

/* ── LAYOUT PRINCIPAL ── */
.main{max-width:1400px;margin:0 auto;padding:1.25rem 1.5rem 3rem}

/* ── MÓDULOS BOLINHAS ── */
.modulos-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:14px 18px;margin-bottom:1rem;
}
.mod-ball{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;text-decoration:none;color:inherit;flex-shrink:0;
  position:relative;
}
.mod-ball-icon{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  transition:transform .22s cubic-bezier(.34,1.5,.64,1),box-shadow .22s;
  position:relative;
}
.mod-ball:hover .mod-ball-icon{
  transform:translateY(-3px) scale(1.08);
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}
.mod-ball-label{
  font-size:10px;font-weight:700;color:var(--sub);
  text-align:center;white-space:nowrap;line-height:1.2;
  max-width:56px;overflow:hidden;text-overflow:ellipsis;
}
.mod-ball:hover .mod-ball-label{color:var(--dark)}

/* bolinha de alerta */
.mod-ball-badge{
  position:absolute;top:-2px;right:-2px;
  width:14px;height:14px;border-radius:50%;
  background:var(--red);border:2px solid var(--white);
  font-size:8px;font-weight:800;color:#fff;
  display:flex;align-items:center;justify-content:center;
}

/* botão "..." */
.mod-more{
  width:52px;height:52px;border-radius:50%;
  background:var(--bg);border:1.5px dashed var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--sub);cursor:pointer;
  transition:background .15s,border-color .15s;flex-shrink:0;
  position:relative;
}
.mod-more:hover{background:#E8E5DC;border-color:var(--sub)}

/* dropdown "..." */
.mod-more-drop{
  display:none;position:absolute;top:calc(100% + 8px);right:0;
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;box-shadow:0 12px 36px rgba(0,0,0,.12);
  padding:8px;z-index:300;min-width:200px;
}
.mod-more-drop.open{display:block}
.mod-more-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--text);
  text-decoration:none;transition:background .12s;
}
.mod-more-item:hover{background:var(--bg)}
.mod-more-item i{font-size:17px;width:24px;text-align:center}

/* btn configurar bolinhas */
.mod-config-btn{
  margin-left:auto;width:34px;height:34px;border-radius:50%;
  background:var(--bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--sub);cursor:pointer;
  transition:background .15s;flex-shrink:0;
}
.mod-config-btn:hover{background:#E2DFD6;color:var(--dark)}

/* ── BUSCA INLINE ── */
.search-wrap{position:relative;margin-bottom:1rem}
.search-row{
  display:flex;align-items:center;gap:10px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:12px;padding:0 16px;height:46px;
  transition:border-color .2s,box-shadow .2s;
}
.search-row:focus-within{
  border-color:var(--cyan);
  box-shadow:0 0 0 4px rgba(41,184,194,.1);
}
.search-row i.si{font-size:18px;color:var(--sub);flex-shrink:0}
.search-row input{
  flex:1;border:none;outline:none;font-size:14px;
  font-family:inherit;color:var(--dark);background:transparent;
  text-transform:uppercase;caret-color:var(--cyan);
}
.search-row input::placeholder{text-transform:none;color:#B5B2A8;font-size:13.5px}
.search-row .s-kbd{font-size:10px;color:var(--sub);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 7px;flex-shrink:0}

/* dropdown busca */
.sr-drop{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.13);max-height:440px;overflow-y:auto;z-index:400}
.sr-drop.open{display:block}
.sr-sec{padding:8px 14px 4px;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.sr-sec::after{content:'';flex:1;height:1px;background:#F0EDE7}
.sr-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #F5F4F0;transition:background .1s}
.sr-item:hover,.sr-item.foc{background:var(--bg)}
.sr-item:last-child{border-bottom:none}
.sri{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sri-p{background:var(--cbg);color:var(--cd)}.sri-pr{background:var(--cbg2);color:var(--coral)}.sri-os{background:var(--abg);color:var(--amber)}.sri-c{background:var(--gbg);color:var(--green)}.sri-v{background:var(--sbg);color:var(--slate)}
.sr-info{flex:1;min-width:0}
.sr-t{font-size:13px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-s{font-size:11px;color:var(--sub);margin-top:1px}
.sr-m{font-size:11.5px;color:var(--sub);flex-shrink:0}
.sr-empty{padding:2rem;text-align:center;color:var(--sub)}
.sr-empty i{font-size:26px;display:block;margin-bottom:8px;opacity:.3}
.sr-foot{padding:8px 14px;border-top:1px solid #F0EDE7;font-size:11px;color:var(--sub);text-align:center}

/* ── GRID 4 PAINEIS ── */
.panels{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;align-items:start}

/* ── PAINEL GENÉRICO ── */
.panel{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-bottom:1px solid var(--border);
}
.ph-left{display:flex;align-items:center;gap:8px}
.ph-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.phi-red{background:var(--rbg);color:var(--red)}
.phi-cyan{background:var(--cbg);color:var(--cd)}
.phi-amber{background:var(--abg);color:var(--amber)}
.phi-green{background:var(--gbg);color:var(--green)}
.ph-title{font-size:12.5px;font-weight:700;color:var(--dark)}
.ph-count{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:10px;background:var(--bg);color:var(--sub);border:1px solid var(--border)}
.ph-count.red{background:var(--rbg);color:var(--red);border-color:rgba(220,38,38,.2)}
.ph-add{
  width:26px;height:26px;border-radius:7px;border:none;
  background:var(--cyan);color:#fff;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s;flex-shrink:0;
}
.ph-add:hover{background:var(--cd)}

.panel-body{max-height:320px;overflow-y:auto}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* ── LINHAS DOS PAINEIS ── */
/* alertas */
.al-row{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid #F5F4F0;cursor:pointer;transition:background .1s;text-decoration:none}
.al-row:last-child{border-bottom:none}
.al-row:hover{background:var(--bg)}
.al-pip{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.al-pip.crit{background:var(--red)}.al-pip.alta{background:var(--amber)}.al-pip.norm{background:var(--border)}
.al-info{flex:1;min-width:0}
.al-t{font-size:12.5px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-s{font-size:11px;color:var(--sub);margin-top:1px}
.al-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.al-tag.crit{background:var(--rbg);color:var(--red)}.al-tag.alta{background:var(--abg);color:var(--amber)}.al-tag.norm{background:var(--bg);color:var(--sub)}
.al-time{font-size:10.5px;color:#B5B2A8;flex-shrink:0;margin-left:2px}

/* agenda */
.ag-row{display:flex;align-items:flex-start;gap:9px;padding:9px 14px;border-bottom:1px solid #F5F4F0;cursor:pointer;transition:background .1s}
.ag-row:last-child{border-bottom:none}
.ag-row:hover{background:var(--bg)}
.ag-row.atras{background:#FEF9F8}
.ag-row.hj{background:#F5FDFE}
.ag-dt{flex-shrink:0;width:32px;text-align:center}
.ag-dia{font-size:16px;font-weight:800;color:var(--dark);line-height:1}
.ag-dia.hj{color:var(--cyan)}.ag-dia.atras{color:var(--red)}
.ag-mes{font-size:8.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em}
.ag-vl{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;margin:1px 0}
.ag-info{flex:1;min-width:0;padding-left:2px}
.ag-titulo{font-size:12.5px;font-weight:600;color:var(--dark);line-height:1.3}
.ag-row.atras .ag-titulo{color:var(--red)}
.ag-resp{font-size:10.5px;color:var(--sub);margin-top:2px;display:flex;align-items:center;gap:3px}
.ag-resp i{font-size:11px}
.ag-hr{font-size:10px;font-weight:700;color:var(--sub);flex-shrink:0;padding-top:2px;white-space:nowrap}
.ag-hr.hj{color:var(--cyan)}.ag-hr.atras{color:var(--red)}
.ag-concluido{text-decoration:line-through;opacity:.5}

/* contas */
.ct-row{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid #F5F4F0}
.ct-row:last-child{border-bottom:none}
.ct-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ct-dot.hoje{background:var(--red)}.ct-dot.prox{background:var(--amber)}.ct-dot.ok{background:var(--border)}
.ct-info{flex:1;min-width:0}
.ct-desc{font-size:12.5px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-venc{font-size:10.5px;color:var(--sub);margin-top:1px}
.ct-val{font-size:12.5px;font-weight:700;color:var(--dark);flex-shrink:0;white-space:nowrap}

/* lista de compras */
.lc-row{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid #F5F4F0}
.lc-row:last-child{border-bottom:none}
.lc-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.lc-check.done{background:var(--green);border-color:var(--green);color:#fff}
.lc-check i{font-size:11px}
.lc-info{flex:1;min-width:0}
.lc-prod{font-size:12.5px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-prod.done{text-decoration:line-through;color:var(--sub)}
.lc-forn{font-size:10.5px;color:var(--sub);margin-top:1px}
.lc-qty{font-size:10.5px;font-weight:700;color:var(--sub);flex-shrink:0;background:var(--bg);padding:1px 7px;border-radius:5px}
.lc-del{width:22px;height:22px;border-radius:6px;border:none;background:transparent;color:var(--sub);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.lc-del:hover{background:var(--cbg2);color:var(--red)}

/* vazio */
.p-empty{padding:2rem 1rem;text-align:center;color:var(--sub);font-size:12.5px}
.p-empty i{font-size:28px;display:block;margin-bottom:8px;opacity:.2}

/* ── MODAIS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,28,26,.48);z-index:600;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:18px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-head{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Lora',serif;font-size:16px;font-weight:700;color:var(--dark)}
.modal-x{width:28px;height:28px;border-radius:7px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--sub)}
.modal-body{padding:1.25rem 1.4rem;display:flex;flex-direction:column;gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;height:40px;padding:0 12px;
  border:1px solid var(--border);border-radius:9px;
  background:#FAFAF7;color:var(--dark);
  font-size:13.5px;font-family:inherit;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(41,184,194,.1);
  background:var(--white);
}
.field input::placeholder,.field textarea::placeholder{color:#B5B2A8}
.field textarea{height:72px;resize:none;padding:10px 12px}
.modal-foot{padding:.9rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-cancel{height:38px;padding:0 14px;border-radius:9px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary{height:38px;padding:0 18px;border-radius:9px;border:none;background:var(--cyan);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-primary:hover{background:var(--cd)}

/* modal config bolinhas */
.modal-lg{max-width:560px}
.config-list{display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto}
.config-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:9px;cursor:grab}
.config-item-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.config-item-name{flex:1;font-size:13px;font-weight:600;color:var(--dark)}
.config-item-pos{font-size:10.5px;color:var(--sub);flex-shrink:0}
.config-toggle{width:34px;height:20px;border-radius:10px;border:none;cursor:pointer;transition:background .2s;flex-shrink:0;position:relative}
.config-toggle.on{background:var(--cyan)}.config-toggle.off{background:#D4D2CB}
.config-toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.config-toggle.on::after{left:17px}.config-toggle.off::after{left:3px}

/* TOAST */
.toast{position:fixed;top:1.25rem;right:1.25rem;z-index:999;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateX(140%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:300px}
.toast.show{transform:translateX(0)}
.toast.ok{background:#E6FAF8;color:#0F6E56;border:1px solid rgba(15,110,86,.2)}
.toast.err{background:var(--cbg2);color:#C94835;border:1px solid rgba(200,72,53,.2)}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
@media(max-width:1100px){.panels{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.panels{grid-template-columns:1fr}.modulos-bar{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="toast" id="toast"><i id="ti" class="ti ti-check"></i><span id="tm"></span></div>

<!-- MODAL NOVA TAREFA AGENDA -->
<div class="overlay" id="ov-agenda">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Nova tarefa</div>
      <button class="modal-x" onclick="fechar('agenda')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Título</label>
        <input type="text" id="ag-titulo" placeholder="Ex: ligar para cliente, buscar peça..."/>
      </div>
      <div class="grid2">
        <div class="field">
          <label>Data e hora</label>
          <input type="datetime-local" id="ag-data"/>
        </div>
        <div class="field">
          <label>Responsável</label>
          <select id="ag-resp"><option value="">Todos</option></select>
        </div>
      </div>
      <div class="field">
        <label>Descrição <span style="font-weight:400;text-transform:none;font-size:9px">(opcional)</span></label>
        <textarea id="ag-desc" placeholder="Detalhes da tarefa..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="fechar('agenda')">Cancelar</button>
      <button class="btn-primary" onclick="salvarAgenda()"><i class="ti ti-calendar-plus"></i> Agendar</button>
    </div>
  </div>
</div>

<!-- MODAL NOVA COMPRA -->
<div class="overlay" id="ov-compra">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Adicionar à lista de compras</div>
      <button class="modal-x" onclick="fechar('compra')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Produto / Item</label>
        <input type="text" id="lc-produto" placeholder="Ex: tela iPhone 15, pasta térmica..."/>
      </div>
      <div class="grid2">
        <div class="field">
          <label>Quantidade</label>
          <input type="number" id="lc-qtd" value="1" min="1" placeholder="1"/>
        </div>
        <div class="field">
          <label>Urgência</label>
          <select id="lc-urgencia">
            <option value="NORMAL">Normal</option>
            <option value="URGENTE">Urgente</option>
            <option value="PODE_ESPERAR">Pode esperar</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Fornecedor <span style="font-weight:400;text-transform:none;font-size:9px">(opcional)</span></label>
        <input type="text" id="lc-forn" placeholder="Nome do fornecedor ou 'a procurar'"/>
      </div>
      <div class="field">
        <label>Observação <span style="font-weight:400;text-transform:none;font-size:9px">(opcional)</span></label>
        <textarea id="lc-obs" placeholder="Especificações, cor, modelo..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="fechar('compra')">Cancelar</button>
      <button class="btn-primary" onclick="salvarCompra()"><i class="ti ti-plus"></i> Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIG BOLINHAS -->
<div class="overlay" id="ov-config-mods">
  <div class="modal modal-lg">
    <div class="modal-head">
      <div class="modal-title">Personalizar módulos</div>
      <button class="modal-x" onclick="fechar('config-mods')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <p style="font-size:12.5px;color:var(--sub);margin-bottom:4px">Ative até 8 módulos para aparecer como bolinhas. O restante fica no menu "...".</p>
      <div class="config-list" id="config-list"></div>
    </div>
    <div class="modal-foot">

async function loadAlertas(){
  const{data:sc}=await db.from('status_config').select('nome,alerta_prioridade').eq('modulo','OS').eq('gera_alerta',true).eq('ativo',true);
  if(!sc?.length){document.getElementById('al-body').innerHTML='<div class="p-empty"><i class="ti ti-circle-check"></i>Tudo em dia</div>';return;}
  const{data:os}=await db.from('ordens_servico')
    .select('id,numero,cliente_nome,aparelho,status,atualizado_em')
    .in('status',sc.map(s=>s.nome))
    .order('atualizado_em',{ascending:true}).limit(10);
  const lista=os||[];
  const badge=document.getElementById('al-count');
  if(!lista.length){document.getElementById('al-body').innerHTML='<div class="p-empty"><i class="ti ti-circle-check"></i>Tudo em dia</div>';badge.style.display='none';return;}
  badge.style.display='inline';badge.textContent=lista.length;
  const tempoStr=dt=>{const m=Math.floor((new Date()-new Date(dt))/60000);if(m<60)return m+'min';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';};
  document.getElementById('al-body').innerHTML=lista.map(o=>{
    const s=sc.find(x=>x.nome===o.status)||{alerta_prioridade:'NORMAL'};
    const p=s.alerta_prioridade.toLowerCase();
    const cls=p==='critica'?'crit':p==='alta'?'alta':'norm';
    const tag=p==='critica'?'CRÍTICO':p==='alta'?'ALTA':'NORMAL';
    return`<a class="al-row" href="os-nova.html?id=${o.id}">
      <div class="al-pip ${cls}"></div>
      <div class="al-info">
        <div class="al-t">OS #${String(o.numero).padStart(4,'0')} — ${o.status}</div>
        <div class="al-s">${o.cliente_nome}${o.aparelho?' · '+o.aparelho:''}</div>
      </div>
      <span class="al-tag ${cls}">${tag}</span>
      <span class="al-time">${tempoStr(o.atualizado_em)}</span>
    </a>`;
  }).join('');
}

async function loadContas(){
  // mostra só para ADMIN e COMERCIAL
  if(USR.perfil==='TECNICO'){
    document.getElementById('ct-body').innerHTML='<div class="p-empty"><i class="ti ti-lock"></i>Restrito ao comercial</div>';
    return;
  }
  const proximos7=new Date();proximos7.setDate(proximos7.getDate()+7);
  const ate=proximos7.toISOString().slice(0,10);
  const{data}=await db.from('contas')
    .select('id,descricao,valor,vencimento,status')
    .eq('tipo','PAGAR').in('status',['ABERTA','VENCIDA','PARCIAL'])
    .lte('vencimento',ate)

  const lista=data||[];
  const body=document.getElementById('ct-body');

  body.innerHTML=lista.map(c=>{
    const cls=c.vencimento<hoje||c.status==='VENCIDA'?'hoje':c.vencimento===hoje?'hoje':'prox';

    return`<div class="ct-row">
      <div class="ct-dot ${cls}"></div>
      <div class="ct-info">
        <div class="ct-desc">${c.descricao}</div>
        <div class="ct-venc">Vence: ${fmtDt(c.vencimento)} ${label?`<strong style="color:var(--red)">${label}</strong>`:''}</div>

      <div class="ct-val">${fmt(c.valor)}</div>

  }).join('');
}

// ── BUSCA GLOBAL ─────────────────────────────────────────────
let busTimer,RESULTADOS=[],FOCI=-1;

// Ctrl+K foca na busca
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){
    e.preventDefault();
    document.getElementById('busca').focus();
  }
});

function onBusca(){
  const q=document.getElementById('busca').value.trim();
  clearTimeout(busTimer);FOCI=-1;
  const drop=document.getElementById('sr-drop');
  if(q.length<2){drop.classList.remove('open');return;}
  drop.innerHTML='<div class="sr-empty"><i class="ti ti-loader-2 spin" style="font-size:22px"></i></div>';
  drop.classList.add('open');
  busTimer=setTimeout(()=>executaBusca(q),300);
}

async function executaBusca(q){
  const t=q.toUpperCase(),doc=q.replace(/\D/g,'');
  const safe=async p=>{try{return await p;}catch{return{data:[]};}};
  const[rP,rPr,rOS,rC]=await Promise.all([
    db.from('pessoas').select('id,nome,documento,tipo_doc,celular,is_cliente,is_fornecedor').or(`nome.ilike.%${t}%${doc?`,documento.ilike.%${doc}%`:''}`).eq('ativo',true).limit(4),
    db.from('produtos').select('id,nome,valor_venda,estoque_atual').ilike('nome','%'+t+'%').eq('ativo',true).limit(3),
    safe(db.from('ordens_servico').select('id,numero,cliente_nome,aparelho,status').or(`cliente_nome.ilike.%${t}%,aparelho.ilike.%${t}%`).limit(4)),
    safe(db.from('contas').select('id,tipo,descricao,valor,status').ilike('descricao','%'+t+'%').limit(3)),
  ]);
  RESULTADOS=[];let html='';
  const p=rP.data||[];
  if(p.length){html+='<div class="sr-sec">Pessoas</div>';p.forEach(x=>{const url=`pessoa-novo.html?id=${x.id}`;RESULTADOS.push({url});html+=`<div class="sr-item" data-i="${RESULTADOS.length-1}" onclick="irPara('${url}')"><div class="sri sri-p"><i class="ti ti-user"></i></div><div class="sr-info"><div class="sr-t">${x.nome}</div><div class="sr-s">${x.tipo_doc}: ${x.documento||''}</div></div><div class="sr-m">${x.is_cliente?'CLI':''}</div></div>`;});}
  const pr=rPr.data||[];
  if(pr.length){html+='<div class="sr-sec">Produtos</div>';pr.forEach(x=>{const url=`produto-novo.html?id=${x.id}`;RESULTADOS.push({url});html+=`<div class="sr-item" data-i="${RESULTADOS.length-1}" onclick="irPara('${url}')"><div class="sri sri-pr"><i class="ti ti-package"></i></div><div class="sr-info"><div class="sr-t">${x.nome}</div><div class="sr-s">Est: ${x.estoque_atual||0}</div></div><div class="sr-m">${fmt(x.valor_venda)}</div></div>`;});}
  const os=rOS.data||[];
  if(os.length){html+='<div class="sr-sec">OS</div>';os.forEach(x=>{const url=`os-nova.html?id=${x.id}`;RESULTADOS.push({url});html+=`<div class="sr-item" data-i="${RESULTADOS.length-1}" onclick="irPara('${url}')"><div class="sri sri-os"><i class="ti ti-tool"></i></div><div class="sr-info"><div class="sr-t">OS #${String(x.numero).padStart(4,'0')} — ${x.cliente_nome}</div><div class="sr-s">${x.aparelho||''} · ${x.status}</div></div></div>`;});}
  const ct=rC.data||[];
  if(ct.length){html+='<div class="sr-sec">Contas</div>';ct.forEach(x=>{RESULTADOS.push({url:'contas.html'});html+=`<div class="sr-item" data-i="${RESULTADOS.length-1}" onclick="irPara('contas.html')"><div class="sri sri-c"><i class="ti ti-currency-dollar"></i></div><div class="sr-info"><div class="sr-t">${x.descricao}</div><div class="sr-s">${x.tipo==='PAGAR'?'A Pagar':'A Receber'}</div></div><div class="sr-m">${fmt(x.valor)}</div></div>`;});}
  if(!RESULTADOS.length)html=`<div class="sr-empty"><i class="ti ti-search-off"></i>Sem resultados</div>`;
  else html+='<div class="sr-foot">↑ ↓ navegar · Enter abrir · ESC fechar</div>';
  document.getElementById('sr-drop').innerHTML=html;
}

function irPara(url){location.href=url;}

function onBuscaKey(e){
  const rows=document.querySelectorAll('.sr-item');
  if(e.key==='Escape'){document.getElementById('sr-drop').classList.remove('open');document.getElementById('busca').blur();return;}
  if(!rows.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();FOCI=Math.min(FOCI+1,rows.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();FOCI=Math.max(FOCI-1,0);}
  else if(e.key==='Enter'){e.preventDefault();const r=rows[FOCI];if(r){const i=+r.dataset.i;if(RESULTADOS[i])irPara(RESULTADOS[i].url);}}
  rows.forEach((r,i)=>r.classList.toggle('foc',i===FOCI));
  if(FOCI>=0)rows[FOCI].scrollIntoView({block:'nearest'});
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap'))document.getElementById('sr-drop').classList.remove('open');
});

// ── INIT ─────────────────────────────────────────────────────
Promise.all([
  loadModsUsuario(),
  loadUsuarios(),
  loadAlertas(),
  loadAgenda(),
  loadContas(),
  loadCompras(),
]).catch(console.error);

setInterval(loadAlertas,60000);
</script>
